    ];
    this.add.rectangle(W/2,H/2+158,W-40,72,0x001122,0.9).setStrokeStyle(1,0x44aacc,0.5).setDepth(69);
    this.add.text(W/2,H/2+132,'NEW IN EPISODE II',{fontSize:'10px',fontFamily:'Courier New',color:'#44aacc',letterSpacing:2}).setOrigin(.5).setDepth(70);
    ep2Preview.forEach((t,i)=>this.add.text(W/2,H/2+146+i*14,t,{fontSize:'10px',fontFamily:'Arial',color:'#6699aa'}).setOrigin(.5).setDepth(70));
    // EP II mechanic preview
    const mp2=this.add.container(W/2,H/2+172).setDepth(70);
    mp2.add(this.add.rectangle(0,0,W-48,50,0x001122,0.90).setStrokeStyle(1,0x224488));
    mp2.add(this.add.text(0,-9,'EP II introduces: Thermal Gauge  ·  Freeze Mines  ·  Ice Shards  ·  Pilot Swap',{fontSize:'10px',fontFamily:'Courier New',color:'#44aacc',wordWrap:{width:W-60},align:'center'}).setOrigin(.5));
    mp2.add(this.add.text(0,11,'Shield becomes Thermal — drains passively in cold. Grab supply crates to survive.',{fontSize:'9px',fontFamily:'Courier New',color:'#336688',wordWrap:{width:W-60},align:'center'}).setOrigin(.5));

    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start('Prelude'));
  }

  // ── Combat ────────────────────────────────────────────────────────────────
  fire(){
    if(this.ammo<=0){
      // Out of ammo — show warning flash, no shot
      if(!this._ammoWarnT||this.time.now-this._ammoWarnT>1200){
        this._ammoWarnT=this.time.now;
        this.pop(this.player.x,this.player.y-50,'NO AMMO!','#ff3300',18);
        Sfx.play('hit');
      }
      return;
    }
    this.ammo=Math.max(0,this.ammo-1);
    this.uhud();
    Sfx.play('shoot');
    const spd=Math.round(500*this.diff.spm*.8+100);
    const b=this.pb.create(this.player.x,this.player.y-32,'pulse');
    if(!b)return;
    b.play('pulse');b.setScale(1.5).setDepth(7);b.setVelocityY(-spd);b.dmg=20;
    this.time.delayedCall(2000,()=>{if(b?.active)b.destroy();});
  }

  dmgP(amt){
    if(this.inv||this.over||this.clear)return;
    this.shdT=0;
    if(this.shield>0){const a=Math.min(this.shield,amt);this.shield-=a;amt-=a;}
    if(amt>0)this.hp-=amt;
    Sfx.play('hit');this.cameras.main.shake(200,.007);
    if(this.shield<100){this.shd.setAlpha(.85);this.shd.play('shield-fx');this.time.delayedCall(450,()=>this.shd.setAlpha(0));}
    this.uhud();
    if(this.hp<=0)this.die();
    else if(this.hp<20&&!this._lowHpWarnT){this._lowHpWarnT=1;Sfx.play('lowres');this.hbar.setFillStyle(0xff2200);}
    else if(this.hp>=20) this._lowHpWarnT=0;
  }

  die(){
    if(this.over)return;
    Sfx.play('die');this.lives--;this.uhud();
    const ex=this.add.sprite(this.player.x,this.player.y,'explosion-lg').setScale(2).setDepth(15);
    ex.play('explosion-lg');ex.once('animationcomplete',()=>ex.destroy());
    this.player.setActive(false).setVisible(false);this.shd.setAlpha(0);
    // Death dialogue
    if(this.lives>0){
      this.dialogueQ=[['FITZ','You took a hit. Respawning in 3…'],['CMD','Get back in there, '+this.pilot+'.']];
      this.showNextLine();
      this.time.delayedCall(1600,()=>this.respawn());
    } else {
      this.dialogueQ=[['FITZ','Systems offline. Ejecting flight log…'],['FITZ','For what it\'s worth — you lasted longer than the carrier groups.']];
      this.showNextLine();
      this.time.delayedCall(1200,()=>this.gameOver());
    }
  }

  respawn(){
    this.shield=100;this.hp=100;
    this.player.setPosition(W/2,H-100).setActive(true).setVisible(true);
    this.inv=true;this.invT=3000;
    this.tweens.add({targets:this.player,alpha:.2,duration:120,yoyo:true,repeat:12,onComplete:()=>{if(this.player)this.player.setAlpha(1);}});
    this.uhud();
  }

  gameOver(){
    this.over=true; Music.stop(); if(this.mineTimer)this.mineTimer.remove(); if(this._tentTimer)this._tentTimer.remove(); if(this._dripTimer)this._dripTimer.remove();
    const hi=parseInt(localStorage.getItem('sf_hi')||'0');
    if(this.score>hi)localStorage.setItem('sf_hi',this.score);
    this.time.delayedCall(800,()=>this.scene.start('GameOver',{score:this.score,lives:0,cleared:false,wave:this.waveIdx+1,pilot:this.pilot}));
  }

  pts(base){
    const m=([1,2,4,8])[Math.min(this.combo,3)],e=base*m;
    this.score+=e;
    while(this.score>=this.nextLife){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(W/2,H/2-60,'+LIFE!','#88ff88',28);}
      this.nextLife+=LIFE_EVERY;
    }
    this.pop(this.player.x+Phaser.Math.Between(-30,30),this.player.y-40,'+'+e,m>1?'#ffdd44':'#fff',13);
    this.uhud();
  }
  ci(){this.combo=Math.min(this.combo+1,3);this.comboT=4000;this.uhud();}
  pop(x,y,t,col,sz=14){
    const o=this.add.text(x,y,t,{fontSize:sz+'px',fontFamily:'Arial',fontStyle:'bold',color:col,stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(60);
    this.tweens.add({targets:o,y:y-50,alpha:0,duration:900,ease:'Quad.easeOut',onComplete:()=>o.destroy()});
  }

  drop(x,y,force=false){
    if(!force&&Math.random()>.35)return;
    const ts=['shield','health','damage','life'],ws=[35,35,20,10];
    let r=Math.random()*100,type='shield';
    for(let i=0;i<ts.length;i++){r-=ws[i];if(r<=0){type=ts[i];break;}}
    const p=this.pu.create(x,y,'gems');
    if(!p)return;
    p.play('gems');p.setScale(2).setDepth(6);p.setVelocityY(80);p.ptype=type;
    p.setTint({shield:0x4488ff,health:0xff4444,damage:0xffdd00,life:0x88ff88}[type]||0xffffff);
    this.time.delayedCall(8000,()=>{if(p?.active)p.destroy();});
  }

  applyPU(type){
    Sfx.play('pu');
    if(type==='shield'){this.shield=100;this.ammo=Math.min(this.ammoMax,this.ammo+8);this.pop(this.player.x,this.player.y-50,'SHIELD FULL! +8 AMMO','#4488ff',13);}
    else if(type==='health'){this.hp=Math.min(100,this.hp+40);this.pop(this.player.x,this.player.y-50,'+40 HP','#ff6666',15);}
    else if(type==='damage'){this.dbl=10000;this.pop(this.player.x,this.player.y-50,'2× DAMAGE!','#ffdd44',15);}
    else if(type==='life'){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(this.player.x,this.player.y-50,'+1 LIFE!','#88ff88',18);}
      else{this.shield=100;this.pop(this.player.x,this.player.y-50,'SHIELD FULL!','#4488ff',15);}
    }
    this.uhud();
  }

  // ── Asteroids ─────────────────────────────────────────────────────────────
  // ── Desert Tent — drifts in from the side, player flies over to collect ──
  spawnTent(){
    if(this.over||this.clear||!this.tents) return;
    // Tents appear in the lower half of the screen (desert zone)
    const fromLeft=Math.random()>0.5;
    const x=fromLeft?-32:W+32;
    const y=Phaser.Math.Between(H*0.55, H-90);

    // Build a tent graphic from a canvas
    const tKey='tent_'+Math.floor(Math.random()*1000);
    const cvs=document.createElement('canvas'); cvs.width=56; cvs.height=44;
    const tctx=cvs.getContext('2d');
    // Desert ground strip
    tctx.fillStyle='#c8a060'; tctx.fillRect(0,34,56,10);
    // Tent body — triangle
    tctx.beginPath(); tctx.moveTo(4,34); tctx.lineTo(28,4); tctx.lineTo(52,34); tctx.closePath();
    tctx.fillStyle='#cc6622'; tctx.fill();
    tctx.strokeStyle='#994400'; tctx.lineWidth=2; tctx.stroke();
    // Tent stripes
    tctx.strokeStyle='#ffaa44'; tctx.lineWidth=3;
    tctx.beginPath(); tctx.moveTo(16,30); tctx.lineTo(28,10); tctx.lineTo(40,30); tctx.stroke();
    // Door
    tctx.fillStyle='#220000'; tctx.fillRect(22,22,12,12);
    // Ammo crate icon on tent
    tctx.fillStyle='#ffdd33'; tctx.font='bold 11px Arial'; tctx.textAlign='center';
    tctx.fillText('AMMO',28,44);
    // Glow
    tctx.shadowColor='#ffcc00'; tctx.shadowBlur=8;
    tctx.strokeStyle='#ffcc44'; tctx.lineWidth=1.5;
    tctx.beginPath(); tctx.arc(28,20,18,0,Math.PI*2); tctx.stroke();

    if(!this.textures.exists(tKey)) this.textures.addCanvas(tKey,cvs);

    const t=this.tents.create(x,y,tKey);
    if(!t) return;
    t.setScale(1.6).setDepth(5).setAlpha(0.95);
    t.refill=AMMO_TENT_REFILL;
    // Drift slowly across screen
    const spd=(38+Math.random()*22)*(fromLeft?1:-1);
    t.setVelocityX(spd);
    // Pulsing highlight
    this.tweens.add({targets:t,alpha:0.6,duration:600,yoyo:true,repeat:-1});
    // Arrow hint
    const arrow=this.add.text(x,y-34,fromLeft?'→ AMMO':'AMMO ←',
      {fontSize:'13px',fontFamily:'Courier New',color:'#ffcc33',stroke:'#000',strokeThickness:3})
      .setDepth(60).setOrigin(.5);
    this.tweens.add({targets:arrow,alpha:0,duration:3000,delay:2000,onComplete:()=>arrow.destroy()});

    // Destroy after crossing screen
    this.time.addEvent({delay:12000,callback:()=>{if(t?.active)t.destroy();}});
  }

  onPlayerHitTent(player,tent){
    if(!tent?.active||this.over||this.clear) return;
    const refill=tent.refill||AMMO_TENT_REFILL;
    this.ammo=Math.min(this.ammoMax, this.ammo+refill);
    Sfx.play('pu');
    this.pop(player.x,player.y-54,'+'+refill+' AMMO!','#ffcc33',17);
    // Small explosion effect where tent was
    const ex=this.add.sprite(tent.x,tent.y,'explosion-sm').setScale(2).setDepth(15);
    ex.play('explosion-sm'); ex.once('animationcomplete',()=>ex.destroy());
    tent.destroy();
    this.uhud();
  }

  spawnMine(){
    if(this.over||this.clear) return;
    // Mine spawns from left or right edge, drifts across
    const fromLeft=Math.random()>0.5;
    const x=fromLeft?-20:W+20;
    const y=Phaser.Math.Between(100,H-160);
    const m=this.mines.create(x,y,'planet');
    if(!m) return;
    m.setScale(0.5).setDepth(6).setTint(0xff6600).setAlpha(0.9);
    const spd=(50+Math.random()*40)*(fromLeft?1:-1)*this.diff.spm;
    m.setVelocity(spd, Phaser.Math.Between(-20,20));
    m.setAngularVelocity(Phaser.Math.Between(-80,80));
    m.hp=2;
    // Pulsing glow to warn player
    this.tweens.add({targets:m,alpha:0.35,duration:400,yoyo:true,repeat:-1});
    this.time.delayedCall(8000,()=>{if(m?.active)m.destroy();});

    // Warn text
    const side=fromLeft?'◀ MINE':'MINE ▶';
    const wx=fromLeft?60:W-60;
    const wt=this.add.text(wx,y,side,
      {fontSize:'13px',fontFamily:'Courier New',color:'#ff6600',stroke:'#000',strokeThickness:3})
      .setOrigin(.5).setDepth(60).setAlpha(0);
    this.tweens.add({targets:wt,alpha:1,duration:200,yoyo:true,repeat:2,
      onComplete:()=>wt.destroy()});
  }

  onPlayerHitMine(player,mine){
    if(this.inv||!mine?.active) return;
    this.explodeMine(mine);
    this.dmgP(Math.round(35*this.diff.hpm*0.5));
    this.cameras.main.shake(200,.012);
  }

  onBulletHitMine(bullet,mine){
    if(!bullet?.active||!mine?.active) return;
    bullet.destroy(); mine.hp--;
    this.tweens.add({targets:mine,alpha:1,duration:60,yoyo:true});
    if(mine.hp<=0) this.explodeMine(mine);
  }

  explodeMine(mine){
    const ex=this.add.sprite(mine.x,mine.y,'explosion-sm').setScale(3).setDepth(15);
    ex.play('explosion-sm'); ex.once('animationcomplete',()=>ex.destroy());
    Sfx.play('boom');
    this.pts(150);
    mine.destroy();
  }

  spawnAsteroid(){
    if(this.bossOn||this.over||this.clear)return;
    const a=this.asteroids.create(Phaser.Math.Between(20,W-20),-30,'planet');
    if(!a)return;
    const sc=Phaser.Math.FloatBetween(.3,.8);
    a.setScale(sc).setDepth(4).setAlpha(.75).setTint(Phaser.Math.Between(0,1)?0xaaaaaa:0x887766);
    const ang=Phaser.Math.FloatBetween(-.3,.3);
    const spd=Math.round(90*this.diff.spm*Phaser.Math.FloatBetween(.7,1.3));
    a.setVelocity(Math.sin(ang)*spd,spd);a.setAngularVelocity(Phaser.Math.Between(-60,60));
    a.hp=Math.round(3*sc*this.diff.hpm);
    this.time.delayedCall(7000,()=>{if(a?.active)a.destroy();});
  }
  onPHA(player,ast){
    if(this.inv||!ast?.active)return;
    ast.destroy();this.dmgP(Math.round(18*this.diff.hpm*.5));this.cameras.main.shake(120,.006);
  }
  onBHA(bullet,ast){
    if(!bullet?.active||!ast?.active)return;
    bullet.destroy();ast.hp--;
    this.tweens.add({targets:ast,alpha:.3,duration:60,yoyo:true});
    if(ast.hp<=0){
      const ex=this.add.sprite(ast.x,ast.y,'explosion-sm').setScale(2).setDepth(12);
      ex.play('explosion-sm');ex.once('animationcomplete',()=>ex.destroy());
      Sfx.play('boom');ast.destroy();
    }
  }

  // ── Collision callbacks ───────────────────────────────────────────────────
  onBHE(b,e){
    if(!b?.active||!e?.active)return;b.destroy();
    const fx=this.add.sprite(e.x,e.y,'hit-fx').setScale(1.5).setDepth(12);
    fx.play('hit-fx');fx.once('animationcomplete',()=>fx.destroy());
    const dmg=Math.round(20*(this.dbl>0?2:1));
    e.hp-=dmg;
    if(e.hp<=0)this.killE(e);
    else this.tweens.add({targets:e,alpha:.3,duration:60,yoyo:true});
  }
  onBHB(b,boss){
    if(!b?.active||!boss?.active)return;b.destroy();
    this.bossHp-=Math.round(20*(this.dbl>0?2:1));
    const fx=this.add.sprite(b.x,b.y,'hit-fx').setScale(1.5).setDepth(12);
    fx.play('hit-fx');fx.once('animationcomplete',()=>fx.destroy());
    Sfx.play('hit');
    if(this.bossHp<=0){this.bossHp=0;this.killBoss();}
  }
  onPHB(player,b){if(!b?.active||this.inv)return;b.destroy();this.dmgP(b.dmg||15);}
  onPHE(player,e){if(!e?.active||this.inv)return;this.killE(e);this.dmgP(Math.round(30*this.diff.hpm*.5));}
  onPU(player,p){if(!p?.active)return;const t=p.ptype;p.destroy();this.applyPU(t);}

  killE(e){
    if(!e?.active)return;
    // Miniboss HP bar update
    if(e.type==='miniboss'&&this.mbHpFg){this.mbHpFg.destroy();this.mbHpBg.destroy();this.mbLabel.destroy();}
    const exTint=e.type==='elite'?0xffaa44:e.type==='scout'?0x44ffcc:e.type==='miniboss'?0xff4444:0xffffff;
    const ex=this.add.sprite(e.x,e.y,'explosion-sm').setScale(e.type==='miniboss'?3:2).setDepth(12).setTint(exTint);
    ex.play('explosion-sm');ex.once('animationcomplete',()=>ex.destroy());
    Sfx.play('boom');
    this.drop(e.x,e.y,e.type==='miniboss');
    this.pts({grunt:100,scout:200,elite:500,miniboss:1200}[e.type]||100);
    this.ci();
    if(e.type==='miniboss'){
      // Victory dialogue
      this.dialogueQ=[['FITZ','Lieutenant down!'],['PILOT','One down, one very large one to go.']];
      this.showNextLine();
    }
    e.destroy();
    if(!this.bossOn) this._onWaveKill();
  }

  update(time,dt){
    if(this.over||this.clear)return;
    if(Phaser.Input.Keyboard.JustDown(this.esc)){this.scene.pause('Game');this.scene.launch('Pause');return;}
    this._applyTouchInput(dt);

    this.bg1.tilePositionY-=.5;this.bg2.tilePositionY-=1;this.bg3.tilePositionY-=1.8;

    const mx=(this.cur.left.isDown||this.mov.left.isDown)?-1:(this.cur.right.isDown||this.mov.right.isDown)?1:0;
    const my=(this.cur.up.isDown||this.mov.up.isDown)?-1:(this.cur.down.isDown||this.mov.down.isDown)?1:0;
    if(this.player.active){
      this.player.setVelocity(mx*220,my*220);
      this.player.rotation=Phaser.Math.Linear(this.player.rotation,mx*.35,.15);
      this.shd.setPosition(this.player.x,this.player.y);
    }

    this.shootT-=dt;
    if(this.spc.isDown&&this.shootT<=0&&this.player.active){this.fire();this.shootT=this.diff.psr;}

    if(this.inv){this.invT-=dt;if(this.invT<=0){this.inv=false;if(this.player)this.player.setAlpha(1);}}
    if(this.shield<100){this.shdT+=dt/1000;if(this.shdT>=3){this.shield=Math.min(100,this.shield+5*dt/1000);this.uhud();}}
    if(this.combo>0){this.comboT-=dt;if(this.comboT<=0){this.combo=0;this.uhud();}}
    if(this.dbl>0){this.dbl-=dt;this.ptxt.setText(this.dbl>0?'2×DMG '+Math.ceil(this.dbl/1000)+'s':'');}

    const eSpd=Math.round(200*this.diff.spm);
    this.en.getChildren().forEach(e=>{
      if(!e.active)return;
      // Miniboss sweeps left/right
      if(e.type==='miniboss'){
        e.x=W/2+Math.sin(time/700)*160;
        e.setVelocityY(e.spd*0.4);
        // Update its HP bar
        if(this.mbHpFg&&this.mbHpBg)this.mbHpFg.width=Math.max(0,(W-80)*(e.hp/e.maxHp));
      } else if(e.pat==='side'){
        const dy=this.player.y-e.y;
        e.body.setVelocity(e.vx, e.spd*0.35+dy*0.4);
      } else if(e.pat==='centre'){
        const dx=this.player.x-e.x;
        e.body.setVelocityX(Phaser.Math.Linear(e.body.velocity.x,dx*0.6,0.04));
        e.body.setVelocityY(e.spd*0.75);
      } else {
        if(e.pat==='sine')e.x=e.sx+Math.sin(time/500+e.sOff)*70;
        e.setVelocityY(e.spd);
      }
      if(e.y>H+70||e.x<-100||e.x>W+100){e.destroy();if(!this.bossOn)this._onWaveKill();return;}
      if(e.type==='elite'||e.type==='scout'||e.type==='miniboss'){
        e.stmr-=dt;
        if(e.stmr<=0){
          const a=Phaser.Math.Angle.Between(e.x,e.y,this.player.x,this.player.y);
          const shots=e.type==='miniboss'?3:1;
          for(let s=0;s<shots;s++){
            const spread=(s-(shots-1)/2)*.25;
            const b=this.eb.create(e.x,e.y+20,'pulse');
            if(b){b.play('pulse');b.setScale(e.type==='miniboss'?2:1.2).setDepth(6).setTint(0xff3300);
              b.setVelocity(Math.cos(a+spread)*eSpd,Math.sin(a+spread)*eSpd);
              b.dmg=Math.round((e.type==='miniboss'?22:e.type==='elite'?22:13)*this.diff.hpm*.6);
              this.time.delayedCall(3000,()=>{if(b?.active)b.destroy();});}
          }
          e.stmr=Phaser.Math.Between(
            Math.round((e.type==='miniboss'?800:e.type==='elite'?1200:2500)/this.diff.srm),
            Math.round((e.type==='miniboss'?1400:e.type==='elite'?2500:4000)/this.diff.srm));
        }
      }
    });

    [...this.eb.getChildren(),...this.pb.getChildren()].forEach(b=>{
      if(b.active&&(b.y>H+30||b.y<-30||b.x<-30||b.x>W+30))b.destroy();
    });
    // Clean up tents that drift off screen
    if(this.tents) this.tents.getChildren().forEach(t=>{
      if(t.active&&(t.x<-80||t.x>W+80)) t.destroy();
    });

    if(this.bossOn&&this.boss)this.updBoss(dt);
  }
}

class Ep2PreludeScene extends Phaser.Scene {
  constructor(){super('Ep2Prelude');}
  create(){
    Sfx.init();
    this.scrollY=0; this.crawlDone=false; this.phase='crawl'; this.phaseT=0;

    // Header
    this.add.rectangle(W/2,27,W,54,0x000000,1).setDepth(19);
    this.add.rectangle(W/2,53,W,1,0x114466,1).setDepth(21);
    this.add.text(W/2,27,'✦  STARFALL: ICE REACH  ✦',
      {fontSize:'15px',fontFamily:'Courier New',color:'#88ddff',
       stroke:'#000',strokeThickness:3,fontStyle:'bold'}).setOrigin(.5).setDepth(22);

    // Vignette
    const vig=this.add.graphics().setDepth(20);
    vig.fillStyle(0x000000,1); vig.fillRect(0,0,W,54);
    for(let i=0;i<58;i++){
      vig.fillStyle(0x000000,Math.pow(1-i/58,1.4));
      vig.fillRect(0,54+i*3,W,3);
    }
    for(let i=0;i<18;i++){
      vig.fillStyle(0x000000,Math.pow(i/18,1.8));
      vig.fillRect(0,H-54+i*3,W,3);
    }

    this.skipHint=this.add.text(W/2,H-14,'[ SPACE ] Skip',
      {fontSize:'13px',fontFamily:'Courier New',color:'#445566'}).setOrigin(.5).setDepth(25);

    // Crawl lines
    const STYLE={
      shout:{sz:34,color:'#88ddff',stroke:7},
      body: {sz:24,color:'#ddffff',stroke:4},
      aside:{sz:19,color:'#aaccdd',stroke:3},
      fitz: {sz:21,color:'#44eeff',stroke:4},
    };
    const LINES=[
      {t:'shout',s:'EPISODE  II'},
      {t:'shout',s:'ICE REACH'},
      {t:'gap'},
      {t:'body', s:'The Ketharan Dominion fled the'},
      {t:'body', s:'Desert Sector — but not in defeat.'},
      {t:'body', s:'They regrouped at Ice Reach,'},
      {t:'body', s:'a frozen colony on the outer rim.'},
      {t:'gap'},
      {t:'body', s:'Their flagship, The Glacier, now'},
      {t:'body', s:'commands the entire ice field.'},
      {t:'gap'},
      {t:'fitz', s:'"Good news: we have a lead."'},
      {t:'fitz', s:'"Bad news: it is very cold."'},
      {t:'fitz', s:'"Your thermal suit is... adequate."'},
      {t:'gap'},
      {t:'aside',s:'(It is not adequate.)'},
      {t:'gap'},
      {t:'shout',s:'THE PURSUIT CONTINUES.'},
      {t:'gap'},{t:'gap'},
    ];

    const WGAP=70, LGAP=65;
    let worldY=0;
    this._crawlLines=[];
    LINES.forEach(l=>{
      if(l.t==='gap'){worldY+=WGAP*0.55;return;}
      const st=STYLE[l.t];
      const obj=this.add.text(W/2,-999,l.s,{
        fontSize:st.sz+'px',fontFamily:'Courier New',
        color:st.color,stroke:'#000000',strokeThickness:st.stroke,
        align:'center',fontStyle:l.t==='shout'?'bold':''
      }).setOrigin(.5,.5).setDepth(15).setAlpha(0);
      obj._worldY=worldY;
      this._crawlLines.push(obj);
      worldY+=LGAP;
    });
    this._totalCrawlH=worldY;

    this.input.keyboard.on('keydown',e=>{ if(e.code==='Space') this._skip(); });
    // Try playing immediately; arm fallback for browsers that block autoplay
    this.time.delayedCall(200,()=>Music.play('crawl'));
    Music.armAutoplay('crawl');
  }

  _skip(){
    this._crawlLines.forEach(o=>o.setAlpha(0));
    this._end();
  }

  _end(){
    if(this.crawlDone)return; this.crawlDone=true;
    this.skipHint.setVisible(false);
    this.cameras.main.fadeOut(500,0,8,20);
    this.cameras.main.once('camerafadeoutcomplete',()=>{
      Music.stop();
      this.scene.start('CallsignEntry');
    });
  }

  update(_t,delta){
    const dt=delta/1000;
    this.scrollY+=68*dt;

    const HORIZON=180, SPREAD=820, MIN_SC=0.10;
    this._crawlLines.forEach(obj=>{
      const progress=(this.scrollY-obj._worldY)/SPREAD;
      if(progress<0||progress>1.05){obj.setAlpha(0);return;}
      const screenY=H-progress*(H-HORIZON);
      const sc=1-progress*(1-MIN_SC);
      let alpha=1;
      if(progress>0.86) alpha=Phaser.Math.Clamp((1-progress)/0.14,0,1);
      if(progress<0.04) alpha=progress/0.04;
      obj.setPosition(W/2,screenY);
      obj.setScale(Phaser.Math.Clamp(sc,MIN_SC,1.0));
      obj.setAlpha(Phaser.Math.Clamp(alpha,0,1));
    });
    if(this.scrollY>this._totalCrawlH+SPREAD) this._end();
  }
}

// ── BOSS TRANSMISSION SCENE ───────────────────────────────────────────────────
// The Glacier commander sends a taunt before you fight. Distorted voice via Web Audio.
class BossTransmissionScene extends Phaser.Scene {
  constructor(){super('BossTransmission');}
  init(data){this.gameData=data;}
  create(){
    Sfx.init();
    this.engaged=false;
    this.add.rectangle(W/2,H/2,W,H,0x020814,1);
    this.bg=this.add.tileSprite(0,0,W,H,'bg-stars').setOrigin(0).setAlpha(.5).setTint(0x4488ff);

    // Scanline / static overlay
    const scan=this.add.graphics().setDepth(5);
    for(let y=0;y<H;y+=3){
      scan.fillStyle(0x000000,0.08);
      scan.fillRect(0,y,W,1);
    }

    // Transmission frame — green-screen comms feel
    this.add.rectangle(W/2,H/2-40,W-32,360,0x001100,0.97)
      .setStrokeStyle(2,0x00ff44).setDepth(6);
    this.add.text(W/2,H/2-216,'▶  INCOMING TRANSMISSION  ◀',
      {fontSize:'13px',fontFamily:'Courier New',color:'#00ff44',
       stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(7);

    // Static flicker before image resolves
    const staticTxt=this.add.text(W/2,H/2-80,'█▓▒░ SIGNAL LOCKED ░▒▓█',
      {fontSize:'14px',fontFamily:'Courier New',color:'#00aa22'}).setOrigin(.5).setDepth(7);
    this.tweens.add({targets:staticTxt,alpha:0.1,duration:80,yoyo:true,repeat:8,
      onComplete:()=>staticTxt.setText('')});

    // Ketharan Commander portrait — drawn procedurally
    this.time.delayedCall(900,()=>this._showCommander());

    // Countdown
    this.countdown=8;
    this.cntTxt=this.add.text(W/2+110,H-52,'ENGAGING IN  8',
      {fontSize:'13px',fontFamily:'Courier New',color:'#00ff44',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(20);
    this.tweens.add({targets:this.cntTxt,alpha:0.2,duration:500,yoyo:true,repeat:-1});
    this.cntTimer=this.time.addEvent({delay:1000,callback:this._tick,callbackScope:this,repeat:7});

    makeBtn(this,W/2+80,H-24,'ENGAGE NOW ▶','#00ff44',()=>this._engage(),140,28);
    makeBtn(this,W/2-80,H-24,'◀ RETREAT','#446688',()=>{
      this.cntTimer.remove();
      this.scene.start('Game2',{wave:0,score:0,lives:3,thermal:100,health:100,ammo:AMMO_MAX,nextLifeAt:LIFE_EVERY});
    },120,28);

    this.input.keyboard.once('keydown-SPACE',()=>this._engage());
    Music.stop();
    this._playStaticSfx();
  }

  _playStaticSfx(){
    // Distorted "transmission" sound via Web Audio
    const c=Music._ctx()||Music.ctx||Sfx.ctx;
    if(!c) return;
    const buf=c.createBuffer(1,c.sampleRate*0.4,c.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.3;
    const src=c.createBufferSource();
    const filt=c.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=800; filt.Q.value=0.5;
    const g=c.createGain(); g.gain.value=0.4;
    src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start();
  }

  _showCommander(){
    const pilot=this.registry.get('pilotName')||'PILOT';
    const diff=DIFF[this.registry.get('difficulty')||'VETERAN'];

    // Draw commander face — cold, angular, Ketharan
    const cvs=document.createElement('canvas'); cvs.width=110; cvs.height=130;
    const ctx=cvs.getContext('2d');
    // Dark bg
    ctx.fillStyle='#001100'; ctx.fillRect(0,0,110,130);
    // Helmet
    ctx.fillStyle='#002200'; ctx.beginPath();
    ctx.ellipse(55,52,44,52,0,0,Math.PI*2); ctx.fill();
    // Visor — glowing teal slit
    ctx.fillStyle='#003300'; ctx.fillRect(18,42,74,16);
    const vg=ctx.createLinearGradient(18,42,92,58);
    vg.addColorStop(0,'rgba(0,255,100,0)');
    vg.addColorStop(0.5,'rgba(0,255,100,0.9)');
    vg.addColorStop(1,'rgba(0,255,100,0)');
    ctx.fillStyle=vg; ctx.fillRect(18,42,74,16);
    // Neck
    ctx.fillStyle='#001100'; ctx.fillRect(38,100,34,30);
    // Armour chest
    ctx.fillStyle='#002200'; ctx.fillRect(10,110,90,20);
    ctx.fillStyle='#003300'; ctx.fillRect(20,112,70,5);
    // Emblem
    ctx.fillStyle='#00ff44'; ctx.font='bold 18px Courier New'; ctx.textAlign='center';
    ctx.fillText('⚔',55,127);
    // Scanline overlay on portrait
    ctx.fillStyle='rgba(0,0,0,0.15)';
    for(let y=0;y<130;y+=2) ctx.fillRect(0,y,110,1);
    // Green tint
    ctx.fillStyle='rgba(0,80,0,0.18)'; ctx.fillRect(0,0,110,130);

    const tKey='ketharan_cmd';
    if(!this.textures.exists(tKey)) this.textures.addCanvas(tKey,cvs);
    this.add.image(W/2-80,H/2-40,tKey).setScale(1.4).setDepth(8);

    // Transmission text — types out with static bursts
    const LINES=[
      `"${pilot}."`,
      `"You destroyed our Desert fleet."`,
      `"Impressive. Meaningless."`,
      `"Ice Reach does not forgive."`,
      `"The Glacier will bury you."`,
      `"— Commander Vreth, Ketharan High Command"`,
    ];
    const sx=W/2+10, sy=H/2-185;
    LINES.forEach((line,i)=>{
      this.time.delayedCall(1000+i*900,()=>{
        const obj=this.add.text(sx,sy+i*34,line,
          {fontSize:i===LINES.length-1?10:13,
           fontFamily:'Courier New',
           color:i===LINES.length-1?'#007722':'#00ff44',
           stroke:'#000',strokeThickness:2,
           wordWrap:{width:200},fontStyle:i===0?'bold':''})
          .setDepth(9).setAlpha(0);
        this.tweens.add({targets:obj,alpha:1,duration:120});
        Sfx.play('type');
        // Flicker on each line
        this._playStaticSfx();
      });
    });

    // FITZ response
    this.time.delayedCall(7200,()=>{
      const pilot2=this.registry.get('pilotName')||'PILOT';
      const fitzTxt=this.add.text(W/2,H/2+148,
        `FITZ: "I have logged Commander Vreth's statement, ${pilot2}. I found it motivating."`,
        {fontSize:'11px',fontFamily:'Courier New',color:'#44eeff',
         stroke:'#000',strokeThickness:2,wordWrap:{width:W-48},align:'center'})
        .setOrigin(.5).setDepth(9).setAlpha(0);
      this.tweens.add({targets:fitzTxt,alpha:1,duration:300});
    });
  }

  _tick(){
    this.countdown--;
    if(this.countdown<=0) this._engage();
    else{this.cntTxt.setText('ENGAGING IN  '+this.countdown);Sfx.play('warn');}
  }

  _engage(){
    if(this.engaged)return; this.engaged=true; this.cntTimer.remove();
    Sfx.play('select');
    this.cameras.main.shake(200,.01);
    this.time.delayedCall(300,()=>{
      this.cameras.main.fadeOut(500,0,8,20);
      this.cameras.main.once('camerafadeoutcomplete',()=>
        this.scene.start('Game2',{...this.gameData,spawnBossNow:true}));
    });
  }

  update(){this.bg.tilePositionY-=.6;}
}

}

    this._waveKills=0; this._waveTarget=30; this._waveDone=false; this._dripTimer=null;
    this._speedMult=1; this._dmgMult=1; this._scoreMult=1;
    this._freezeImmune=false; this._earlyReveal=false;
    // Apply passive
    const pas=PILOT_PASSIVES[this.avId];
    if(pas) pas.apply(this);
  }

  create(){
    Sfx.init();
    // Ice Reach palette — deep blue, aurora teal
    this.add.rectangle(W/2,H/2,W,H,0x020814,1);
    this.bg1=this.add.tileSprite(0,0,W,H,'bg-back').setOrigin(0).setAlpha(.75).setTint(0x4488cc);
    this.bg2=this.add.tileSprite(0,0,W,H,'bg-mid').setOrigin(0).setAlpha(.50).setTint(0x66aadd);

    this.aurora=this.add.graphics().setDepth(0).setAlpha(0.18);

    // Groups
    this.pb=this.physics.add.group({maxSize:220});
    this.eb=this.physics.add.group({maxSize:220});
    this.en=this.physics.add.group({maxSize:60});
    this.pu=this.physics.add.group();
    this.iceShards=this.physics.add.group({maxSize:40});

    // Ice trail behind ship
    this.shd=this.add.sprite(W/2,H-100,'shield-fx').setScale(2.5).setAlpha(0).setDepth(11);

    this.hud2();

    this.cur=this.input.keyboard.createCursorKeys();
    this.mov=this.input.keyboard.addKeys({up:'W',down:'S',left:'A',right:'D'});
    this.spc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.esc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

    this.physics.add.overlap(this.pb,this.en,   this.onBHE,null,this);
    this.physics.add.overlap(this.player,this.eb,this.onPHB,null,this);
    this.physics.add.overlap(this.player,this.en,this.onPHE,null,this);
    this.physics.add.overlap(this.player,this.pu,this.onPU, null,this);
    this.physics.add.overlap(this.player,this.iceShards,this.onIceShard,null,this);
    this.physics.add.overlap(this.pb,this.iceShards,this.onBulletIceShard,null,this);
    this.physics.add.overlap(this.player,this.freezeMines,this.onFreezeMine,null,this);
    this.physics.add.overlap(this.pb,this.freezeMines,this.onBulletFreezeMine,null,this);
    this.physics.add.overlap(this.player,this.supplyCrates,this.onSupplyCrate,null,this);

    // Hazard timers
    this.iceTimer=this.time.addEvent({delay:2200,loop:true,callback:this.spawnIceShard,callbackScope:this});
    this.mineTimer=this.time.addEvent({delay:8000,loop:true,callback:this.spawnFreezeMine,callbackScope:this});
    this.crateTimer=this.time.addEvent({delay:22000,loop:true,callback:this.spawnSupplyCrate,callbackScope:this});

    // Thermal drain — passive cold damage
    this.thermalDrainTimer=this.time.addEvent({
      delay:3000,loop:true,callback:()=>{
        if(!this.bossOn&&!this.over&&!this.clear){
          this.thermal=Math.max(0,this.thermal-4);
          this.uhud2();
          if(this.thermal<=0) this.dmgP(6);
        }
      }
    });

    this.cameras.main.fadeIn(500,0,8,20);
    this.uhud2();
    const _ep2Pas={0:'Scout Boost: +20% Speed',1:'Full Arsenal: 2× Ammo',2:'Early Warning: Extended Reveal',3:'Heavy Rounds: +25% DMG',4:'Heat Core: Full Thermal',5:'Cryo Suit: Freeze Immune',6:'Sharp Eyes: 2× Score',7:'Iron Will: +50% HP'};
    if(_ep2Pas[this.avId]){
      this.time.delayedCall(1200,()=>this.pop(W/2,H/2-60,'PASSIVE: '+_ep2Pas[this.avId],'#44eeff',15));
    }
    Music.play('game');
    this.hudButtons2();
    // ── Onboarding tip — wave 1 only ──────────────────────────────────────────
    this._showOnboarding2();

    this.triggerDialogue(0);

    if(this.waveIdx===0) this._showTips([
      'THERMAL drains in the cold — grab supply crates!',
      'Freeze Mines slow you to 30% for 3 seconds',
      'Ice Shards fly from all directions — dodge!',
    ],0x44ddff);
    if(this.spawnBossNow) this.time.delayedCall(800,()=>this.spawnBoss2());
    else this.nextWave2();
  }
  _showTips(lines,accent,auto=8000){
    if(this._tipsShown) return; this._tipsShown=true;
    const bw=W-40,bh=36+lines.length*28;

  _hideTips(){

  uhud2(){
    this.licons.forEach((ic,i)=>ic.setAlpha(i<this.lives?1:.15));
    this.stxt.setText(this.score.toLocaleString());
    const m=([1,2,4,8])[Math.min(this.combo,3)]*this._scoreMult;
    this.ctxt.setText(this.combo>0?'×'+m+' COMBO':'');
    this.tbar.width=Math.max(0,170*(this.thermal/100));
    this.tbar.setFillStyle(this.thermal>50?0x00ddff:this.thermal>20?0x0088cc:0xff4400);
    this.hbar.width=Math.max(0,170*(this.hp/(this.avId===7?150:100)));
    const ap=Math.max(0,this.ammo/this.ammoMax);
    this.abar.width=Math.max(0,148*ap);
    this.abar.setFillStyle(ap>0.4?0xffaa22:ap>0.15?0xff6600:0xff2200);
    this.atxt.setText(this.ammo+'/'+this.ammoMax);
    this.wtxt.setText(this.bossOn?'⚠ THE GLACIER':'WAVE '+(this.waveIdx+1)+'/3');
    if(!this.bossOn&&this._waveTarget>0){
      const rem=Math.max(0,this._waveTarget-(this._waveKills||0));
      this.etxt.setText(rem>0?'ENEMIES LEFT: '+rem:'');
    } else this.etxt.setText('');
    if(this.bossOn&&this.boss) this.bbfg.width=Math.max(0,(W-60)*(this.bossHp/this.bossMax));
    this.ftxt.setText(this.frozen?'❄ FROZEN — '+(Math.ceil(this.frozenT/1000))+'s':'');
    // Low thermal warning
    if(this.thermal<15&&!this._lowWarnFired){this._lowWarnFired=true;Sfx.play('lowres');this.pop(this.player?.x||W/2,this.player?.y-50||H/2,'⚠ LOW THERMAL','#ff4400',16);}
    else if(this.thermal>=15) this._lowWarnFired=false;
  }

  // ── Dialogue ──────────────────────────────────────────────────────────────

  showNextLine2(){
    if(!this.dialogueQ.length){this.dialogueActive=false;return;}
    this.dialogueActive=true;
    const [speaker,text]=this.dialogueQ.shift();
    const colors={FITZ:'#44eeff',CMD:'#ffdd44',PILOT:'#88ff88'};
    const bgCols={FITZ:0x001133,CMD:0x332200,PILOT:0x003322};
    const col=colors[speaker]||'#ffffff';
    const container=this.add.container(W/2,82).setDepth(70);
    const boxW=W-30,boxH=72;

      .setStrokeStyle(2.5,parseInt(col.replace('#','0x')));
    const badge=this.add.rectangle(-boxW/2+46,-boxH/2+1,96,22,parseInt(col.replace('#','0x')),1).setOrigin(.5,0);

    const msgTxt=this.add.text(0,10,'',
      {fontSize:'16px',fontFamily:'Courier New',color:'#ffffff',fontStyle:'bold',
       stroke:'#000000',strokeThickness:5,align:'center',wordWrap:{width:boxW-24}}).setOrigin(.5,.5);

    container.alpha=0;

    let ci=0;
    const tw=this.time.addEvent({delay:24,loop:true,callback:()=>{
      if(ci<text.length)msgTxt.setText(text.slice(0,++ci)); else tw.remove();
    }});

    this.time.delayedCall(readMs,()=>{
      this.tweens.add({targets:container,alpha:0,y:60,duration:280,onComplete:()=>{
        container.destroy();
        this.time.delayedCall(300,()=>this.showNextLine2());
      }});

    const title=this.add.text(0,-36,'ICE REACH — SURVIVAL TIPS',{fontSize:'11px',fontFamily:'Courier New',

    const tips=[
      '🌡 THERMAL drains in the cold — grab supply crates',

    ];

  // ── WAVE CONFIG ──────────────────────────────────────────────────────────────
  // Each wave runs a continuous drip spawner.
  // killTarget = how many kills to advance. Between kills, drip timer keeps spawning.
  _waveConfig(){
    const d=this.diff;
    const h=x=>Math.round(x*d.hpm), sp=x=>Math.round(x*d.spm);
    return [
      // WAVE 1 — Ice Drones: fast swarms, all directions, 30 kill target
      { killTarget:30, dripMs:900,
        pool:[
          {t:'grunt',hp:h(18),s:sp(110),w:5},
          {t:'scout',hp:h(28),s:sp(120),w:3},
          {t:'grunt',hp:h(16),s:sp(130),w:4},
        ]},
      // WAVE 2 — Glacier Guards: slow elites + fast chaff, 28 kill target
      { killTarget:28, dripMs:700,
        pool:[
          {t:'grunt',hp:h(20),s:sp(115),w:4},
          {t:'scout',hp:h(32),s:sp(125),w:3},
          {t:'elite',hp:h(95),s:sp(55), w:2},
        ]},
      // WAVE 3 — boss
      { boss:true },
    ];
  }

  nextWave2(){
    if(this.waveIdx>=3)return;
    const cfg=this._waveConfig()[this.waveIdx];
    this.time.delayedCall(400,()=>this.triggerDialogue(this.waveIdx));

    if(cfg.boss){
      this.time.delayedCall(1500,()=>{
        const save={score:this.score,lives:this.lives,thermal:this.thermal,health:this.hp,
                    wave:this.waveIdx,nextLifeAt:this.nextLife,ammo:this.ammo};
        Music.stop();
        this.scene.start('BossTransmission',save);
      });
      return;
    }

    // Reset wave kill counter
    this._waveKills=0;
    this._waveTarget=cfg.killTarget;
    this._waveDone=false;

    // Show wave banner
    this.time.delayedCall(600,()=>{
      const banner=this.add.text(W/2,H/2-40,'— WAVE '+(this.waveIdx+1)+' —',
        {fontSize:'28px',fontFamily:'Courier New',color:'#88ddff',
         fontStyle:'bold',stroke:'#000',strokeThickness:6}).setOrigin(.5).setDepth(65).setAlpha(0);
      const sub=this.add.text(W/2,H/2+2,cfg.killTarget+' ENEMIES INBOUND',
        {fontSize:'14px',fontFamily:'Courier New',color:'#44aacc',
         stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(65).setAlpha(0);
      this.tweens.add({targets:[banner,sub],alpha:1,duration:300,
        onComplete:()=>this.tweens.add({targets:[banner,sub],alpha:0,duration:400,delay:1800,
          onComplete:()=>{banner.destroy();sub.destroy();}})});
    });

    // Start drip spawner
    this.time.delayedCall(1200,()=>this._startDrip(cfg));
  }

  _startDrip(cfg){
    if(this._dripTimer) this._dripTimer.remove();
    const spawnOne=()=>{
      if(this._waveDone||this.bossOn||this.over||this.clear) return;
      // Pick weighted random type
      const total=cfg.pool.reduce((s,p)=>s+p.w,0);
      let r=Math.random()*total;
      let pick=cfg.pool[0];
      for(const p of cfg.pool){r-=p.w;if(r<=0){pick=p;break;}}
      this._spawnOne2(pick);
    };
    spawnOne(); // immediate first enemy
    this._dripTimer=this.time.addEvent({
      delay:cfg.dripMs, loop:true, callback:spawnOne
    });
  }

  // Spawn a single enemy from any direction
  _spawnOne2({t,hp,s}){
    const tk=t==='grunt'?'enemy-01':t==='scout'?'enemy-02':'enemy-03';
    const tint=t==='elite'?0xaaddff:t==='scout'?0x88ccff:0xcceeff;

    // Entry direction: 0=top, 1=left, 2=right, 3=centre-drop
    // Elites always from top. Others weighted toward variety
    const dirRoll=t==='elite'?0:Math.floor(Math.random()*4);
    let ex,ey,vx,vy,pat;

    if(dirRoll===0){
      // Top entry — falls straight down or angled
      ex=Phaser.Math.Between(40,W-40); ey=-50;
      const ang=Phaser.Math.FloatBetween(-0.4,0.4);
      vx=Math.sin(ang)*s; vy=s;
      pat='top';
    } else if(dirRoll===1){
      // Left side — shoots across
      ex=-50; ey=Phaser.Math.Between(80,H*0.7);
      vx=s*0.8; vy=s*0.4;
      pat='side';
    } else if(dirRoll===2){
      // Right side — shoots across
      ex=W+50; ey=Phaser.Math.Between(80,H*0.7);
      vx=-s*0.8; vy=s*0.4;
      pat='side';
    } else {
      // Centre drop — teleports to mid-screen and dives
      ex=Phaser.Math.Between(W/4,W*3/4); ey=Phaser.Math.Between(60,180);
      vx=Phaser.Math.FloatBetween(-s*0.5,s*0.5); vy=s*0.7;
      pat='centre';
    }

    const e=this.en.create(ex,ey,tk);
    if(!e) return;
    e.setScale(1.8).setDepth(5).setTint(tint);
    e.play(tk);
    e.body.setSize(32,32).setOffset(8,8);
    e.hp=hp; e.maxHp=hp; e.spd=s;
    e.type=t; e.pat=pat; e.sOff=Math.random()*6; e.sx=ex;
    e.vx=vx; e.vy=vy; // store initial velocity for pat=side
    e.body.setVelocity(vx,vy);
    e.stmr=Phaser.Math.Between(
      Math.round((t==='elite'?900:1800)/this.diff.srm),
      Math.round((t==='elite'?2000:3500)/this.diff.srm));

    // Centre-drop: flash on entry
    if(pat==='centre'){
      e.setAlpha(0);
      this.tweens.add({targets:e,alpha:1,duration:180});
    }
  }

  _onWaveKill(){
    if(this._waveDone) return;
    this._waveKills=(this._waveKills||0)+1;
    // Update wave progress in HUD
    if(this.etxt) this.etxt.setText('ENEMIES: '+Math.max(0,this._waveTarget-this._waveKills));
    if(this._waveKills>=this._waveTarget){
      this._waveDone=true;
      if(this._dripTimer){this._dripTimer.remove();this._dripTimer=null;}
      // Small pause before advance
      this.time.delayedCall(1200,()=>this.adv2());
    }
  }

  adv2(){
    const waveClearAmmo=12;
    this.ammo=Math.min(this.ammoMax,this.ammo+waveClearAmmo);
    this.thermal=Math.min(100,this.thermal+25);
    this.pop(W/2,H/2-80,'⚡ WAVE CLEAR! +'+waveClearAmmo+' AMMO  +25 THML','#88ddff',15);
    this.waveIdx++;

    if(this.waveIdx===2&&!this.swapOffered){
      this.swapOffered=true;

                  health:this.hp,wave:this.waveIdx,nextLifeAt:this.nextLife,ammo:this.ammo};
      saveEpisodeProgress(2,save);
      this.time.delayedCall(1600,()=>{Music.stop();this.scene.start('PilotSwap',save);});
      return;
    }
    if(this.waveIdx<3){this.uhud2();this.nextWave2();}
  }

  // ── ICE HAZARDS ────────────────────────────────────────────────────────────
  spawnIceShard(){
    if(this.over||this.clear)return;
    // Randomly spawn: top (70%), left side (15%), right side (15%)
    const roll=Math.random();
    const sc=Phaser.Math.FloatBetween(.18,.52);

    // Also restore thermal a little

  // ── BOSS: THE GLACIER ────────────────────────────────────────────────────────
  spawnBoss2(){
    this.bossOn=true;
    this.bossMax=Math.round(700*this.diff.bhm);
    this.bossHp=this.bossMax;
    this.bossPhase=1;
    // Three hangars, each with own HP
    this.bossHangars=[
      {hp:Math.round(180*this.diff.bhm),maxHp:Math.round(180*this.diff.bhm),destroyed:false,x:-70},
      {hp:Math.round(200*this.diff.bhm),maxHp:Math.round(200*this.diff.bhm),destroyed:false,x:0},
      {hp:Math.round(180*this.diff.bhm),maxHp:Math.round(180*this.diff.bhm),destroyed:false,x:70},
    ];
    this.bssT=Math.round(2000/this.diff.srm);
    this.bDirX=1;this.bMoveT=0;
    Sfx.play('warn');
    // EP2 boss fanfare — minor chord
    this.time.delayedCall(400,()=>{try{const ac=new AudioContext();[196,233,294,349,466].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0,ac.currentTime+i*.08);g.gain.linearRampToValueAtTime(.12,ac.currentTime+i*.08+.05);g.gain.linearRampToValueAtTime(0,ac.currentTime+i*.08+.28);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*.08);o.stop(ac.currentTime+i*.08+.3);});}catch(e){}});

    this.boss=this.physics.add.sprite(W/2,-200,'boss').setScale(2.2).setDepth(8).setTint(0x88bbff);
    this.boss.play('boss');
    this.boss.body.setSize(140,90).setOffset(26,27);

    // Hangar bay visuals
    this._hangarSprites=[];
    this.bossHangars.forEach((h,i)=>{
      const hs=this.add.rectangle(W/2+h.x,0,36,22,0x224488,0.9)
        .setStrokeStyle(2,0x44aaff).setDepth(7);
      this._hangarSprites.push(hs);
    });

    this.tweens.add({targets:this.boss,y:120,duration:2200,ease:'Back.easeOut',onComplete:()=>{
      this.bbc.setVisible(true);
      this.bbtx.setText('❄ THE GLACIER ❄');
      this._updateHangarPips();
      Music.stop();setTimeout(()=>Music.play('boss'),1200);
      this.bossGrp=this.physics.add.group();this.bossGrp.add(this.boss);
      this.physics.add.overlap(this.pb,this.bossGrp,this.onBHB2,null,this);
      this.triggerDialogue2Boss();
    }});
  }

  triggerDialogue2Boss(){
    this.dialogueQ=[
      ['FITZ','The Glacier is live. Three hangar bays — destroy them in sequence.'],
      ['PILOT','Starting with the left bay.'],
      ['FITZ','Note: Vreth\'s shrine is in the centre bay. I suggest saving it for last.'],
      ['PILOT','...FITZ.'],
      ['FITZ','For dramatic effect. Obviously.'],
    ];
    this.time.delayedCall(800,()=>this.showNextLine2());
  }

  _updateHangarPips(){
    // Draw hangar HP pips below the boss bar
    this.hangarPips.forEach(p=>p.destroy());
    this.hangarPips=[];
    this.bossHangars.forEach((h,i)=>{
      const px=W/2+(i-1)*80;
      const bg=this.add.rectangle(px,78,70,10,0x001133).setOrigin(.5).setDepth(55);
      const fg=this.add.rectangle(px-34,78,Math.max(0,68*(h.hp/h.maxHp)),10,
        h.destroyed?0x333333:0x0088ff).setOrigin(0,.5).setDepth(56);
      const lbl=this.add.text(px,88,h.destroyed?'✓ GONE':'BAY '+(i+1),
        {fontSize:'9px',fontFamily:'Courier New',
         color:h.destroyed?'#335533':'#88aacc',stroke:'#000',strokeThickness:1}).setOrigin(.5,0).setDepth(56);
      this.hangarPips.push(bg,fg,lbl);
    });
  }

  onBHB2(bullet,boss){
    if(!bullet?.active||!boss?.active)return;
    bullet.destroy();
    const dmg=Math.round(20*this._dmgMult*(this.dbl>0?2:1));
    const fx=this.add.sprite(bullet.x,bullet.y,'hit-fx').setScale(1.5).setDepth(12).setTint(0x88ddff);
    fx.play('hit-fx');fx.once('animationcomplete',()=>fx.destroy());
    Sfx.play('hit');

    // Damage goes to first non-destroyed hangar, then overflow to boss HP
    let rem=dmg;
    for(let i=0;i<this.bossHangars.length;i++){
      const h=this.bossHangars[i];
      if(h.destroyed)continue;
      const take=Math.min(h.hp,rem);
      h.hp-=take; rem-=take;
      if(h.hp<=0){
        h.hp=0;h.destroyed=true;
        this._destroyHangar(i);
      }
      break; // only damage first active hangar
    }
    // Overflow to main HP
    if(rem>0){
      this.bossHp=Math.max(0,this.bossHp-rem);
      this.flash2(this.boss);
    }
    this._updateHangarPips();
    if(this.bossHp<=0) this.killBoss2();
    else this.uhud2();
  }

  _destroyHangar(i){
    const h=this.bossHangars[i];
    const sx=this.boss?this.boss.x+h.x:W/2+h.x;
    Sfx.play('boom');
    this.cameras.main.shake(350,.014);
    for(let j=0;j<4;j++){
      this.time.delayedCall(j*140,()=>{
        const ex=this.add.sprite(sx+Phaser.Math.Between(-30,30),120+Phaser.Math.Between(-20,20),'explosion-sm')
          .setScale(2.2).setDepth(15).setTint(0x66aaff);
        ex.play('explosion-sm');ex.once('animationcomplete',()=>ex.destroy());
      });
    }
    this.pts(400);
    const destroyed=this.bossHangars.filter(h=>h.destroyed).length;
    const lines=[
      [['FITZ','Left hangar bay destroyed!'],['PILOT','Two to go.']],
      [['FITZ','Second bay down! Centre bay remaining.'],['PILOT','This is for the Desert Sector.']],
      [['FITZ','ALL HANGARS DESTROYED. The Glacier is exposed!'],['PILOT','Finish it.']],
    ];
    if(lines[destroyed-1]){
      this.dialogueQ=lines[destroyed-1];
      this.showNextLine2();
    }
    // Spawn a drone wave from destroyed hangar
    const droneCount=3+destroyed;
    for(let d=0;d<droneCount;d++){
      this.time.delayedCall(d*300,()=>{
        const e=this.en.create(sx+Phaser.Math.Between(-40,40),-30,'enemy-01');
        if(!e)return;
        e.setScale(1.6).setDepth(5).setTint(0x88aaff);e.play('enemy-01');
        e.body.setSize(32,32).setOffset(8,8);
        e.hp=Math.round(20*this.diff.hpm);e.maxHp=e.hp;
        e.spd=Math.round(95*this.diff.spm);e.type='grunt';e.pat='spread';
        e.sx=sx;e.sOff=d*.5;e.stmr=99999;
      });
    }
  }

  updBoss2(dt){
    if(!this.boss?.active)return;
    const spd=(55+(this.bossPhase>=2?40:0))*this.diff.spm;
    this.boss.x+=this.bDirX*spd*(dt/1000);
    if(this.boss.x>W-100||this.boss.x<100) this.bDirX*=-1;
    if(this.bossPhase>=2) this.boss.y=120+Math.sin(this.bMoveT/900)*30;
    this.bMoveT+=dt;
    // Update hangar sprites
    this._hangarSprites.forEach((hs,i)=>{
      const h=this.bossHangars[i];
      hs.x=this.boss.x+h.x; hs.y=this.boss.y+55;
      hs.setAlpha(h.destroyed?0.2:0.9);
    });
    this.bssT-=dt;
    if(this.bssT<=0){
      this.bShoot2();
      this.bssT=Math.round((this.bossPhase===1?1600:1000)/this.diff.srm)+Phaser.Math.Between(-200,200);
    }
    // Phase transitions
    const r=this.bossHp/this.bossMax;
    if(r<.5&&this.bossPhase===1){
      this.bossPhase=2;this.cameras.main.shake(400,.012);this.flash2(this.boss);
      this.dialogueQ=[['FITZ','Half hull! Phase 2 — ice beam sweep.'],['PILOT','Dodge wide.']];
      this.showNextLine2();
    }
    this.uhud2();
  }

  bShoot2(){
    if(!this.boss?.active)return;
    const a=Phaser.Math.Angle.Between(this.boss.x,this.boss.y,this.player.x,this.player.y);
    const spreads=this.bossPhase===1?[0]:[-0.3,0,0.3];
    spreads.forEach(s=>{
      const b=this.eb.create(this.boss.x,this.boss.y+60,'boss-bolt');
      if(!b)return;
      b.play('boss-bolt');b.setScale(3).setDepth(6).setTint(0x88aaff);
      const spd=Math.round(190*this.diff.spm);
      b.setVelocity(Math.cos(a+s)*spd,Math.sin(a+s)*spd);
      b.setRotation(a+s+Math.PI/2);
      b.dmg=Math.round(16*this.diff.hpm*.5);
      this.time.delayedCall(3000,()=>{if(b?.active)b.destroy();});
    });
    Sfx.play('shoot');
  }

  flash2(s){
    this.tweens.add({targets:s,alpha:.2,duration:80,yoyo:true,repeat:5,
      onComplete:()=>{if(s?.active)s.setAlpha(1);}});
  }

  killBoss2(){
    if(!this.boss?.active)return;
    this.bossOn=false;this.bbc.setVisible(false);
    Sfx.play('boom');
    this._hangarSprites.forEach(h=>h.destroy());

    this.dialogueQ=[
      ['FITZ','The Glacier is down! All hangar bays destroyed!'],
      ['PILOT','FITZ — signal the sector. Ice Reach is clear.'],
      ['FITZ','Signalling. Also — Vreth\'s shrine was exactly where I said it would be.'],
      ['FITZ','I have logged this as a navigational success on my part.'],
    ];

      if(!this.boss)return;
      const ex=this.add.sprite(
        this.boss.x+Phaser.Math.Between(-100,100),
        this.boss.y+Phaser.Math.Between(-70,70),'explosion-lg').setScale(2.2).setDepth(15).setTint(0x88aaff);

  }

  // ── Combat / shared helpers ─────────────────────────────────────────────────
  fire(){
    if(this.ammo<=0){
      if(!this._ammoWarnT||this.time.now-this._ammoWarnT>1200){
        this._ammoWarnT=this.time.now;
        this.pop(this.player.x,this.player.y-50,'NO AMMO!','#ff3300',18);
        Sfx.play('hit');
      }
      return;
    }
    this.ammo=Math.max(0,this.ammo-1);this.uhud2();
    Sfx.play('shoot');
    const spd=Math.round(500*this.diff.spm*.8+100);
    const b=this.pb.create(this.player.x,this.player.y-32,'pulse');
    if(!b)return;
    b.play('pulse');b.setScale(1.5).setDepth(7).setTint(0xaaddff);
    b.setVelocityY(-spd);b.dmg=Math.round(20*this._dmgMult);
    this.time.delayedCall(2000,()=>{if(b?.active)b.destroy();});
  }

  dmgP(amt){
    if(this.inv||this.over||this.clear)return;
    // Thermal absorbs before HP
    if(this.thermal>0){const a=Math.min(this.thermal,amt*0.5);this.thermal-=a;}
    this.hp-=amt;
    Sfx.play('hit');this.cameras.main.shake(180,.006);
    this.uhud2();
    if(this.hp<=0)this.die2();
  }

  die2(){
    if(this.over)return;
    Sfx.play('die');this.lives--;this.uhud2();
    const ex=this.add.sprite(this.player.x,this.player.y,'explosion-lg').setScale(2).setDepth(15);
    ex.play('explosion-lg');ex.once('animationcomplete',()=>ex.destroy());
    this.player.setActive(false).setVisible(false);
    if(this.lives>0){
      this.dialogueQ=[['FITZ','Ship down. Respawning in 3…'],['PILOT','Still here.']];
      this.showNextLine2();
      this.time.delayedCall(1600,()=>this.respawn2());
    } else {
      this.dialogueQ=[['FITZ','Systems critical. Ice Reach wins this round.'],
                      ['FITZ','The thermal logs suggest you were "adequately warm" until the end.']];
      this.showNextLine2();
      this.time.delayedCall(1400,()=>this.gameOver2());
    }
  }

  respawn2(){
    this.thermal=80;this.hp=this.avId===7?150:100;
    this.player.setPosition(W/2,H-100).setActive(true).setVisible(true);
    this.inv=true;this.invT=3000;
    this.tweens.add({targets:this.player,alpha:.25,duration:120,yoyo:true,repeat:12,
      onComplete:()=>{if(this.player)this.player.setAlpha(1);}});
    this.uhud2();
  }

  gameOver2(){
    this.over=true;Music.stop();
    [this.iceTimer,this.mineTimer,this.crateTimer,this.thermalDrainTimer,this._dripTimer]
      .forEach(t=>{if(t)t.remove();});
    const hi=parseInt(localStorage.getItem('sf_hi_ep2')||'0');
    if(this.score>hi) localStorage.setItem('sf_hi_ep2',this.score);
    this.time.delayedCall(800,()=>this.scene.start('GameOver2',{
      score:this.score,lives:0,cleared:false,wave:this.waveIdx+1,pilot:this.pilot
    }));
  }

  pts(base){
    const m=([1,2,4,8])[Math.min(this.combo,3)]*this._scoreMult;
    const e=Math.round(base*m);
    this.score+=e;
    while(this.score>=this.nextLife){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(W/2,H/2-60,'+LIFE!','#88ff88',28);}
      this.nextLife+=LIFE_EVERY;
    }
    this.pop(this.player.x+Phaser.Math.Between(-30,30),this.player.y-40,'+'+e,m>1?'#44eeff':'#fff',13);
    this.uhud2();
  }

  ci(){this.combo=Math.min(this.combo+1,3);this.comboT=4000;this.uhud2();}

  pop(x,y,t,col,sz=14){
    const o=this.add.text(x,y,t,{fontSize:sz+'px',fontFamily:'Arial',fontStyle:'bold',
      color:col,stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(60);
    this.tweens.add({targets:o,y:y-50,alpha:0,duration:900,ease:'Quad.easeOut',onComplete:()=>o.destroy()});
  }

  drop2(x,y,force=false){
    if(!force&&Math.random()>.4)return;
    const ts=['thermal','health','ammo','life'],ws=[40,30,20,10];
    let r=Math.random()*100,type='thermal';
    for(let i=0;i<ts.length;i++){r-=ws[i];if(r<=0){type=ts[i];break;}}
    const p=this.pu.create(x,y,'gems');
    if(!p)return;
    p.play('gems');p.setScale(2).setDepth(6);p.setVelocityY(80);p.ptype=type;
    p.setTint({thermal:0x44aaff,health:0xff4444,ammo:0xffaa22,life:0x88ff88}[type]||0xffffff);
    this.time.delayedCall(8000,()=>{if(p?.active)p.destroy();});
  }

  applyPU2(type){
    Sfx.play('pu');
    if(type==='thermal'){this.thermal=100;this.pop(this.player.x,this.player.y-50,'THERMAL FULL!','#44aaff',14);}
    else if(type==='health'){
      const maxHp=this.avId===7?150:100;
      this.hp=Math.min(maxHp,this.hp+40);this.pop(this.player.x,this.player.y-50,'+40 HP','#ff6666',14);
    }
    else if(type==='ammo'){this.ammo=Math.min(this.ammoMax,this.ammo+30);this.pop(this.player.x,this.player.y-50,'+30 AMMO','#ffaa22',14);}
    else if(type==='life'){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(this.player.x,this.player.y-50,'+1 LIFE!','#88ff88',18);}
      else{this.thermal=100;this.pop(this.player.x,this.player.y-50,'THERMAL FULL!','#44aaff',14);}
    }
    this.uhud2();
  }

  // ── Collision callbacks ──────────────────────────────────────────────────────
  onBHE(b,e){
    if(!b?.active||!e?.active)return;b.destroy();
    const fx=this.add.sprite(e.x,e.y,'hit-fx').setScale(1.5).setDepth(12);
    fx.play('hit-fx');fx.once('animationcomplete',()=>fx.destroy());
    const dmg=Math.round(20*this._dmgMult*(this.dbl>0?2:1));
    e.hp-=dmg;
    if(e.hp<=0)this.killE2(e);
    else this.tweens.add({targets:e,alpha:.3,duration:60,yoyo:true});
  }
  onPHB(player,b){if(!b?.active||this.inv)return;b.destroy();this.dmgP(b.dmg||14);}
  onPHE(player,e){if(!e?.active||this.inv)return;this.killE2(e);this.dmgP(Math.round(28*this.diff.hpm*.5));}
  onPU(player,p){if(!p?.active)return;const t=p.ptype;p.destroy();this.applyPU2(t);}

  killE2(e){
    if(!e?.active)return;
    const ex=this.add.sprite(e.x,e.y,'explosion-sm').setScale(2).setDepth(12).setTint(0x88aaff);
    ex.play('explosion-sm');ex.once('animationcomplete',()=>ex.destroy());
    Sfx.play('boom');
    this.drop2(e.x,e.y);
    this.pts({grunt:120,scout:250,elite:550}[e.type]||120);
    this.ci();
    e.destroy();
    if(!this.bossOn) this._onWaveKill();
  }

  update(time,dt){
    if(this.over||this.clear)return;
    if(Phaser.Input.Keyboard.JustDown(this.esc)){this.scene.pause('Game2');this.scene.launch('Pause2');return;}

    this.bg1.tilePositionY-=.4;this.bg2.tilePositionY-=.9;this.bg3.tilePositionY-=1.5;
    // Aurora drift
    this.aurora.setAlpha(0.12+Math.sin(time/2000)*0.06);

    const speedBase=220*this._speedMult;
    const mx=(this.cur.left.isDown||this.mov.left.isDown)?-1:(this.cur.right.isDown||this.mov.right.isDown)?1:0;
    const my=(this.cur.up.isDown||this.mov.up.isDown)?-1:(this.cur.down.isDown||this.mov.down.isDown)?1:0;
    const spd=this.frozen?speedBase*0.3:speedBase;
    if(this.player.active){
      this.player.setVelocity(mx*spd,my*spd);
      this.player.rotation=Phaser.Math.Linear(this.player.rotation,mx*.35,.15);
      this.shd.setPosition(this.player.x,this.player.y);
    }

    this.shootT-=dt;
    if(this.spc.isDown&&this.shootT<=0&&this.player.active){this.fire();this.shootT=this.diff.psr;}

    if(this.inv){this.invT-=dt;if(this.invT<=0){this.inv=false;if(this.player)this.player.setAlpha(1);}}
    if(this.frozen){this.frozenT-=dt;if(this.frozenT<=0){this.frozen=false;this.player.setTint(0xaaddff);}}
    if(this.combo>0){this.comboT-=dt;if(this.comboT<=0){this.combo=0;this.uhud2();}}
    if(this.dbl>0) this.dbl-=dt;

    const eSpd=Math.round(190*this.diff.spm);
    this.en.getChildren().forEach(e=>{
      if(!e.active)return;
      // Movement by pattern
      if(e.pat==='sine'){
        e.x=e.sx+Math.sin(time/500+e.sOff)*70;
        e.setVelocityY(e.spd);
      } else if(e.pat==='side'){
        // Side-entry: gradually home toward player Y, drift off bottom
        const dy=this.player.y-e.y;
        e.body.setVelocity(e.vx, e.spd*0.35+dy*0.4);
      } else if(e.pat==='centre'){
        // Centre-drop: arc toward player
        const dx=this.player.x-e.x;
        e.body.setVelocityX(Phaser.Math.Linear(e.body.velocity.x, dx*0.6, 0.04));
        e.body.setVelocityY(e.spd*0.75);
      } else {
        e.setVelocityY(e.spd);
      }
      if(e.y>H+70||e.x<-100||e.x>W+100){e.destroy();if(!this.bossOn)this._onWaveKill();return;}
      if(e.type==='elite'||e.type==='scout'){
        e.stmr-=dt;
        if(e.stmr<=0){
          const a=Phaser.Math.Angle.Between(e.x,e.y,this.player.x,this.player.y);
          const b=this.eb.create(e.x,e.y+20,'pulse');
          if(b){
            b.play('pulse');b.setScale(1.3).setDepth(6).setTint(0x88aaff);
            b.setVelocity(Math.cos(a)*eSpd,Math.sin(a)*eSpd);
            b.dmg=Math.round((e.type==='elite'?20:12)*this.diff.hpm*.6);
            this.time.delayedCall(3000,()=>{if(b?.active)b.destroy();});
          }
          e.stmr=Phaser.Math.Between(
            Math.round((e.type==='elite'?1100:2200)/this.diff.srm),
            Math.round((e.type==='elite'?2400:3800)/this.diff.srm));
        }
      }
    });

    [...this.eb.getChildren(),...this.pb.getChildren()].forEach(b=>{
      if(b.active&&(b.y>H+30||b.y<-30||b.x<-30||b.x>W+30))b.destroy();
    });
    if(this.supplyCrates) this.supplyCrates.getChildren().forEach(c=>{
      if(c.active&&(c.x<-80||c.x>W+80))c.destroy();
    });
    if(this.freezeMines) this.freezeMines.getChildren().forEach(m=>{
      if(m.active&&(m.x<-80||m.x>W+80))m.destroy();
    });

    if(this.bossOn&&this.boss) this.updBoss2(dt);
  }
}

// ── EP3 PRELUDE ───────────────────────────────────────────────────────────────
class Ep3PreludeScene extends Phaser.Scene {
  constructor(){super('Ep3Prelude');}
  create(){
    Sfx.init();
    this.scrollY=0; this.crawlDone=false;

    // Pure void — black with sparse violet stars
    this.add.rectangle(W/2,H/2,W,H,0x000000,1);
    const sg=this.add.graphics().setDepth(1);
    for(let i=0;i<220;i++){
      const r=Math.random();
      const col=r>0.85?0xaa44ff:r>0.6?0x6622cc:0x331144;
      sg.fillStyle(col,Math.random()*0.5+0.05);
      sg.fillRect(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Math.random()>0.8?2:1,1);
    }

    // Void nebula wisps
    const neb=this.add.graphics().setDepth(0).setAlpha(0.12);
    for(let i=0;i<6;i++){
      neb.fillStyle(0x8833ff,1);
      neb.fillEllipse(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),
        Phaser.Math.Between(80,200),Phaser.Math.Between(20,60));
    }

    // Header
    this.add.rectangle(W/2,27,W,54,0x000000,1).setDepth(19);
    this.add.rectangle(W/2,53,W,1,0x331144,1).setDepth(21);
    this.add.text(W/2,27,'✦  STARFALL: THE VEIL  ✦',
      {fontSize:'15px',fontFamily:'Courier New',color:'#aa44ff',
       stroke:'#000',strokeThickness:3,fontStyle:'bold'}).setOrigin(.5).setDepth(22);

    // Vignette
    const vig=this.add.graphics().setDepth(20);
    vig.fillStyle(0x000000,1); vig.fillRect(0,0,W,54);
    for(let i=0;i<58;i++){
      vig.fillStyle(0x000000,Math.pow(1-i/58,1.4));
      vig.fillRect(0,54+i*3,W,3);
    }
    for(let i=0;i<18;i++){
      vig.fillStyle(0x000000,Math.pow(i/18,1.8));
      vig.fillRect(0,H-54+i*3,W,3);
    }

    this.skipHint=this.add.text(W/2,H-14,'[ SPACE ] Skip',
      {fontSize:'13px',fontFamily:'Courier New',color:'#c8b8dd'}).setOrigin(.5).setDepth(25);

    const STYLE={
      shout:{sz:34,color:'#aa44ff',stroke:7},
      body: {sz:24,color:'#ddccff',stroke:4},
      aside:{sz:19,color:'#ccaae8',stroke:3},
      fitz: {sz:21,color:'#cc88ff',stroke:4},
    };
    const LINES=[
      {t:'shout',s:'EPISODE  III'},
      {t:'shout',s:'THE VEIL'},
      {t:'gap'},
      {t:'body', s:'The Ketharan Dominion has fled'},
      {t:'body', s:'into the Veil — deep space,'},
      {t:'body', s:'absolute darkness.'},
      {t:'gap'},
      {t:'body', s:'No maps. No signals.'},
      {t:'body', s:'No backup.'},
      {t:'gap'},
      {t:'fitz', s:'"I have located their flagship."'},
      {t:'fitz', s:'"The Sovereign. It is cloaked."'},
      {t:'fitz', s:'"Everything here is cloaked."'},
      {t:'aside',s:'(FITZ paused for three seconds.)'},
      {t:'fitz', s:'"We have a Sonar Pulse."'},
      {t:'gap'},
      {t:'body', s:'Use it wisely.'},
      {t:'body', s:'In the Veil, you cannot shoot'},
      {t:'body', s:'what you cannot see.'},
      {t:'gap'},
      {t:'shout',s:'END THIS.'},
      {t:'gap'},{t:'gap'},
    ];

    const WGAP=70, LGAP=64;
    let worldY=0;
    this._crawlLines=[];
    LINES.forEach(l=>{
      if(l.t==='gap'){worldY+=WGAP*0.55;return;}
      const st=STYLE[l.t];
      const obj=this.add.text(W/2,-999,l.s,{
        fontSize:st.sz+'px',fontFamily:'Courier New',
        color:st.color,stroke:'#000000',strokeThickness:st.stroke,
        align:'center',fontStyle:l.t==='shout'?'bold':''
      }).setOrigin(.5,.5).setDepth(15).setAlpha(0);
      obj._worldY=worldY;
      this._crawlLines.push(obj);
      worldY+=LGAP;
    });
    this._totalCrawlH=worldY;

    this.input.keyboard.on('keydown',e=>{if(e.code==='Space')this._skip();});
    this.time.delayedCall(200,()=>Music.play('crawl'));
    Music.armAutoplay('crawl');
  }

  _skip(){this._crawlLines.forEach(o=>o.setAlpha(0));this._end();}

  _end(){
    if(this.crawlDone)return; this.crawlDone=true;
    this.skipHint.setVisible(false);
    this.cameras.main.fadeOut(500,0,0,10);
    this.cameras.main.once('camerafadeoutcomplete',()=>{
      Music.stop();
      this.scene.start('Ep3Callsign');
    });
  }

  update(_t,delta){
    const dt=delta/1000;
    this.scrollY+=68*dt;
    const HORIZON=180, SPREAD=820, MIN_SC=0.10;
    this._crawlLines.forEach(obj=>{
      const progress=(this.scrollY-obj._worldY)/SPREAD;
      if(progress<0||progress>1.05){obj.setAlpha(0);return;}
      const screenY=H-progress*(H-HORIZON);
      const sc=1-progress*(1-MIN_SC);
      let alpha=1;
      if(progress>0.86) alpha=Phaser.Math.Clamp((1-progress)/0.14,0,1);
      if(progress<0.04) alpha=progress/0.04;
      obj.setPosition(W/2,screenY);
      obj.setScale(Phaser.Math.Clamp(sc,MIN_SC,1.0));
      obj.setAlpha(Phaser.Math.Clamp(alpha,0,1));
    });
    if(this.scrollY>this._totalCrawlH+SPREAD) this._end();
  }
}

}

    this.boss=null; this.bossGrp=null;
    this._waveKills=0; this._waveTarget=0; this._waveDone=false; this._dripTimer=null;

  create(){
    Sfx.init();
    // Pure void — near-total darkness
    this.add.rectangle(W/2,H/2,W,H,0x000000,1);

    // Distant void stars — very sparse, faint violet
    this.bg3=this.add.tileSprite(0,0,W,H,'bg-stars').setOrigin(0).setAlpha(.25).setTint(0x6622aa);
    this.bg3b=this.add.tileSprite(0,0,W,H,'bg-back').setOrigin(0).setAlpha(.08).setTint(0x440088);
    // Ship's own light cone — small radius around player
    this._lightMask=this.add.graphics().setDepth(90);

    // Void nebula wisps (decorative)
    this._nebula=this.add.graphics().setDepth(0);
    for(let i=0;i<8;i++){
      this._nebula.fillStyle(0x6611aa,0.04+Math.random()*0.04);
      this._nebula.fillEllipse(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),
        Phaser.Math.Between(100,260),Phaser.Math.Between(30,80));
    }

    // Groups
    this.pb=this.physics.add.group({maxSize:200});
    this.eb=this.physics.add.group({maxSize:200});
    this.en=this.physics.add.group({maxSize:60});
    this.pu=this.physics.add.group();
    this.riftGroup=this.physics.add.staticGroup();

    // Player ship
    this.player=this.physics.add.sprite(W/2,H-100,'ship')
      .setScale(2).setCollideWorldBounds(true).setDepth(30).setTint(0xcc88ff);
    this.player.play('ship');
    this.player.body.setSize(32,32).setOffset(8,8);

    // Ship light aura
    this._shipLight=this.add.graphics().setDepth(29);

    // Sonar pulse ring visual
    this._sonarRing=this.add.graphics().setDepth(85);

    // Shield sprite
    this.shd=this.add.sprite(W/2,H-100,'shield-fx').setScale(2.5).setAlpha(0).setDepth(31);

    this.hud3();

    this.cur=this.input.keyboard.createCursorKeys();
    this.mov=this.input.keyboard.addKeys({up:'W',down:'S',left:'A',right:'D'});
    this.spc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.esc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);
    // Q = Sonar Pulse
    this.sonarKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Q);

    this.physics.add.overlap(this.pb,this.en,   this.onBHE3,null,this);
    this.physics.add.overlap(this.player,this.eb,this.onPHB3,null,this);
    this.physics.add.overlap(this.player,this.en,this.onPHE3,null,this);
    this.physics.add.overlap(this.player,this.pu,this.onPU3, null,this);

    // Void rifts — dark pull zones
    this._riftTimer=this.time.addEvent({delay:14000,loop:true,callback:this.spawnRift,callbackScope:this});

    // Energy regen timer
    this._energyTimer=this.time.addEvent({
      delay:500,loop:true,callback:()=>{
        if(!this.over&&!this.clear){
          this.energy=Math.min(this.energyMax,this.energy+3*this._energyRegen);
          this.uhud3();
        }
      }
    });

    this.cameras.main.fadeIn(500,0,0,10);
    this.uhud3();
    this._drawShipLight();
    const _ep3Pas={0:'Scout Boost: +25% Speed',1:'Full Arsenal: 2× Energy',2:'Phantom Sight: 2× Reveal',3:'Heavy Rounds: +30% DMG',4:'Hot Core: 2× Energy Regen',5:'Ghost Suit: Void Immune',6:'Sharp Eyes: 2× Score',7:'Iron Will: +50% HP'};
    if(_ep3Pas[this.avId]){
      this.time.delayedCall(1200,()=>this.pop(this.player.x,this.player.y-70,'PASSIVE: '+_ep3Pas[this.avId],'#cc88ff',15));
    }
    Music.play('game');
    this.hudButtons3();
    this._setupTouch();
    // Mobile sonar button — touch only
    if(this.sys.game.device.input.touch){
      const sb=this.add.text(W-16,H/2,'◎\nSONAR',{fontSize:'18px',fontFamily:'Courier New',
        color:'#cc88ff',align:'center',stroke:'#000',strokeThickness:3}).setOrigin(1,.5).setDepth(100).setAlpha(0.75);
      sb.setInteractive({useHandCursor:true});
      sb.on('pointerdown',()=>this.fireSonar());
      sb.on('pointerover',()=>sb.setAlpha(1)); sb.on('pointerout',()=>sb.setAlpha(0.75));
    }
    // ── Onboarding tip — wave 1 only ──────────────────────────────────────────
    this._showOnboarding3();

    this.triggerDialogue3(0);

    if(this.waveIdx===0) this._showTips([
      '[Q] SONAR PULSE — reveals all hidden enemies (5 charges)',
      'Phantoms only visible when they fire — watch the flash',
      'ENERGY regens slowly — aim precisely, do not spray',
      'The boss is invisible — Sonar required to deal damage',
    ],0xcc88ff,10000);
    if(this.spawnBossNow) this.time.delayedCall(800,()=>this.spawnBoss3());
    else this.nextWave3();
  }
  _showTips(lines,accent,auto=8000){
    if(this._tipsShown) return; this._tipsShown=true;
    const bw=W-40,bh=36+lines.length*28;
    const con=this.add.container(W/2,H/2-10).setDepth(95).setAlpha(0);
    con.add(this.add.rectangle(0,0,bw,bh,0x000000,0.93).setStrokeStyle(2,accent));
    con.add(this.add.text(0,-bh/2+12,'THE VEIL — NEW MECHANICS',{fontSize:'11px',fontFamily:'Courier New',
      color:'#'+accent.toString(16).padStart(6,'0'),fontStyle:'bold',letterSpacing:2}).setOrigin(.5));
    lines.forEach((l,i)=>con.add(this.add.text(0,-bh/2+28+i*26,l,
      {fontSize:'12px',fontFamily:'Courier New',color:'#ffffff',stroke:'#000',strokeThickness:2}).setOrigin(.5)));

      {fontSize:'9px',fontFamily:'Courier New',color:'#442255'}).setOrigin(.5));
    this.tweens.add({targets:con,alpha:1,duration:400});
    this._tipsCon=con; this._tipTimer=this.time.delayedCall(auto,()=>this._hideTips());
    this.input.once('pointerdown',()=>this._hideTips());
  }
  _hideTips(){
    if(!this._tipsCon) return; if(this._tipTimer) this._tipTimer.remove();
    this.tweens.add({targets:this._tipsCon,alpha:0,duration:300,
      onComplete:()=>{this._tipsCon&&this._tipsCon.destroy();this._tipsCon=null;}});
  }

  // ── LIGHTING ─────────────────────────────────────────────────────────────────
  _drawShipLight(){
    this._shipLight.clear();
    if(!this.player?.active) return;
    const px=this.player.x, py=this.player.y;
    // Soft ambient glow
    const steps=12;
    for(let i=steps;i>0;i--){
      const r=i/steps;
      this._shipLight.fillStyle(0x8833ff, 0.018*(1-r));
      this._shipLight.fillCircle(px,py,120*r);
    }
    // Bright core
    this._shipLight.fillStyle(0xffffff,0.06);
    this._shipLight.fillCircle(px,py,22);
    // Persistent white outline ring — always visible in void
    this._shipLight.lineStyle(2,0xffffff,0.55);
    this._shipLight.strokeCircle(px,py,26);
    this._shipLight.lineStyle(1,0xcc88ff,0.25);
    this._shipLight.strokeCircle(px,py,34);
  }

  _drawSonarRing(progress){
    // Expanding ring during sonar pulse
    this._sonarRing.clear();
    if(!this.sonarActive) return;
    const px=this.player.x, py=this.player.y;
    const maxR=Math.max(W,H)*1.2;
    const r=maxR*progress;
    const alpha=Math.max(0,0.6*(1-progress));
    this._sonarRing.lineStyle(3,0xcc88ff,alpha);
    this._sonarRing.strokeCircle(px,py,r);
    this._sonarRing.lineStyle(1,0xaa44ff,alpha*0.4);
    this._sonarRing.strokeCircle(px,py,r*0.7);
  }

  uhud3(){
    this.licons.forEach((ic,i)=>ic.setAlpha(i<this.lives?1:.15));
    this.stxt.setText(this.score.toLocaleString());
    const m=([1,2,4,8])[Math.min(this.combo,3)]*this._scoreMult;
    this.ctxt.setText(this.combo>0?'×'+m+' COMBO':'');
    const maxHp=this._maxHp||100;
    this.hbar.width=Math.max(0,155*(this.hp/maxHp));
    this.ebar.width=Math.max(0,155*(this.energy/this.energyMax));
    this.ebar.setFillStyle(this.energy>30?0xaa44ff:this.energy>10?0x7722bb:0xff2222);
    this.wtxt.setText(this.bossOn?'☽ THE SOVEREIGN':'WAVE '+(this.waveIdx+1)+'/3');
    // Sonar pips
    this.sonarPips.forEach((p,i)=>{ if(p&&p.setFillStyle) p.setFillStyle(i<this.sonarCharges?0xcc88ff:0x110022,i<this.sonarCharges?0.9:0.2); });
    if(this.sonarCharges===1&&!this._sonarWarnFired){this._sonarWarnFired=true;Sfx.play('lowres');this.pop(this.player?.x||W/2,(this.player?.y||H/2)-60,'⚠ LAST SONAR CHARGE','#ff8800',15);}
    if(this.energy<15&&!this._lowNrgFired){this._lowNrgFired=true;Sfx.play('lowres');this.pop(this.player?.x||W/2,(this.player?.y||H/2)-50,'⚠ ENERGY CRITICAL','#ff2200',15);}
    else if(this.energy>=15) this._lowNrgFired=false;
    // Enemy count
    if(!this.bossOn&&this._waveTarget>0){
      const rem=Math.max(0,this._waveTarget-(this._waveKills||0));
      this.etxt.setText(rem>0?'ENEMIES LEFT: '+rem:'');
    } else this.etxt.setText('');
    if(this.bossOn&&this.boss) this.bbfg.width=Math.max(0,(W-60)*(this.bossHp/this.bossMax));
  }

  hudButtons3(){
    const pb=this.add.text(W-8,H-20,'[ESC] PAUSE',
      {fontSize:'11px',fontFamily:'Courier New',color:'#c8b8dd',stroke:'#000',strokeThickness:1})
      .setOrigin(1,1).setDepth(80).setInteractive({useHandCursor:true});
    pb.on('pointerover',()=>pb.setColor('#cc88ff'));
    pb.on('pointerout', ()=>pb.setColor('#331144'));
    pb.on('pointerdown',()=>{this.scene.pause('Game3');this.scene.launch('Pause3');});
  }

  DIALOGUES3={
    0:[
      ['FITZ',`Systems online. FITZ active. The Veil is… quiet.`],
      ['PILOT','Too quiet.'],
      ['FITZ',`Yes. That is because everything here is invisible. Use the Sonar. Press Q.`],

  triggerDialogue3(idx){
    const lines=this.DIALOGUES3[idx];
    if(!lines||this.dialogueActive) return;
    this.dialogueQ=[...lines]; this.showNextLine3();
  }

  showNextLine3(){
    if(!this.dialogueQ.length){this.dialogueActive=false;return;}
    this.dialogueActive=true;
    const [speaker,text]=this.dialogueQ.shift();
    const colors={FITZ:'#cc88ff',CMD:'#ffdd44',PILOT:'#88ff88'};
    const bgCols={FITZ:0x0d0020,CMD:0x332200,PILOT:0x003322};
    const col=colors[speaker]||'#ffffff';
    const container=this.add.container(W/2,82).setDepth(70);
    const boxW=W-30,boxH=72;
    const bg=this.add.rectangle(0,0,boxW,boxH,bgCols[speaker]||0x0d0020,0.97)
      .setStrokeStyle(2.5,parseInt(col.replace('#','0x')));
    const badge=this.add.rectangle(-boxW/2+46,-boxH/2+1,96,22,parseInt(col.replace('#','0x')),1).setOrigin(.5,0);
    const spkTxt=this.add.text(-boxW/2+46,-boxH/2+11,speaker,
      {fontSize:'15px',fontFamily:'Arial',color:'#000000',fontStyle:'bold'}).setOrigin(.5,.5);
    const msgTxt=this.add.text(0,10,'',
      {fontSize:'16px',fontFamily:'Courier New',color:'#ffffff',fontStyle:'bold',
       stroke:'#000000',strokeThickness:5,align:'center',wordWrap:{width:boxW-24}}).setOrigin(.5,.5);
    container.add([bg,badge,spkTxt,msgTxt]);
    container.alpha=0;
    this.tweens.add({targets:container,y:82,alpha:1,duration:180,ease:'Quad.easeOut'});
    let ci=0;
    const tw=this.time.addEvent({delay:24,loop:true,callback:()=>{
      if(ci<text.length) msgTxt.setText(text.slice(0,++ci)); else tw.remove();
    }});
    const readMs=Math.max(2600,text.length*60);
    this.time.delayedCall(readMs,()=>{
      this.tweens.add({targets:container,alpha:0,y:60,duration:280,onComplete:()=>{
        container.destroy();
        this.time.delayedCall(300,()=>this.showNextLine3());
      }});
    });
  }

  // ── SONAR PULSE ───────────────────────────────────────────────────────────────
  fireSonar(){
    if(this.sonarCharges<=0||this.sonarCooldown>0) return;
    this.sonarCharges--;
    this.sonarCooldown=3000;
    this.sonarActive=true;
    this.sonarT=0;
    const revealMs=3000*this._revealMult;
    Sfx.play('warn');
    // Reveal all enemies temporarily
    this.en.getChildren().forEach(e=>{
      if(!e.active) return;
      e.setAlpha(1);
      e._revealed=true;
      e._revealT=revealMs;
    });
    // Boss too
    if(this.boss?.active&&!this.bossVisible){
      this.boss.setAlpha(0.85);
      this._bossRevealT=revealMs;
    }
    // Flash the screen with a violet pulse
    const flash=this.add.rectangle(W/2,H/2,W,H,0x8833ff,0.18).setDepth(88);
    this.tweens.add({targets:flash,alpha:0,duration:600,onComplete:()=>flash.destroy()});
    this.pop(this.player.x,this.player.y-60,'◎ SONAR PULSE','#cc88ff',16);
    this.time.delayedCall(800,()=>{this.sonarActive=false;this._sonarRing.clear();});
    this.uhud3();
  }

  _showOnboarding3(){
    if(this.waveIdx>0) return;
    const box=this.add.container(W/2,H-200).setDepth(75).setAlpha(0);
    const bg=this.add.rectangle(0,0,W-32,108,0x000000,0.92).setStrokeStyle(1.5,0xaa44ff,0.8);
    const title=this.add.text(0,-40,'THE VEIL — SURVIVAL TIPS',{fontSize:'11px',fontFamily:'Courier New',
      color:'#cc88ff',letterSpacing:2,stroke:'#000',strokeThickness:2}).setOrigin(.5);
    const tips=[
      '◎ Press Q — Sonar Pulse reveals cloaked enemies',
      '👻 Phantoms are invisible until they shoot',
      '⚡ Energy regens — fire sparingly when low',
      '◈ Void Rifts pull your ship — dodge wide',
    ];
    tips.forEach((t,i)=>box.add(this.add.text(0,-20+i*22,t,{fontSize:'12px',fontFamily:'Arial',
      color:['#cc88ff','#aa66dd','#8844bb','#664499'][i],stroke:'#000',strokeThickness:2}).setOrigin(.5)));
    box.add(this.add.text(0,68,'[ Fire to dismiss ]',{fontSize:'10px',fontFamily:'Courier New',color:'#441166'}).setOrigin(.5));
    box.add(bg,title);
