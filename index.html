function injectAll(scene, onProgress) {
  const textures = scene.sys.game.textures;
  const keys = Object.keys(A);
  let done = 0;
  return Promise.all(keys.map(key => new Promise(resolve => {
    const [src, fw, fh] = A[key];
    if (textures.exists(key)) { onProgress && onProgress(++done, keys.length); resolve(); return; }
    const img = new Image();
    img.onload = () => {
      textures.addImage(key, img);
      if (fw > 0) {
        const tex = textures.get(key);
        const cols = Math.floor(img.naturalWidth / fw);
        const rows = Math.floor(img.naturalHeight / fh);
        tex.add('__BASE', 0, 0, 0, img.naturalWidth, img.naturalHeight);
        let idx = 0;
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            tex.add(idx++, 0, c*fw, r*fh, fw, fh);
      }
      onProgress && onProgress(++done, keys.length);
      resolve();
    };
    img.onerror = () => { onProgress && onProgress(++done, keys.length); resolve(); };
    img.src = src;
  })));
}

// ── Web Audio SFX ─────────────────────────────────────────────────────────────
const Sfx={
  ctx:null,
  init(){
    if(!this.ctx){
      // Try to reuse Music's context if it already exists
      if(Music.ctx){ this.ctx=Music.ctx; return; }
      try{ this.ctx=new(window.AudioContext||window.webkitAudioContext)(); Music.ctx=this.ctx; }catch(e){}
    }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume();
  },
  tone(freq,dur,type='sine',vol=0.15,f2=null){
    if(!this.ctx)return;
    const g=this.ctx.createGain(),o=this.ctx.createOscillator();
    o.connect(g);g.connect(this.ctx.destination);
    const t=this.ctx.currentTime;
    o.type=type;o.frequency.setValueAtTime(freq,t);
    if(f2)o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.linearRampToValueAtTime(0,t+dur);
    o.start(t);o.stop(t+dur);
  },
  chord(notes,dur,type='sine',vol=0.14){notes.forEach((f,i)=>setTimeout(()=>this.tone(f,dur,type,vol),i*80));},
  play(id){
    this.init();
    if(id==='shoot')       this.tone(880,.08,'sine',.10,440);
    else if(id==='hit')    this.tone(200,.15,'sawtooth',.20,60);
    else if(id==='boom')   this.tone(140,.45,'sawtooth',.35,25);
    else if(id==='pu')     this.chord([440,660,880],.12);
    else if(id==='life')   this.chord([523,659,784,1047],.12,'sine',.15);
    else if(id==='warn')   this.tone(110,.6,'square',.28,155);
    else if(id==='clear')  this.chord([523,659,784,880,1047],.15,'sine',.18);
    else if(id==='die')    this.tone(380,.9,'sawtooth',.45,40);
    else if(id==='type')   this.tone(1200,.04,'sine',.04);
    else if(id==='select') this.chord([660,880],.1,'sine',.15);
    else if(id==='click')  this.tone(440,.06,'sine',.12,330);
    else if(id==='miniboss')this.chord([110,138,165],.4,'square',.22);
    else if(id==='lowres')  this.tone(220,.18,'square',.08,180);
  }
};

// ── MUSIC ENGINE (Procedural chiptune via Web Audio) ─────────────────────────
// Four distinct tracks synthesised in real-time — no external files needed.
const Music={
  ctx: null,
  vol: 0.32,
  playing: false,
  currentTrack: null,
  _nodes: [],   // active oscillators / intervals to clean up
  _masterGain: null,
  _fadeInt: null,

  _ctx(){
    if(!this.ctx){
      try{
        this.ctx = new(window.AudioContext||window.webkitAudioContext)();
        // Share with Sfx
        Sfx.ctx = this.ctx;
      }catch(e){ return null; }
    }
    if(this.ctx.state==='suspended') this.ctx.resume().catch(()=>{});
    return this.ctx;
  },

  _mg(){
    if(!this._masterGain){
      const c=this._ctx(); if(!c) return null;
      this._masterGain=c.createGain();
      this._masterGain.gain.value=this.vol;
      this._masterGain.connect(c.destination);
    }
    return this._masterGain;
  },

  // -- Low-level helpers --
  _osc(freq,type,gainVal,dest,detune=0){
    const c=this._ctx(); const mg=this._mg();
    if(!c||!mg) return null;
    const g=c.createGain(); g.gain.value=gainVal; g.connect(dest||mg);
    const o=c.createOscillator(); o.type=type;
    o.frequency.value=freq; o.detune.value=detune;
    o.connect(g); o.start();
    this._nodes.push(o,g);
    return {o,g};
  },

  _filter(type,freq,q,dest){
    const c=this._ctx(); const mg=this._mg();
    if(!c||!mg) return null;
    const f=c.createBiquadFilter();
    f.type=type; f.frequency.value=freq; if(q) f.Q.value=q;
    f.connect(dest||mg);
    this._nodes.push(f);
    return f;
  },

  // Schedule a simple chiptune arpeggio / pulse pattern
  _pattern(notes, bpm, waveType, volBase, dest, repeat=true){
    const period=60000/bpm;
    let idx=0;
    const c=this._ctx(); if(!c) return null;
    const fn=()=>{
      if(!this.playing) return;
      const freq=notes[idx%notes.length];
      const g=c.createGain(); g.gain.setValueAtTime(volBase,c.currentTime);
      g.gain.linearRampToValueAtTime(0,c.currentTime+period/1000*0.7);
      g.connect(dest||(this._mg()||c.destination));
      const o=c.createOscillator(); o.type=waveType; o.frequency.value=freq;
      o.connect(g); o.start(); o.stop(c.currentTime+period/1000*0.65);
      this._nodes.push(o,g); idx++;
    };
    fn(); // play first note immediately
    const id=setInterval(()=>{ if(!this.playing){clearInterval(id);return;} fn(); },period);
    this._nodes.push({stop:()=>clearInterval(id)});
    return id;
  },

  // -- Track definitions --
  _trackMenu(){
    // Bright, catchy, retro arcade riff — C major pentatonic
    const mg=this._mg(); if(!mg) return;
    const c=this._ctx();
    // Reverb-like send
    const filt=this._filter('lowpass',3200,0.8,mg);
    // Melody — square wave, medium pace
    const mel=[523,659,784,1047,784,659,523,440,523,659,784,1047,880,784,659,523];
    this._pattern(mel,220,'square',0.07,filt);
    // Bass — lower octave sine
    const bas=[131,165,196,262,196,165,131,110,131,165,196,262,220,196,165,131];
    this._pattern(bas,220,'triangle',0.09,mg);
    // Chord pad — slow pulse
    this._osc(261,'sawtooth',0.018,mg); this._osc(329,'sawtooth',0.012,mg); this._osc(392,'sawtooth',0.010,mg);
    // Arpeggiated high notes
    const hi=[2093,2637,3136,2093,2637,3136,2093,2637];
    this._pattern(hi,440,'square',0.025,mg);
  },

  _trackCrawl(){
    // Slow, dramatic, mysterious — minor feel
    const mg=this._mg(); if(!mg) return;
    const filt=this._filter('lowpass',1800,1.2,mg);
    const mel=[220,247,261,293,261,247,220,196,220,247,261,293,261,247,261,220];
    this._pattern(mel,100,'sawtooth',0.055,filt);
    const bas=[55,62,65,73,65,62,55,49,55,62,65,73,65,62,65,55];
    this._pattern(bas,100,'triangle',0.09,mg);
    // Slow swelling pad
    this._osc(110,'sawtooth',0.018,mg); this._osc(138,'sawtooth',0.012,mg);
  },

  _trackGame(){
    // Upbeat, driving, tense — F minor, fast
    const mg=this._mg(); if(!mg) return;
    const filt=this._filter('lowpass',4200,0.9,mg);
    // Lead melody
    const mel=[349,415,440,523,493,440,415,349,392,440,466,523,466,440,392,349];
    this._pattern(mel,300,'square',0.065,filt);
    // Driving bass
    const bas=[87,104,110,131,123,110,104,87,98,110,116,131,116,110,98,87];
    this._pattern(bas,300,'triangle',0.10,mg);
    // Percussion-ish click
    const perc=[1,1,0,1,1,0,1,0].map(v=>v?880:0);
    this._pattern(perc,600,'square',0.018,mg);
    // Counter-melody (off-beat arpeggio for texture)
    const arp=[523,0,659,0,440,0,523,0,466,0,587,0,392,0,466,0];
    this._pattern(arp,300,'triangle',0.028,filt);
    // Harmony pads
    this._osc(174,'square',0.014,mg,5); this._osc(220,'square',0.010,mg,-5);
  },

  _trackBoss(){
    // Intense, heavy, fast — chromatic tension
    const mg=this._mg(); if(!mg) return;
    const filt=this._filter('lowpass',5000,1.5,mg);
    // Aggressive sawtooth lead
    const mel=[440,466,493,415,440,466,415,392,440,466,493,523,466,440,392,370];
    this._pattern(mel,360,'sawtooth',0.060,filt);
    // Heavy bass
    const bas=[55,58,61,51,55,58,51,48,55,58,61,65,58,55,48,46];
    this._pattern(bas,360,'sawtooth',0.10,mg);
    // Tense high pulse
    const hi=[1760,1760,0,1760,0,1760,1760,0];
    this._pattern(hi,720,'square',0.028,mg);
    // Sub rumble
    this._osc(27.5,'sine',0.12,mg);
  },

  _stopAll(){
    this._nodes.forEach(n=>{
      try{
        if(n.stop) n.stop();
        if(n.disconnect) n.disconnect();
      }catch(e){}
    });
    this._nodes=[];
    if(this._masterGain){
      try{ this._masterGain.disconnect(); }catch(e){}
      this._masterGain=null;
    }
  },

  play(trackName){
    if(this.currentTrack===trackName && this.playing) return;
    this._stopAll();
    this.playing=true;
    this.currentTrack=trackName;
    const c=this._ctx(); if(!c) return;
    if(c.state==='suspended') c.resume().catch(()=>{});
    // Re-init master gain at current vol
    this._masterGain=c.createGain();
    this._masterGain.gain.value=this.vol;
    this._masterGain.connect(c.destination);
    const tracks={menu:()=>this._trackMenu(),crawl:()=>this._trackCrawl(),game:()=>this._trackGame(),boss:()=>this._trackBoss()};
    (tracks[trackName]||tracks.menu)();
  },

  stop(){
    if(!this.playing) return;
    this.playing=false;
    this.currentTrack=null;
    // Fade master gain then stop
    const mg=this._masterGain; const c=this.ctx;
    if(mg&&c){
      const t=c.currentTime;
      mg.gain.setValueAtTime(mg.gain.value,t);
      mg.gain.linearRampToValueAtTime(0,t+0.5);
      setTimeout(()=>this._stopAll(), 600);
    } else { this._stopAll(); }
  },

  setVol(v){
    this.vol=Math.max(0,Math.min(1,v));
    if(this._masterGain) this._masterGain.gain.value=this.vol;
  },

  armAutoplay(trackName){
    const fn=()=>{
      this.play(trackName);
      document.removeEventListener('keydown',fn,true);
      document.removeEventListener('pointerdown',fn,true);
    };
    document.addEventListener('keydown',fn,true);
    document.addEventListener('pointerdown',fn,true);
  },
};
// Arm music autoplay globally
Music.armAutoplay('menu');

function drawAvatar(canvas, av, scale=1) {
  const S=scale, ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const px=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(Math.round(x*S),Math.round(y*S),Math.round(w*S),Math.round(h*S));};

  // Each avatar has unique hair style based on id
  const hairstyles=[
    // 0 NOVA: short spiky
    (s)=>{px(14,2,20,4,av.accent);px(12,4,4,4,av.accent);px(32,4,4,4,av.accent);px(16,1,4,3,av.accent);px(24,0,4,3,av.accent);},
    // 1 VEGA: long flowing
    (s)=>{px(10,2,28,6,av.accent);px(8,6,6,12,av.accent);px(34,6,6,14,av.accent);px(10,14,4,4,av.accent);},
    // 2 ORION: mohawk
    (s)=>{px(20,0,8,10,av.accent);px(18,4,12,6,av.accent);},
    // 3 LYRA: bun with strands
    (s)=>{px(14,0,20,8,av.accent);px(22,0,4,3,'#ffffff');px(8,6,6,6,av.accent);px(34,6,6,6,av.accent);},
    // 4 SIRIUS: buzz cut
    (s)=>{px(12,2,24,4,av.accent);px(10,4,28,3,av.accent);},
    // 5 ASTRA: twin tails
    (s)=>{px(12,2,24,5,av.accent);px(8,6,8,14,av.accent);px(32,6,8,14,av.accent);px(8,16,6,4,av.accent);px(34,16,6,4,av.accent);},
    // 6 ZEPHYR: shaved sides
    (s)=>{px(16,2,16,8,av.accent);px(14,4,20,5,av.accent);},
    // 7 CORONA: wild curly
    (s)=>{px(10,1,28,8,av.accent);px(8,4,6,8,av.accent);px(34,4,6,8,av.accent);px(12,0,8,4,av.accent);px(22,0,10,4,av.accent);px(10,8,6,4,av.accent);px(32,8,6,4,av.accent);},
  ];

  // Head (skin)
  px(12,8, 24,20, av.skin);
  // Ears
  px(8, 14, 4, 8, av.skin);
  px(36,14, 4, 8, av.skin);
  // Hair
  (hairstyles[av.id]||hairstyles[0])(S);

  // Eyes (2px each)
  px(16,14, 4, 4, '#ffffff');  // white
  px(28,14, 4, 4, '#ffffff');
  px(17,15, 2, 2, av.visor);   // iris colour
  px(29,15, 2, 2, av.visor);
  px(17,15, 1, 1, '#000000');  // pupil
  px(29,15, 1, 1, '#000000');

  // Eyebrows
  px(15,12, 6, 2, av.accent);
  px(27,12, 6, 2, av.accent);

  // Nose
  px(22,18, 4, 2, av.skin==='#f5c89a'?'#e8a87c':av.skin==='#c68642'?'#a06830':'#3a2818');

  // Mouth — small smile
  px(17,22, 4, 2, '#cc6644');
  px(27,22, 4, 2, '#cc6644');
  px(21,24, 6, 2, '#cc6644');

  // Neck
  px(18,28, 12, 5, av.skin);

  // Body / flight suit
  px(6, 33, 36, 15, av.body);
  // Collar
  px(16,31, 16, 4, '#111122');
  px(18,32, 12, 2, av.accent);
  // Arms
  px(2, 33, 6, 14, av.body);
  px(40,33, 6, 14, av.body);
  // Hands
  px(2, 45, 6, 3, av.skin);
  px(40,45, 6, 3, av.skin);
  // Suit pocket / badge
  px(10,36, 10, 8, '#000000');
  px(11,37, 8, 6, av.accent);
  // Belt
  px(6, 46, 36, 2, '#222222');
  px(20,46, 8, 3, '#888888');
}

function getAvatarCanvas(avId, size=48) {
  const av=AVATARS[avId]||AVATARS[0];
  const cvs=document.createElement('canvas');
  cvs.width=size; cvs.height=size;
  drawAvatar(cvs, av, size/48);
  return cvs;
}


// ── RETRO STARFALL LOGO GENERATOR ────────────────────────────────────────────
// Draws a pixel-art style STARFALL logo onto a canvas for use as a Phaser texture.
// Style: chunky outlined letters, star-scan glow lines, desert amber/gold palette.
function buildStarfallLogo(w=440, h=110) {
  const cvs = document.createElement('canvas');
  cvs.width = w; cvs.height = h;
  const ctx = cvs.getContext('2d');

  // Background — transparent
  ctx.clearRect(0, 0, w, h);

  // ── Outer glow halo ─────────────────────────────────────────────────────────
  const grd = ctx.createLinearGradient(0, 0, w, 0);
  grd.addColorStop(0,   'rgba(255,150,0,0)');
  grd.addColorStop(0.5, 'rgba(255,200,50,0.18)');
  grd.addColorStop(1,   'rgba(255,150,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, w, h);

  // ── Scan lines (horizontal retro CRT lines) ─────────────────────────────────
  for(let y = 0; y < h; y += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, y, w, 2);
  }

  // ── Main text — STARFALL ────────────────────────────────────────────────────
  // Shadow / depth layer
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur  = 22;
  ctx.font        = 'bold 74px "Courier New", Courier, monospace';
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';

  // Dark outline (multiple offsets = chunky pixel feel)
  ctx.fillStyle = '#000000';
  for(let dx = -4; dx <= 4; dx += 2)
    for(let dy = -4; dy <= 4; dy += 2)
      if(dx!==0||dy!==0)
        ctx.fillText('STARFALL', w/2+dx, h/2-6+dy);

  // Gold gradient fill
  const tg = ctx.createLinearGradient(0, h/2-42, 0, h/2+42);
  tg.addColorStop(0,   '#ffe866');
  tg.addColorStop(0.35,'#ffcc00');
  tg.addColorStop(0.65,'#ff9900');
  tg.addColorStop(1,   '#cc5500');
  ctx.fillStyle = tg;
  ctx.fillText('STARFALL', w/2, h/2-6);

  // Chrome highlight stripe across upper third of letters
  ctx.globalAlpha = 0.22;
  ctx.fillStyle   = '#ffffff';
  ctx.fillRect(0, h/2-42, w, 18);
  ctx.globalAlpha = 1;

  // ── Subtitle ────────────────────────────────────────────────────────────────
  ctx.shadowBlur = 8; ctx.shadowColor = '#ff8800';
  ctx.font       = 'bold 16px "Courier New", Courier, monospace';
  const sg = ctx.createLinearGradient(0,0,w,0);
  sg.addColorStop(0,   '#cc7700');
  sg.addColorStop(0.5, '#ffcc44');
  sg.addColorStop(1,   '#cc7700');
  ctx.fillStyle  = sg;
  ctx.letterSpacing = '6px';
  ctx.fillText('✦  D E S E R T  S E C T O R  ✦', w/2, h-16);
  ctx.letterSpacing = '0px';

  // ── Star sparkles ───────────────────────────────────────────────────────────
  ctx.shadowBlur = 4;
  const stars = [
    [18,14,5],[w-18,14,5],[18,h-14,4],[w-18,h-14,4],
    [w/2-170,h/2-30,3],[w/2+170,h/2-30,3],
  ];
  stars.forEach(([sx,sy,sz])=>{
    ctx.shadowColor='#ffee00';
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1=Math.PI*2*i/5-Math.PI/2;
      const a2=a1+Math.PI/5;
      i===0?ctx.moveTo(sx+Math.cos(a1)*sz,sy+Math.sin(a1)*sz)
           :ctx.lineTo(sx+Math.cos(a1)*sz,sy+Math.sin(a1)*sz);
      ctx.lineTo(sx+Math.cos(a2)*sz*0.4,sy+Math.sin(a2)*sz*0.4);
    }
    ctx.closePath(); ctx.fill();
  });
  ctx.shadowBlur=0;
  return cvs;
}

// Register the logo canvas as a Phaser texture (called from Boot scene)
function registerLogoTexture(scene) {
  if(!scene.textures.exists('sf-logo')) {
    const cvs = buildStarfallLogo(440,110);
    scene.textures.addCanvas('sf-logo', cvs);
  }
}

class BootScene extends Phaser.Scene {
  constructor(){super('Boot');}
  create(){
    this.add.rectangle(W/2,H/2,W,H,0x000820);
    this.add.text(W/2,H/2-60,'STARFALL',{fontSize:'40px',fontFamily:'Courier New',color:'#88bbff',stroke:'#001133',strokeThickness:6}).setOrigin(.5);
    this.add.text(W/2,H/2-24,'DESERT SECTOR',{fontSize:'16px',fontFamily:'Courier New',color:'#446688',letterSpacing:6}).setOrigin(.5);
    const bar=this.add.rectangle(W/2-150,H/2+20,0,14,0x4488ff).setOrigin(0,.5);
    this.add.rectangle(W/2,H/2+20,304,18,0x112244).setOrigin(.5);
    const lbl=this.add.text(W/2,H/2+44,'Initialising systems…',{fontSize:'12px',fontFamily:'Courier New',color:'#446688'}).setOrigin(.5);
    const keys=Object.keys(A), textures=this.sys.game.textures;
    const injectOne=(key)=>new Promise(resolve=>{
      const [src,fw,fh]=A[key];
      if(textures.exists(key)){bar.width=300*(keys.indexOf(key)+1)/keys.length;resolve();return;}
      const img=new Image();
      img.onload=()=>{
        textures.addImage(key,img);
        if(fw>0){const tex=textures.get(key),cols=Math.floor(img.naturalWidth/fw),rows=Math.floor(img.naturalHeight/fh);
          tex.add('__BASE',0,0,0,img.naturalWidth,img.naturalHeight);
          let idx=0;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)tex.add(idx++,0,c*fw,r*fh,fw,fh);}
        bar.width=300*(keys.indexOf(key)+1)/keys.length;lbl.setText(key+' ✓');resolve();
      };
      img.onerror=()=>resolve(); img.src=src;
    });
    (async()=>{
      for(const key of keys) await injectOne(key);
      defineAnims(this);
      registerLogoTexture(this);
      this.registry.set('targetPrelude','Prelude'); this.scene.start('FTUXScene');
    })();
  }
}

    const nreplay=this.add.text(0,74,'↺  Replay Prelude',
      {fontSize:'13px',fontFamily:'Arial',color:'#4466cc'})
      .setOrigin(.5).setInteractive({useHandCursor:true});
    nreplay.on('pointerover',()=>{nreplay.setStyle({color:'#2244aa',fontSize:'13px',fontFamily:'Arial'});});
    nreplay.on('pointerout', ()=>{nreplay.setStyle({color:'#4466cc',fontSize:'13px',fontFamily:'Arial'});});
    nreplay.on('pointerdown',()=>{Sfx.play('select');this.replayPrelude();});

    this.namePanel.add([npbg,npStripe,nptitle,npdiv0,npdesc,ninputBg,this.nameTxt,nphint,ndiv,nreplay]);

    this.cursorOn=true;
    this.time.addEvent({delay:500,loop:true,callback:()=>{
      this.cursorOn=!this.cursorOn;
      if(this.nameMode) this.nameTxt.setText((this.pilotName||'')+(this.cursorOn?'|':''));
    }});
    this.input.keyboard.on('keydown',e=>this.onKey(e));

    // Crawl starts immediately — FTUXScene already handled the entry gate
    this._crawlStarted=true;
    this.phase='intro'; this.phaseT=0;
    this.time.delayedCall(200,()=>Music.play('crawl'));
    Music.armAutoplay('crawl');
  }

  onKey(e){
    if(!this.nameMode){
      if(e.code==='Space') this.skipAll();
      return;
    }
    if(e.key==='Enter'){
      if(this.pilotName.trim().length>0){
        this.registry.set('pilotName',this.pilotName.trim().toUpperCase());
        localStorage.setItem('sf_pilot',this.pilotName.trim().toUpperCase());
        Sfx.play('select'); Music.stop();
        this.cameras.main.fadeOut(400,0,0,0);
        this.cameras.main.once('camerafadeoutcomplete',()=>this.scene.start('DifficultySelect'));
      }
    } else if(e.key==='Backspace'){
      this.pilotName=this.pilotName.slice(0,-1);
      this.nameTxt.setText(this.pilotName+(this.cursorOn?'▋':''));
    } else if(e.key.length===1&&this.pilotName.length<14){
      this.pilotName+=e.key; Sfx.play('type');
      this.nameTxt.setText(this.pilotName+(this.cursorOn?'▋':''));
    }
  }

  skipAll(){
    this.introTxt.setAlpha(0); this.logoMain.setAlpha(0); this.logoSub.setAlpha(0);
    this._crawlLines.forEach(o=>o.setAlpha(0));
    this.crawlDone=false;
    this.endCrawl();
  }

  replayPrelude(){
    this.tweens.add({targets:this.namePanel,y:H+200,duration:400,ease:'Quad.easeIn'});
    this.crawlDone=false; this.nameMode=false; this.scrollY=0;
    this._crawlLines.forEach(o=>o.setAlpha(0));
    this.phase='logo'; this.phaseT=0;
    this.logoMain.setAlpha(0).setScale(3.5);
    this.logoSub.setAlpha(0).setScale(3.5);
    this.skipHint.setVisible(true);
  }

  endCrawl(){
    if(this.crawlDone)return; this.crawlDone=true;
    this.skipHint.setVisible(false);
    this._crawlLines.forEach(o=>o.setAlpha(0));
    // Fade to dedicated callsign screen
    this.cameras.main.fadeOut(600,0,0,0);
    this.cameras.main.once('camerafadeoutcomplete',()=>{
      Music.stop();
      this.scene.start('CallsignEntry');
    });
  }

  update(_t,delta){
    const dt=delta/1000;
    this.phaseT+=dt;

    if(!this._crawlStarted) return;
    if(this.phase==='intro'){
      if     (this.phaseT<1.5) this.introTxt.setAlpha(this.phaseT/1.5);
      else if(this.phaseT<4.5) this.introTxt.setAlpha(1);
      else if(this.phaseT<6.0) this.introTxt.setAlpha(1-(this.phaseT-4.5)/1.5);
      else { this.introTxt.setAlpha(0); this.phase='logo'; this.phaseT=0; }
      return;
    }

    if(this.phase==='logo'){
      if(this.phaseT<0.06){
        this.logoMain.setAlpha(1).setScale(3.5); this.logoSub.setAlpha(1).setScale(3.5);
      } else if(this.phaseT<2.2){
        const ease=1-Math.pow(1-this.phaseT/2.2,3);
        const sc=Math.max(3.5-ease*3.45,0.05);
        this.logoMain.setScale(sc); this.logoSub.setScale(sc);
        if(this.phaseT>1.7){const a=1-(this.phaseT-1.7)/0.5; this.logoMain.setAlpha(a); this.logoSub.setAlpha(a);}
      } else {
        this.logoMain.setAlpha(0); this.logoSub.setAlpha(0);
        this.phase='crawl'; this.phaseT=0; this.scrollY=0;
      }
      return;
    }

    if(this.phase==='crawl'||this.phase==='name'){
      if(this.phase==='crawl') this.scrollY+=65*dt;  // fast

      // ── THE CORRECT STAR WARS FORMULA ────────────────────────────────────
      // Lines sit on a road that recedes from bottom of screen (viewer's feet)
      // to the horizon (vanishing point at the top).
      //
      // progress = how far the line has travelled from screen-bottom to horizon
      //   0.0 → line is at bottom of screen (y=H), scale=1.0 (full size)
      //   1.0 → line is at horizon (y=HORIZON), scale=MIN_SC (tiny)
      //   <0  → line hasn't entered the screen yet (below bottom)
      //
      // progress = (scrollY - l._worldY) / SPREAD
      //   When scrollY < l._worldY: progress<0 → line not on screen yet ✓
      //   When scrollY = l._worldY: progress=0 → line enters at bottom ✓
      //   When scrollY = l._worldY+SPREAD: progress=1 → line at horizon ✓

      const HORIZON=180;  // y-coordinate of vanishing point
      const SPREAD=860;   // world-units from entry to exit (controls how much is visible)
      const MIN_SC=0.10;  // scale at vanishing point

      this._crawlLines.forEach(obj=>{
        const progress=(this.scrollY-obj._worldY)/SPREAD;

        if(progress<0||progress>1.05){ obj.setAlpha(0); return; }

        const screenY=H-progress*(H-HORIZON);
        const sc=1-progress*(1-MIN_SC);

        // Mist fade-in near horizon (top 14% of travel)
        let alpha=1;
        if(progress>0.86) alpha=Phaser.Math.Clamp((1-progress)/0.14,0,1);
        // Soft entrance at very bottom
        if(progress<0.04) alpha=progress/0.04;

        obj.setPosition(W/2,screenY);
        obj.setScale(Phaser.Math.Clamp(sc,MIN_SC,1.0));
        obj.setAlpha(Phaser.Math.Clamp(alpha,0,1));
      });

      if(this.phase==='crawl'&&this.scrollY>this._totalCrawlH+SPREAD) this.endCrawl();
    }
  }
}

    this.add.text(W/2,40,'Select a character to fly with',
      {fontSize:'12px',fontFamily:'Courier New',color:'#6688aa'}).setOrigin(.5).setDepth(2);

    // 2×4 grid (2 columns wide, 4 rows tall) — much larger cells
    const SZ=96, COLS=2, ROWS=4, HGAP=20, VGAP=12;
    const totalW=COLS*(SZ+HGAP)-HGAP;
    const startX=W/2-totalW/2+SZ/2;  // left column centre
    const startY=90;
    this.selected=chosen;
    this.panels=[];

    AVATARS.forEach((av,i)=>{
      const col=i%COLS, row=Math.floor(i/COLS);
      const cx=startX+col*(SZ+HGAP);
      const cy=startY+row*(SZ+VGAP+40)+SZ/2;

      const texKey='avs_'+i;
      if(!this.textures.exists(texKey)) this.textures.addCanvas(texKey,getAvatarCanvas(i,SZ));

      const isChosen=i===chosen;
      const bCol=isChosen?0x88ccff:0x334466;
      const cell=this.add.rectangle(cx,cy,SZ+12,SZ+12,0x000d22,isChosen?1:0.85)
        .setStrokeStyle(isChosen?3:1,bCol).setInteractive({useHandCursor:true}).setDepth(2);

      const img=this.add.image(cx,cy,texKey).setDepth(3);

      // Name + role below avatar
      const nameTx=this.add.text(cx,cy+SZ/2+6,av.name,
        {fontSize:'14px',fontFamily:'Courier New',fontStyle:'bold',
         color:isChosen?'#ffffff':'#aabbcc',stroke:'#000',strokeThickness:3})
        .setOrigin(.5,0).setDepth(3);
      const roleTx=this.add.text(cx,cy+SZ/2+24,av.role,
        {fontSize:'10px',fontFamily:'Courier New',
         color:isChosen?'#88ccff':'#445566',stroke:'#000',strokeThickness:2})
        .setOrigin(.5,0).setDepth(3);

      const check=this.add.text(cx+SZ/2,cy-SZ/2,'✓',
        {fontSize:'18px',fontFamily:'Courier New',color:'#44ff88',stroke:'#000',strokeThickness:3})
        .setOrigin(1,0).setDepth(4).setVisible(isChosen);

      cell.on('pointerover',()=>{ if(i!==this.selected){cell.setStrokeStyle(2,0x6699cc);nameTx.setColor('#ffffff');} Sfx.play('click'); });
      cell.on('pointerout', ()=>{ if(i!==this.selected){cell.setStrokeStyle(1,0x334466);nameTx.setColor('#aabbcc');} });
      cell.on('pointerdown',()=>this.selectAvatar(i));
      this.panels.push({cell,nameTx,roleTx,check});
    });

    // Buttons at bottom
    makeBtn(this,W/2+80,H-38,'CONFIRM  ▶','#88ff88',()=>this.confirm(),155,42);
    makeBtn(this,W/2-80,H-38,'◀  BACK','#446688',()=>{
      this.cameras.main.fadeOut(300,0,0,0);
      this.cameras.main.once('camerafadeoutcomplete',()=>this.scene.start('DifficultySelect'));
    },130,42);
    this.add.text(W/2,H-12,'Your portrait will appear in the game HUD',
      {fontSize:'11px',fontFamily:'Courier New',color:'#334455'}).setOrigin(.5).setDepth(5);
  }

  selectAvatar(i){
    Sfx.play('select');
    const old=this.panels[this.selected];
    old.cell.setStrokeStyle(1,0x334466).setFillStyle(0x000d22,0.85);
    old.nameTx.setColor('#aabbcc'); old.check.setVisible(false);
    this.selected=i;
    const cur=this.panels[i];
    cur.cell.setStrokeStyle(3,0x88ccff).setFillStyle(0x000d22,1);
    cur.nameTx.setColor('#ffffff'); cur.check.setVisible(true);
  }

  confirm(){
    this.registry.set('avatarId',this.selected); Sfx.play('select');
    this.cameras.main.fadeOut(400,0,0,0);
    this.cameras.main.once('camerafadeoutcomplete',()=>
      this.scene.start('Game',{wave:0,score:0,lives:3,shield:100,health:100,nextLifeAt:LIFE_EVERY}));
  }
}


// ── BOSS DOSSIER ─────────────────────────────────────────────────────────────

      ['',                               '#0',     11, 50],
      ['DESIGNATION:',                   '#ff6655',11,700],
      ['DESERT VIPER',                   '#ff2222',22,200],
      ['',                               '#0',     11, 60],
      ['CLASS:  Dreadnought-Alpha',      '#ffaaaa',12,500],
      [`HP:     ${bossHp} units`,        '#ffaaaa',12,300],
      ['PHASES: 3  (50% · 20%)',         '#ffaaaa',12,300],
      ['',                               '#0',     11, 80],
      ['WEAPONS:',                       '#ff6655',11,500],
      ['> Plasma Bolt Array',            '#ffcccc',12,300],
      ['> Twin Ray Cannons',             '#ffcccc',12,300],
      ['> Phase-3 Double Burst',         '#ffcccc',12,300],
      ['',                               '#0',     11,100],
      ['FITZ INTEL:',                    '#ff6655',11,600],
      ['"Never lost. Has a shrine',      '#ffaa44',12,200],
      [' to himself. Very annoying."',   '#ffaa44',12,100],
      [`"Until today." — ${pilot}`,      '#ffdd66',13,400],
    ];

    this.crawlIdx=0; this.crawlObjs=[];
    const sx=230, sy=52, lg=30;
    this.scheduleIdx=0;
    const schedule=()=>{
      if(this.scheduleIdx>=LINES.length)return;
      const [txt,color,size,delay]=LINES[this.scheduleIdx];
      this.time.delayedCall(delay,()=>{
        if(txt&&txt!==''){
          const obj=this.add.text(sx,sy+this.scheduleIdx*lg,txt,
            {fontSize:size+'px',fontFamily:'Courier New',color,stroke:'#000',strokeThickness:2})
            .setDepth(15).setAlpha(0);
          this.tweens.add({targets:obj,alpha:1,duration:100});
          Sfx.play('type');
        }
        this.scheduleIdx++; schedule();
      });
    };
    schedule();

    this.countdown=6;
    this.cntTxt=this.add.text(W/2+20,H-56,'ENGAGING IN  6',
      {fontSize:'15px',fontFamily:'Courier New',color:'#ff4444',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(20);
    this.tweens.add({targets:this.cntTxt,alpha:0.25,duration:500,yoyo:true,repeat:-1});
    this.cntTimer=this.time.addEvent({delay:1000,callback:this.tick,callbackScope:this,repeat:5});

    // Engage & back buttons
    makeBtn(this,W/2+60,H-24,'ENGAGE NOW ▶','#ff4444',()=>this.engage(),140,28);
    makeBtn(this,W/2-80,H-24,'◀ RETREAT','#446688',()=>{
      this.cntTimer.remove();
      this.scene.start('MainMenu');
    },120,28);

    this.input.keyboard.once('keydown-SPACE',()=>this.engage());
  }

  tick(){
    this.countdown--;
    if(this.countdown<=0)this.engage();
    else{this.cntTxt.setText('ENGAGING IN  '+this.countdown);Sfx.play('warn');}
  }

  engage(){
    if(this.engaged)return; this.engaged=true; this.cntTimer.remove();
    Sfx.play('select');
    this.tweens.add({targets:this.bossSpr,scaleX:2.8,scaleY:2.8,duration:400,ease:'Quad.easeIn'});
    this.cameras.main.shake(300,.01);
    this.time.delayedCall(450,()=>{
      this.cameras.main.fadeOut(600,0,0,0);
      this.cameras.main.once('camerafadeoutcomplete',()=>
        this.scene.start('Game',{...this.gameData,spawnBossNow:true}));
    });
  }
  update(){this.bg.tilePositionY-=.8;this.bs.tilePositionY-=2.2;}
}

// ── GAME SCENE ────────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor(){super('Game');}
  init(d){
    const dk=this.registry.get('difficulty')||'VETERAN';
    this.diff=DIFF[dk];
    this.pilot=this.registry.get('pilotName')||'PILOT';
    this.score=d.score??0; this.lives=d.lives??3;
    this.shield=d.shield??100; this.hp=d.health??100;
    this.waveIdx=d.wave??0; this.nextLife=d.nextLifeAt??LIFE_EVERY;
    this.spawnBossNow=d.spawnBossNow||false;
    this.combo=0;this.comboT=0;this.shdT=0;
    this.inv=false;this.invT=0;
    this.bossOn=false;this.over=false;this.clear=false;
    this.dbl=0;this.shootT=0;
    this.bossHp=0;this.bossMax=0;this.bossPhase=0;
    this.bssT=0;this.bDirX=1;this.bMoveT=0;this.bRayT=5000;
    this.boss=null;this.bossGrp=null;this.bcL=null;this.bcR=null;
    this.dossierShown=false;
    this.dialogueQ=[];this.dialogueActive=false;
    this.minibossSpawned=false;
    this.ammo=d.ammo??AMMO_MAX;     // current ammo count
    this.ammoMax=AMMO_MAX;
    this.tents=null;                // Phaser group for desert tents
  }

  create(){
    Sfx.init();
    // Bright daytime space — warm teal/cyan sky with vivid stars
    this.add.rectangle(W/2,H/2,W,H,0x061428,1);  // deep teal base
    this.bg1=this.add.tileSprite(0,0,W,H,'bg-back').setOrigin(0).setAlpha(.80).setTint(0x88ddff);
    this.bg2=this.add.tileSprite(0,0,W,H,'bg-mid').setOrigin(0).setAlpha(.55).setTint(0xaaeeff);
    this.bg3=this.add.tileSprite(0,0,W,H,'bg-stars').setOrigin(0).setAlpha(.90).setTint(0xffffff);
    // Ambient glow — warm light
    this.add.rectangle(W/2,H/2,W,H,0x224488,0.15);
    this.pl=this.add.image(W*.3,-60,'planet').setScale(3.5).setAlpha(.3);
    this.tweens.add({targets:this.pl,y:H+80,duration:22000,repeat:-1});

    this.pb=this.physics.add.group({maxSize:220});
    this.eb=this.physics.add.group({maxSize:220});
    this.en=this.physics.add.group({maxSize:60});
    this.pu=this.physics.add.group();

    this.player=this.physics.add.sprite(W/2,H-100,'ship').setScale(2).setCollideWorldBounds(true).setDepth(10);
    this.player.play('ship');
    this.player.body.setSize(32,32).setOffset(8,8);
    this.shd=this.add.sprite(W/2,H-100,'shield-fx').setScale(2.5).setAlpha(0).setDepth(11);

    this.hud();

    this.cur=this.input.keyboard.createCursorKeys();
    this.mov=this.input.keyboard.addKeys({up:'W',down:'S',left:'A',right:'D'});
    this.spc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.esc=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

    this.physics.add.overlap(this.pb,this.en,   this.onBHE,null,this);
    this.physics.add.overlap(this.player,this.eb,this.onPHB,null,this);
    this.physics.add.overlap(this.player,this.en,this.onPHE,null,this);
    this.physics.add.overlap(this.player,this.pu,this.onPU, null,this);

    // Asteroids
    this.asteroids=this.physics.add.group({maxSize:14});
    this.physics.add.overlap(this.player,this.asteroids,this.onPHA,null,this);
    this.physics.add.overlap(this.pb,this.asteroids,this.onBHA,null,this);
    this.astTimer=this.time.addEvent({delay:3000,loop:true,callback:this.spawnAsteroid,callbackScope:this});

    // Desert mines — drift horizontally across the field, flash before detonating
    this.mines=this.physics.add.group({maxSize:8});
    this.physics.add.overlap(this.player,this.mines,this.onPlayerHitMine,null,this);
    this.physics.add.overlap(this.pb,this.mines,this.onBulletHitMine,null,this);
    this.mineTimer=this.time.addEvent({
      delay:5500, loop:true, callback:this.spawnMine, callbackScope:this
    });

    // ── Desert Tents — ammo resupply stations ──────────────────────────────
    this.tents=this.physics.add.group({maxSize:8}); // dynamic so they can drift
    this._tentTimer=this.time.addEvent({
      delay:16000, loop:true, callback:this.spawnTent, callbackScope:this
    });
    this.physics.add.overlap(this.player,this.tents,this.onPlayerHitTent,null,this);
    

    const d=this.diff;
    const h=x=>Math.round(x*d.hpm), sp=x=>Math.round(x*d.spm);

    // ── Dialogue scripts (waveIdx → lines) ──────────────────────────────────
    // Format: [speaker:'FITZ'|'CMD'|'PILOT', text]
    this.DIALOGUES={
      0:[ // Game start
        ['FITZ',`Online. Navigation AI FITZ, at your service, ${this.pilot}.`],
        ['PILOT','Just get me through this, FITZ.'],
        ['FITZ','Charming. First wave inbound. Try not to scratch the paint.'],
      ],
      1:[
        ['CMD','Command to '+this.pilot+'. Three carrier groups gone. You\'re all we\'ve got.'],
        ['PILOT','No pressure then.'],
        ['CMD','Scouts incoming. Stay sharp.'],
      ],
      3:[ // first elites
        ['FITZ','Elite fighters detected. Tougher hull, better aim.'],
        ['PILOT','Of course they are.'],
        ['FITZ','On the bright side — they explode the same way.'],
      ],
      4:[
        ['CMD','Halfway there, '+this.pilot+'. Sector command is watching.'],
        ['PILOT','Tell them to watch someone else. I\'m busy.'],
        ['FITZ','Pincer formation incoming. Classic Ketharan move. Predictable.'],
      ],
      5:[
        ['FITZ','Long-range scan complete. The Viper is ONE wave away.'],
        ['PILOT','The boss ship?'],
        ['FITZ','The very one. Also it has a shrine to itself. Just saying.'],
      ],
      6:[ // final wave before boss
        ['CMD','This is it, '+this.pilot+'. Destroy this wave and the Viper is exposed.'],
        ['PILOT','Copy that. FITZ — shields to maximum.'],
        ['FITZ','Already done. Also I have filed a complaint with HR on your behalf.'],
        ['FITZ','HR has not responded. HR is gone.'],
      ],
    };

    // ── Wave script — faster, more enemies, boss on wave 5 ─────────────────
    // Wave config — drip system
    this._waveConfig=[
      // W1 — Desert Raiders: 25 kills, one every 1.1s
      { killTarget:25, dripMs:1100, miniboss:false,
        pool:[{t:'grunt',hp:h(22),s:sp(90),w:5},{t:'scout',hp:h(30),s:sp(100),w:3}]},
      // W2 — Cross-Attack: 28 kills, one every 0.95s
      { killTarget:28, dripMs:950, miniboss:false,
        pool:[{t:'grunt',hp:h(28),s:sp(95),w:4},{t:'scout',hp:h(38),s:sp(110),w:3},{t:'grunt',hp:h(25),s:sp(85),w:3}]},
      // W3 — Elite Escort + Miniboss: 30 kills, one every 0.85s
      { killTarget:30, dripMs:850, miniboss:true,
        pool:[{t:'grunt',hp:h(32),s:sp(100),w:4},{t:'scout',hp:h(48),s:sp(95),w:3},{t:'elite',hp:h(90),s:sp(65),w:2}]},
      // W4 — Boss
      { boss:true },
    ];
    this._waveKills=0; this._waveTarget=25; this._waveDone=false; this._dripTimer=null;
    this.cameras.main.fadeIn(500,0,0,0);
    this.uhud();
    // Passive confirmation
    const _avPas={0:'+20% Speed',1:'2× Ammo Cap',2:'Early Warning',3:'+25% Damage',4:'Heat Core',5:'Freeze Immune',6:'2× Score',7:'+50% HP'};
    if(_avPas[this.avId||0]){
      this.time.delayedCall(1200,()=>this.pop(W/2,H/2-60,'PASSIVE: '+_avPas[this.avId||0],'#ffdd44',16));
    }
    Sfx.init();
    Music.play('game');

    // HUD pause/restart overlay buttons (always visible in-game)
    this.hudButtons();
    // ── Onboarding tip — wave 1 only ──────────────────────────────────────────
    if(this.waveIdx===0) this._showTips([
      'WASD / Arrows — Move   |   SPACE — Fire',
      'Ammo is FINITE — watch the bar, grab tents',
      'Shield regens after 3s without taking damage',
    ],0xffe866);
    if(this.spawnBossNow){ this.time.delayedCall(800,()=>this.spawnBoss()); }
    else { this.nextWave(); }
  }
  _showTips(lines,accent,auto=8000){
    if(this._tipsShown) return; this._tipsShown=true;
    const bw=W-40,bh=36+lines.length*28;
    const con=this.add.container(W/2,H/2-10).setDepth(95).setAlpha(0);
    con.add(this.add.rectangle(0,0,bw,bh,0x000000,0.92).setStrokeStyle(2,accent));
    con.add(this.add.text(0,-bh/2+12,'HOW TO PLAY',{fontSize:'11px',fontFamily:'Courier New',
      color:'#'+accent.toString(16).padStart(6,'0'),fontStyle:'bold',letterSpacing:3}).setOrigin(.5));
    lines.forEach((l,i)=>con.add(this.add.text(0,-bh/2+28+i*26,l,
      {fontSize:'12px',fontFamily:'Courier New',color:'#ffffff',stroke:'#000',strokeThickness:2}).setOrigin(.5)));
    con.add(this.add.text(0,bh/2-10,'[ SPACE to dismiss ]',
      {fontSize:'9px',fontFamily:'Courier New',color:'#666677'}).setOrigin(.5));
    this.tweens.add({targets:con,alpha:1,duration:400});
    this._tipsCon=con;
    this._tipTimer=this.time.delayedCall(auto,()=>this._hideTips());
    this.input.once('pointerdown',()=>this._hideTips());
  }
  _hideTips(){
    if(!this._tipsCon) return; if(this._tipTimer) this._tipTimer.remove();
    this.tweens.add({targets:this._tipsCon,alpha:0,duration:300,
      onComplete:()=>{this._tipsCon&&this._tipsCon.destroy();this._tipsCon=null;}});
  }


  _setupTouch(){
    if(!this.sys.game.device.input.touch) return;
    this._touchMove={x:0,y:0,active:false,id:null};
    this._touchFire=false;
    const MID=W/2;

    this.input.on('pointerdown',(p)=>{
      if(p.x<MID){
        this._touchMove={x:p.x,y:p.y,active:true,id:p.id,sx:p.x,sy:p.y};
      } else {
        this._touchFire=true;
        // Draw fire indicator
        if(!this._fireDot) this._fireDot=this.add.circle(p.x,p.y,18,0xffaa22,0.35).setDepth(95);
      }
    });
    this.input.on('pointermove',(p)=>{
      if(this._touchMove.active&&p.id===this._touchMove.id){
        this._touchMove.dx=p.x-this._touchMove.sx;
        this._touchMove.dy=p.y-this._touchMove.sy;
      }
    });
    this.input.on('pointerup',(p)=>{
      if(p.id===this._touchMove.id){this._touchMove.active=false;this._touchMove.dx=0;this._touchMove.dy=0;}
      else{this._touchFire=false;if(this._fireDot){this._fireDot.destroy();this._fireDot=null;}}
    });

    // Touch joystick visual
    this._joyBase=this.add.circle(W/4,H-80,36,0xffffff,0.08).setDepth(95).setStrokeStyle(1.5,0xffffff,0.2);
    this._joyKnob=this.add.circle(W/4,H-80,18,0xffffff,0.18).setDepth(96);
    // Fire zone visual
    this.add.text(W*3/4,H-30,'TAP TO FIRE',{fontSize:'10px',fontFamily:'Courier New',color:'#443322',stroke:'#000',strokeThickness:1}).setOrigin(.5).setDepth(95);
  }

  _applyTouchInput(dt){
    if(!this._touchMove) return;
    const speedBase=220*this._speedMult;
    if(this._touchMove.active){
      const dx=this._touchMove.dx||0, dy=this._touchMove.dy||0;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const norm=Math.min(dist,50)/50;
      if(dist>8){
        this.player.body.velocity.x=Phaser.Math.Linear(this.player.body.velocity.x,(dx/dist)*speedBase*norm,0.22);
        this.player.body.velocity.y=Phaser.Math.Linear(this.player.body.velocity.y,(dy/dist)*speedBase*norm,0.22);
        this.player.rotation=Phaser.Math.Linear(this.player.rotation,(dx/dist)*0.35,0.15);
      }
      // Update knob position
      const kx=Math.min(Math.max(dx,-36),36), ky=Math.min(Math.max(dy,-36),36);
      if(this._joyKnob) this._joyKnob.setPosition(W/4+kx,H-80+ky);
    } else {
      if(this._joyKnob) this._joyKnob.setPosition(W/4,H-80);
    }
    if(this._touchFire){this.shootT-=dt;if(this.shootT<=0){this.fire();this.shootT=this.diff.psr;}}
  }

  hudButtons(){
    const D=80;
    const pb=this.add.text(W-8,H-20,'[ESC] PAUSE',
      {fontSize:'11px',fontFamily:'Courier New',color:'#334455',stroke:'#000',strokeThickness:1})
      .setOrigin(1,1).setDepth(D).setInteractive({useHandCursor:true});
    pb.on('pointerover',()=>pb.setColor('#aaddff'));
    pb.on('pointerout', ()=>pb.setColor('#334455'));
    pb.on('pointerdown',()=>{this.scene.pause('Game');this.scene.launch('Pause');});

    // Music mute toggle button
    this._muted=false;
    this._muteBtn=this.add.text(W-8,H-34,'♪ MUSIC',
      {fontSize:'11px',fontFamily:'Courier New',color:'#334455',stroke:'#000',strokeThickness:1})
      .setOrigin(1,1).setDepth(D).setInteractive({useHandCursor:true});
    this._muteBtn.on('pointerover',()=>this._muteBtn.setColor('#aaddff'));
    this._muteBtn.on('pointerout', ()=>this._muteBtn.setColor(this._muted?'#ff4444':'#334455'));
    this._muteBtn.on('pointerdown',()=>{
      this._muted=!this._muted;
      if(this._muted){ Music.setVol(0); this._muteBtn.setText('✕ MUTED').setColor('#ff4444'); }
      else { Music.setVol(0.32); this._muteBtn.setText('♪ MUSIC').setColor('#334455'); }
      Sfx.play('click');
    });
  }

  hud(){
    const D=50;
    // ── Top strip: avatar+name left, score centre, wave/diff right ──────────
    this.add.rectangle(W/2,22,W,44,0x000000,0.82).setDepth(D-1);

    // Avatar portrait top-left (small, 36px)
    const avId=this.registry.get('avatarId')??0;

    this.add.rectangle(20,22,38,38,0x001133,0.9).setStrokeStyle(1.5,0x4488cc).setDepth(D-1);
    this.add.image(20,22,avHudKey).setDepth(D);
    // Pilot name next to avatar
    this.add.text(42,10,this.pilot,
      {fontSize:'14px',fontFamily:'Arial',color:'#ffffff',
       fontStyle:'bold',stroke:'#000',strokeThickness:3}).setDepth(D);
    // Lives as small ships below name
    this.licons=[];
    for(let i=0;i<LIVES_MAX;i++){
      const ic=this.add.sprite(44+i*20,28,'ship').setScale(.65).setDepth(D);
      ic.play('ship'); this.licons.push(ic);
    }
    this.stxt=this.add.text(W/2,4,'0',
      {fontSize:'22px',fontFamily:'Arial',fontStyle:'bold',color:'#ffffff',stroke:'#000',strokeThickness:4}).setOrigin(.5,0).setDepth(D);
    this.ctxt=this.add.text(W/2,28,'',
      {fontSize:'14px',fontFamily:'Arial',fontStyle:'bold',color:'#ffdd44',stroke:'#000',strokeThickness:3}).setOrigin(.5,0).setDepth(D);
    this.wtxt=this.add.text(W-8,6,'',
      {fontSize:'13px',fontFamily:'Arial',fontStyle:'bold',color:'#aaddff',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setDepth(D);
    const dk=this.registry.get('difficulty')||'VETERAN';
    this.add.text(W-8,22,'['+dk+']',
      {fontSize:'12px',fontFamily:'Arial',fontStyle:'bold',color:DIFF[dk].color,stroke:'#000',strokeThickness:2}).setOrigin(1,0).setDepth(D);

    // ── Bottom strip: SHD/HP bars (no avatar here — it's at top now) ─────────
    this.add.rectangle(W/2,H-30,W,60,0x000000,0.82).setDepth(D-1);

    // SHD/HP bars
    const bx=8, bw=180, barH=14;
    // SHIELD
    this.add.text(bx,H-52,'SHD',{fontSize:'14px',fontFamily:'Arial',fontStyle:'bold',color:'#66bbff',stroke:'#000',strokeThickness:3}).setDepth(D);
    this.add.rectangle(bx+40,H-44,bw,barH,0x0a1a33).setOrigin(0,.5).setDepth(D);
    this.sbar=this.add.rectangle(bx+40,H-44,bw,barH,0x44aaff).setOrigin(0,.5).setDepth(D);
    this.add.rectangle(bx+40,H-44,bw,barH,0x000000,0).setOrigin(0,.5).setStrokeStyle(1.5,0x3366aa).setDepth(D+1);
    // HP
    this.add.text(bx,H-29,'HP ',{fontSize:'14px',fontFamily:'Arial',fontStyle:'bold',color:'#ff6666',stroke:'#000',strokeThickness:3}).setDepth(D);
    this.add.rectangle(bx+40,H-21,bw,barH,0x1a0000).setOrigin(0,.5).setDepth(D);
    this.hbar=this.add.rectangle(bx+40,H-21,bw,barH,0xff4444).setOrigin(0,.5).setDepth(D);
    this.add.rectangle(bx+40,H-21,bw,barH,0x000000,0).setOrigin(0,.5).setStrokeStyle(1.5,0x882222).setDepth(D+1);

    // 2× damage timer
    this.ptxt=this.add.text(W-8,H-46,'',{fontSize:'13px',fontFamily:'Courier New',color:'#ffdd44',fontStyle:'bold',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setDepth(D);

    // ── Ammo bar (right side bottom strip) ──────────────────────────────────
    const ax=W/2+20, aw=160, barH2=14;
    this.add.text(ax,H-52,'AMMO',{fontSize:'14px',fontFamily:'Arial',fontStyle:'bold',color:'#ffbb33',stroke:'#000',strokeThickness:3}).setDepth(D);
    this.add.rectangle(ax+44,H-44,aw,barH2,0x1a1000).setOrigin(0,.5).setDepth(D);
    this.abar=this.add.rectangle(ax+44,H-44,aw,barH2,0xffaa22).setOrigin(0,.5).setDepth(D);
    this.add.rectangle(ax+44,H-44,aw,barH2,0x000000,0).setOrigin(0,.5).setStrokeStyle(1.5,0x886611).setDepth(D+1);
    this.atxt=this.add.text(ax+44+aw+4,H-44,'',{fontSize:'12px',fontFamily:'Arial',fontStyle:'bold',color:'#ffcc44',stroke:'#000',strokeThickness:2}).setOrigin(0,.5).setDepth(D);

    // ── Wave enemy count (right side, below wave label) ─────────────────────
    this.etxt=this.add.text(W/2,6,'',{fontSize:'12px',fontFamily:'Arial',fontStyle:'bold',color:'#ff8888',stroke:'#000',strokeThickness:2}).setOrigin(.5,0).setDepth(D);

    // Boss HP bar (top centre)
    this.bbc=this.add.container(0,0).setDepth(D).setVisible(false);
    this.bbbg=this.add.rectangle(W/2,60,W-60,16,0x220011).setOrigin(.5);
    this.bbfg=this.add.rectangle(W/2-((W-60)/2),60,W-60,16,0xdd2222).setOrigin(0,.5);
    this.bbtx=this.add.text(W/2,38,'',{fontSize:'16px',fontFamily:'Arial',fontStyle:'bold',color:'#ff8888',stroke:'#000',strokeThickness:4}).setOrigin(.5);
    this.bbc.add([this.bbbg,this.bbfg,this.bbtx]);
  }

  uhud(){
    this.licons.forEach((ic,i)=>ic.setAlpha(i<this.lives?1:.15));
    this.stxt.setText(this.score.toLocaleString());
    const m=([1,2,4,8])[Math.min(this.combo,3)];
    this.ctxt.setText(this.combo>0?'×'+m+' COMBO':'');
    if(this.ctxt){
      const bigCombo=this.combo>=3;
      this.ctxt.setStyle({fontSize:bigCombo?'24px':'14px',fontFamily:'Arial',fontStyle:'bold',
        color:bigCombo?'#ffdd44':this.combo>=2?'#ffaa22':'#ffdd44',stroke:'#000',strokeThickness:bigCombo?5:3});
    }
    this.sbar.width=Math.max(0,180*(this.shield/100));
    this.hbar.width=Math.max(0,180*(this.hp/100));
    this.wtxt.setText(this.bossOn?'⚠ BOSS':'WAVE '+(this.waveIdx+1)+'/4');
    if(this.bossOn&&this.boss)this.bbfg.width=Math.max(0,(W-60)*(this.bossHp/this.bossMax));
    // Ammo bar
    if(this.abar){
      const ap=Math.max(0,this.ammo/this.ammoMax);
      this.abar.width=Math.max(0,160*ap);
      this.abar.setFillStyle(ap>0.4?0xffaa22:ap>0.15?0xff6600:0xff2200);
      this.atxt.setText(this.ammo+'/'+this.ammoMax);
    }
    // Enemy count in current wave
    if(this.etxt){
      if(!this.bossOn&&this._waveTarget>0){
        const rem=Math.max(0,this._waveTarget-(this._waveKills||0));
        this.etxt.setText(rem>0?'ENEMIES LEFT: '+rem:'');
      } else this.etxt.setText('');
    }
  }

  // ── Dialogue system ──────────────────────────────────────────────────────
  triggerDialogue(waveIdx){
    const lines=this.DIALOGUES[waveIdx];
    if(!lines||this.dialogueActive)return;
    this.dialogueQ=[...lines];
    this.showNextLine();
  }

  showNextLine(){
    if(!this.dialogueQ.length){this.dialogueActive=false;return;}
    this.dialogueActive=true;
    const [speaker,text]=this.dialogueQ.shift();
    const colors={FITZ:'#44ddff',CMD:'#ffdd44',PILOT:'#88ff88'};
    const bgCols={FITZ:0x003344,CMD:0x332200,PILOT:0x003322};
    const col=colors[speaker]||'#ffffff';
    const bgCol=bgCols[speaker]||0x001122;

    const boxW=W-30, boxH=74;
    // Position just below the score strip at TOP — never overlaps the ship
    const container=this.add.container(W/2, 82).setDepth(70);

    const bg=this.add.rectangle(0,0,boxW,boxH,bgCol,0.97)
      .setStrokeStyle(2.5,parseInt(col.replace('#','0x')));
    // Extra dark shadow under bg for contrast against bright bg
    this.add.rectangle(3,3,boxW,boxH,0x000000,0.55);
    // Speaker badge
    const badge=this.add.rectangle(-boxW/2+46,-boxH/2+1,96,22,parseInt(col.replace('#','0x')),1).setOrigin(.5,0);
    const spkTxt=this.add.text(-boxW/2+46,-boxH/2+11,speaker,
      {fontSize:'15px',fontFamily:'Arial',color:'#000000',
       fontStyle:'bold'}).setOrigin(.5,.5);
    const msgTxt=this.add.text(0,10,'',
      {fontSize:'17px',fontFamily:'Courier New',color:'#ffffff',
       fontStyle:'bold',stroke:'#000000',strokeThickness:5,align:'center',
       wordWrap:{width:boxW-24}}).setOrigin(.5,.5);
    container.add([bg,badge,spkTxt,msgTxt]);

    container.alpha=0; container.y=60;
    this.tweens.add({targets:container,y:82,alpha:1,duration:180,ease:'Quad.easeOut'});

    // Typewriter — faster
    let ci=0;
    const tw=this.time.addEvent({delay:24,loop:true,callback:()=>{
      if(ci<text.length){msgTxt.setText(text.slice(0,++ci));}
      else tw.remove();
    }});

    const readMs=Math.max(2600, text.length*60);
    this.time.delayedCall(readMs,()=>{
      this.tweens.add({targets:container,alpha:0,y:60,duration:280,onComplete:()=>{
        container.destroy();
        this.time.delayedCall(350,()=>this.showNextLine());
      }});
    });
  }

  // ── Waves ────────────────────────────────────────────────────────────────
  nextWave(){
    if(this.waveIdx>=this._waveConfig.length)return;
    const cfg=this._waveConfig[this.waveIdx];
    this.time.delayedCall(400,()=>this.triggerDialogue(this.waveIdx));

    if(cfg.boss){
      if(!this.dossierShown){
        this.dossierShown=true;
        this.time.delayedCall(1500,()=>{
          const save={score:this.score,lives:this.lives,shield:this.shield,health:this.hp,
                      wave:this.waveIdx,nextLifeAt:this.nextLife,ammo:this.ammo};
          Music.stop(); this.scene.start('BossDossier',save);
        });
      }
      return;
    }

    this._waveKills=0;
    this._waveTarget=cfg.killTarget;
    this._waveDone=false;

    // Wave banner
    this.time.delayedCall(500,()=>{
      const banner=this.add.text(W/2,H/2-40,'— WAVE '+(this.waveIdx+1)+' —',
        {fontSize:'28px',fontFamily:'Courier New',color:'#ffdd44',
         fontStyle:'bold',stroke:'#000',strokeThickness:6}).setOrigin(.5).setDepth(65).setAlpha(0);
      const sub=this.add.text(W/2,H/2+2,cfg.killTarget+' ENEMIES INBOUND',
        {fontSize:'14px',fontFamily:'Courier New',color:'#ff9933',
         stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(65).setAlpha(0);
      this.tweens.add({targets:[banner,sub],alpha:1,duration:300,
        onComplete:()=>this.tweens.add({targets:[banner,sub],alpha:0,duration:400,delay:1800,
          onComplete:()=>{banner.destroy();sub.destroy();}})});
    });

    // Miniboss on wave 3
    if(cfg.miniboss&&!this.minibossSpawned){
      this.minibossSpawned=true;
      this.time.delayedCall(3000,()=>this.spawnMiniboss());
    }

    // Wave countdown
    let _cd=3;
    const _cdTxt=this.add.text(W/2,H/2+60,'',
      {fontSize:'42px',fontFamily:'Courier New',color:'#ffdd44',fontStyle:'bold',stroke:'#000',strokeThickness:8}).setOrigin(.5).setDepth(66);
    const _cdInt=this.time.addEvent({delay:700,repeat:3,callback:()=>{
      if(_cd>0){_cdTxt.setText(String(_cd));Sfx.play('click');_cd--;}
      else{_cdTxt.setText('ENGAGE!');
        this.time.delayedCall(400,()=>{_cdTxt.destroy();this._startDrip(cfg);});}
    }});
  }

  _startDrip(cfg){
    if(this._dripTimer) this._dripTimer.remove();
    const spawnOne=()=>{
      if(this._waveDone||this.bossOn||this.over||this.clear)return;
      const total=cfg.pool.reduce((s,p)=>s+p.w,0);
      let r=Math.random()*total; let pick=cfg.pool[0];
      for(const p of cfg.pool){r-=p.w;if(r<=0){pick=p;break;}}
      this._spawnOne(pick);
    };
    spawnOne();
    this._dripTimer=this.time.addEvent({delay:cfg.dripMs,loop:true,callback:spawnOne});
  }

  _spawnOne({t,hp,s}){
    const tk=t==='grunt'?'enemy-01':t==='scout'?'enemy-02':'enemy-03';
    const dirRoll=t==='elite'?0:Math.floor(Math.random()*4);
    let ex,ey,vx,vy,pat;
    if(dirRoll===0){
      ex=Phaser.Math.Between(40,W-40);ey=-50;
      const ang=Phaser.Math.FloatBetween(-0.4,0.4);
      vx=Math.sin(ang)*s;vy=s;pat='top';
    } else if(dirRoll===1){
      ex=-50;ey=Phaser.Math.Between(80,H*0.65);
      vx=s*0.8;vy=s*0.4;pat='side';
    } else if(dirRoll===2){
      ex=W+50;ey=Phaser.Math.Between(80,H*0.65);
      vx=-s*0.8;vy=s*0.4;pat='side';
    } else {
      ex=Phaser.Math.Between(W/4,W*3/4);ey=Phaser.Math.Between(60,180);
      vx=Phaser.Math.FloatBetween(-s*0.5,s*0.5);vy=s*0.7;pat='centre';
    }
    const e=this.en.create(ex,ey,tk);
    if(!e)return;
    e.setScale(1.8).setDepth(5);e.play(tk);
    e.body.setSize(32,32).setOffset(8,8);
    e.hp=hp;e.maxHp=hp;e.spd=s;
    e.type=t;e.pat=pat;e.sOff=Math.random()*6;e.sx=ex;
    e.vx=vx;e.vy=vy;
    e.body.setVelocity(vx,vy);
    e.stmr=Phaser.Math.Between(
      Math.round((t==='elite'?1000:2000)/this.diff.srm),
      Math.round((t==='elite'?2200:3800)/this.diff.srm));
    if(pat==='centre'){e.setAlpha(0);this.tweens.add({targets:e,alpha:1,duration:180});}
  }

  _onWaveKill(){
    if(this._waveDone)return;
    this._waveKills=(this._waveKills||0)+1;
    if(this.etxt) this.etxt.setText('ENEMIES LEFT: '+Math.max(0,this._waveTarget-this._waveKills));
    if(this._waveKills>=this._waveTarget){
      this._waveDone=true;
      if(this._dripTimer){this._dripTimer.remove();this._dripTimer=null;}
      this.time.delayedCall(1200,()=>this.adv());
    }
  }

  // ── Miniboss — right-hand man of the Desert Viper ─────────────────────────
  spawnMiniboss(){
    Sfx.play('miniboss');
    const mb=this.en.create(W/2,-80,'enemy-03');
    if(!mb)return;
    mb.setScale(3.0).setDepth(6);mb.play('enemy-03');
    mb.body.setSize(32,32).setOffset(8,8);
    mb.hp=Math.round(280*this.diff.hpm);
    mb.maxHp=mb.hp; mb.spd=Math.round(40*this.diff.spm);
    mb.type='miniboss'; mb.pat='sweep'; mb.sx=W/2;
    mb.stmr=Math.round(900/this.diff.srm); mb.sOff=0;
    // Tint red to distinguish
    mb.setTint(0xff5544);

    // Announce
    const warn=this.add.text(W/2,H/2-30,'⚠  VIPER LIEUTENANT  ⚠',
      {fontSize:'18px',fontFamily:'Courier New',color:'#ff5533',stroke:'#000',strokeThickness:5}).setOrigin(.5).setDepth(65);
    const sub=this.add.text(W/2,H/2+0,'Right-hand enforcer of the Desert Viper',
      {fontSize:'12px',fontFamily:'Courier New',color:'#ff8866',stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(65);
    this.tweens.add({targets:[warn,sub],alpha:0,duration:2800,delay:800,onComplete:()=>{warn.destroy();sub.destroy();}});

    // Dialogue
    this.time.delayedCall(1600,()=>{
      this.dialogueQ=[
        ['FITZ','Big one incoming — Viper Lieutenant. Right-hand enforcer.'],
        ['PILOT','How much worse than the regulars?'],
        ['FITZ','Three times the hull. Comes back angrier if you miss.'],
        ['PILOT','...great.'],
      ];
      this.showNextLine();
    });

    // Mini-boss health bar
    this.mbHpBg=this.add.rectangle(W/2,76,W-80,10,0x330011).setOrigin(.5).setDepth(50);
    this.mbHpFg=this.add.rectangle(W/2-((W-80)/2),76,W-80,10,0xff5533).setOrigin(0,.5).setDepth(50);
    this.mbLabel=this.add.text(W/2,60,'LIEUTENANT',
      {fontSize:'11px',fontFamily:'Courier New',color:'#ff7755',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(50);
  }

  adv(){
    const waveClearAmmo=12;
    this.ammo=Math.min(this.ammoMax,this.ammo+waveClearAmmo);
    this.shield=Math.min(100,this.shield+15);
    this.pop(W/2,H/2-80,'⚡ WAVE CLEAR! +'+waveClearAmmo+' AMMO  +15 SHD','#88ff88',15);
    this.waveIdx++;
    if(this.waveIdx<this._waveConfig.length){this.uhud();this.nextWave();}
  }

  // ── Boss ──────────────────────────────────────────────────────────────────
  spawnBoss(){
    this.bossOn=true;
    this.bossMax=Math.round(600*this.diff.bhm);
    this.bossHp=this.bossMax; this.bossPhase=1;
    this.bssT=Math.round(1800/this.diff.srm);
    this.bDirX=1;this.bMoveT=0;this.bRayT=5000;
    Sfx.play('warn');
    // EP1 boss fanfare — major ascending
    this.time.delayedCall(400,()=>{try{const ac=new AudioContext();[220,277,330,415,523].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0,ac.currentTime+i*.08);g.gain.linearRampToValueAtTime(.12,ac.currentTime+i*.08+.05);g.gain.linearRampToValueAtTime(0,ac.currentTime+i*.08+.28);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*.08);o.stop(ac.currentTime+i*.08+.3);});}catch(e){}});

    this.boss=this.physics.add.sprite(W/2,-160,'boss').setScale(2).setDepth(8);
    this.boss.play('boss');
    this.boss.body.setSize(120,80).setOffset(36,32);
    this.bcL=this.add.image(W/2-55,-100,'boss-cannon-l').setScale(1.5).setDepth(7);
    this.bcR=this.add.image(W/2+55,-100,'boss-cannon-r').setScale(1.5).setDepth(7);
    this.tweens.add({targets:this.boss,y:130,duration:2000,ease:'Back.easeOut',onComplete:()=>{
      this.bbc.setVisible(true);this.bbtx.setText('☠ DESERT VIPER ☠');
      Music.stop(); setTimeout(()=>Music.play('boss'),1200);
      this.bossGrp=this.physics.add.group();this.bossGrp.add(this.boss);
      this.physics.add.overlap(this.pb,this.bossGrp,this.onBHB,null,this);
      // Boss opening dialogue
      this.dialogueQ=[
        ['FITZ','Desert Viper is live. This is the one.'],
        ['CMD',this.pilot+' — the entire sector is counting on you. End this.'],
        ['PILOT','FITZ, route all power to weapons.'],
        ['FITZ','Done. Also I have updated your next-of-kin forms. Just in case.'],
      ];
      this.time.delayedCall(1000,()=>this.showNextLine());
    }});
  }

  updBoss(dt){
    if(!this.boss?.active)return;
    if(this.bcL){this.bcL.x=this.boss.x-55;this.bcL.y=this.boss.y+20;}
    if(this.bcR){this.bcR.x=this.boss.x+55;this.bcR.y=this.boss.y+20;}
    const r=this.bossHp/this.bossMax;
    if(r<.5&&this.bossPhase===1){
      this.bossPhase=2;this.cameras.main.shake(400,.012);this.flash(this.boss);
      this.dialogueQ=[['FITZ','Half hull gone! Phase 2 — spread fire.'],['PILOT','Dodging.']];
      this.showNextLine();
    }
    if(r<.2&&this.bossPhase===2){
      this.bossPhase=3;this.cameras.main.shake(700,.018);
      this.dialogueQ=[['FITZ','CRITICAL — Phase 3! Double-burst incoming!'],['PILOT','I see it.'],['FITZ','DODGE.']];
      this.showNextLine();
    }
    const spd=(65+(this.bossPhase===3?120:this.bossPhase===2?50:0))*this.diff.spm;
    this.boss.x+=this.bDirX*spd*(dt/1000);
    if(this.boss.x>W-90||this.boss.x<90)this.bDirX*=-1;
    if(this.bossPhase>=2)this.boss.y=130+Math.sin(this.bMoveT/1000)*35;
    this.bMoveT+=dt;
    this.bssT-=dt;
    if(this.bssT<=0){this.bShoot();this.bssT=Math.round((this.bossPhase===1?1800:this.bossPhase===2?1100:700)/this.diff.srm)+Phaser.Math.Between(-150,150);}
    if(this.bossPhase>=2){this.bRayT-=dt;if(this.bRayT<=0){this.bRay();this.bRayT=Math.round(5000/this.diff.srm);}}
    this.uhud();
  }

  bShoot(){
    if(!this.boss?.active)return;
    const a=Phaser.Math.Angle.Between(this.boss.x,this.boss.y,this.player.x,this.player.y);
    const sp=this.bossPhase===1?[0]:this.bossPhase===2?[-.32,0,.32]:[-.5,-.25,0,.25,.5];
    sp.forEach(s=>this.bBolt(this.boss.x,this.boss.y+60,a+s));
    if(this.bossPhase===3){
      const a2=a+(Math.random()<.5?.55:-.55);
      this.time.delayedCall(280,()=>{if(this.boss?.active)[a2-.15,a2+.15].forEach(s=>this.bBolt(this.boss.x,this.boss.y+60,s));});
    }
    Sfx.play('shoot');
  }

  bBolt(x,y,a){
    const spd=Math.round(200*this.diff.spm);
    const b=this.eb.create(x,y,'boss-bolt');
    if(!b)return;
    b.play('boss-bolt');b.setScale(3).setDepth(6);
    b.setVelocity(Math.cos(a)*spd,Math.sin(a)*spd);
    b.setRotation(a+Math.PI/2);b.dmg=Math.round(18*this.diff.hpm*.5);
    this.time.delayedCall(3000,()=>{if(b?.active)b.destroy();});
  }

  bRay(){
    if(!this.boss)return;
    const ray=this.add.sprite(this.boss.x,this.boss.y+60,'boss-rays').setScale(2).setDepth(7);
    ray.play('boss-rays');
    ray.once('animationcomplete',()=>{
      if(this.player?.active&&Phaser.Math.Distance.Between(ray.x,ray.y,this.player.x,this.player.y)<110&&!this.inv)
        this.dmgP(Math.round(30*this.diff.hpm*.5));
      ray.destroy();
    });
  }

  flash(s){this.tweens.add({targets:s,alpha:.2,duration:80,yoyo:true,repeat:6,onComplete:()=>{if(s?.active)s.setAlpha(1);}});}

  killBoss(){
    if(!this.boss?.active)return;
    this.bossOn=false;this.bbc.setVisible(false);
    Sfx.play('boom');
    this.dialogueQ=[
      ['FITZ','Target destroyed! The Viper is down!'],
      ['CMD','Sector command confirms — the Dominion is retreating!'],
      ['PILOT','FITZ... we actually did it.'],
      ['FITZ','Against all statistical probability, yes. I\'m as surprised as you are.'],
    ];
    this.showNextLine();
    for(let i=0;i<10;i++)this.time.delayedCall(i*180,()=>{
      if(!this.boss)return;
      const ex=this.add.sprite(this.boss.x+Phaser.Math.Between(-90,90),this.boss.y+Phaser.Math.Between(-70,70),'explosion-lg').setScale(2).setDepth(15);
      ex.play('explosion-lg');ex.once('animationcomplete',()=>ex.destroy());
      if(i<4)Sfx.play('boom');
    });
    this.pts(2000);
    this.drop(this.boss.x,this.boss.y,true);
    if(this.bcL){this.bcL.destroy();this.bcL=null;}
    if(this.bcR){this.bcR.destroy();this.bcR=null;}
    this.boss.destroy();this.boss=null;
    this.time.delayedCall(5000,()=>this.stageClear());
  }

  stageClear(){
    Music.stop(); Sfx.play('clear');this.clear=true; markEpisodeComplete(1); if(this.mineTimer)this.mineTimer.remove(); if(this._tentTimer)this._tentTimer.remove(); if(this._dripTimer)this._dripTimer.remove();

    c.add(this.add.text(0,-52,'Score: '+this.score.toLocaleString(),{fontSize:'16px',fontFamily:'Courier New',color:'#aaddff'}).setOrigin(.5));
    c.add(this.add.text(0,-24,'Bonus: +'+bon.toLocaleString(),{fontSize:'16px',fontFamily:'Courier New',color:'#88ff88'}).setOrigin(.5));

    const ep2Btn=makeBtn(this,W/2,H/2+100,'▶▶ EP.II','#44eeff',()=>{Music.stop();this.scene.start('Ep2Prelude');},130,34);
    this.tweens.add({targets:ep2Btn.bg,alpha:.6,duration:600,yoyo:true,repeat:-1});
    ep2Btn.txt.setStyle({fontSize:'16px',fontFamily:'Arial',fontStyle:'bold',color:'#44eeff',stroke:'#000',strokeThickness:4});
    makeBtn(this,W/2+140,H/2+100,'MENU','#aaddff',()=>this.scene.start('MainMenu'),100,34);
    // EP2 mechanic preview
    const ep2Preview=[
      '❄ Thermal Gauge — cold is a weapon',
      '🧊 Freeze Mines + Ice Shard hazards',
      '🔀 Mid-mission Pilot Swap',
