    const hide=()=>{this.tweens.add({targets:box,alpha:0,duration:300,onComplete:()=>box.destroy()});};
    this.time.delayedCall(10000,hide);
    const orig=this.fire.bind(this);
    this.fire=()=>{orig();hide();this.fire=orig;};
  }

  _waveConfig3(){
    const d=this.diff;
    const h=x=>Math.round(x*d.hpm), sp=x=>Math.round(x*d.spm);
    return [
      // W1 — Phantom Scouts: invisible until they shoot, 28 kills
      { killTarget:28, dripMs:1000,
        pool:[
          {t:'phantom',  hp:h(22),s:sp(67),w:5},
          {t:'grunt',    hp:h(20),s:sp(61), w:3},
          {t:'phantom',  hp:h(26),s:sp(74),w:4},
        ]},
      // W2 — Shade Carriers + Phantoms, 26 kills
      { killTarget:26, dripMs:880,
        pool:[
          {t:'shade',    hp:h(80),s:sp(35), w:2},
          {t:'phantom',  hp:h(24),s:sp(71),w:4},
          {t:'grunt',    hp:h(22),s:sp(64),w:3},
        ]},
      // W3 — boss
      { boss:true },
    ];
  }

  nextWave3(){
    if(this.waveIdx>=3) return;
    const cfg=this._waveConfig3()[this.waveIdx];
    this.time.delayedCall(400,()=>this.triggerDialogue3(this.waveIdx));
    // Wave 1 sonar tutorial — spawn one phantom, prompt player to pulse
    if(this.waveIdx===0&&!this._sonarTutDone){
      this._sonarTutDone=true;
      this.time.delayedCall(2800,()=>{
        this._spawnOne3({t:'phantom',hp:Math.round(20*this.diff.hpm),s:Math.round(50*this.diff.spm)});
        const tutBox=this.add.text(W/2,H/2+30,'Press  [Q]  to fire Sonar Pulse',
          {fontSize:'18px',fontFamily:'Courier New',color:'#ffffff',
           fontStyle:'bold',stroke:'#000000',strokeThickness:6,align:'center'})
          .setOrigin(.5).setDepth(75);
        const tutSub=this.add.text(W/2,H/2+58,'Reveal the invisible enemy',
          {fontSize:'13px',fontFamily:'Courier New',color:'#cc88ff',stroke:'#000',strokeThickness:3})
          .setOrigin(.5).setDepth(75);
        this.tweens.add({targets:tutBox,alpha:0.3,duration:400,yoyo:true,repeat:4,
          onComplete:()=>{tutBox.destroy();tutSub.destroy();}});
      });
    }
    if(cfg.boss){
      this.time.delayedCall(1500,()=>{
        const save={score:this.score,lives:this.lives,hp:this.hp,
                    wave:this.waveIdx,nextLifeAt:this.nextLife,energy:this.energy};
        Music.stop(); this.scene.start('Ep3BossTransmission',save);
      });
      return;
    }
    this._waveKills=0; this._waveTarget=cfg.killTarget; this._waveDone=false;

    // Wave banner
    this.time.delayedCall(500,()=>{
      const banner=this.add.text(W/2,H/2-40,'— WAVE '+(this.waveIdx+1)+' —',
        {fontSize:'28px',fontFamily:'Courier New',color:'#aa44ff',
         fontStyle:'bold',stroke:'#000',strokeThickness:6}).setOrigin(.5).setDepth(65).setAlpha(0);
      const sub=this.add.text(W/2,H/2+2,cfg.killTarget+' THREATS DETECTED',
        {fontSize:'14px',fontFamily:'Courier New',color:'#cc99ff',
         stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(65).setAlpha(0);
      this.tweens.add({targets:[banner,sub],alpha:1,duration:300,
        onComplete:()=>this.tweens.add({targets:[banner,sub],alpha:0,duration:400,delay:1800,
          onComplete:()=>{banner.destroy();sub.destroy();}})});
    });
    // Wave countdown
    let _cd=3;
    const _cdTxt=this.add.text(W/2,H/2+60,'',
      {fontSize:'42px',fontFamily:'Courier New',color:'#aa44ff',fontStyle:'bold',stroke:'#000',strokeThickness:8}).setOrigin(.5).setDepth(66);
    const _cdInt=this.time.addEvent({delay:700,repeat:3,callback:()=>{
      if(_cd>0){_cdTxt.setText(String(_cd));Sfx.play('click');_cd--;}
      else{_cdTxt.setText('ENGAGE!');
        this.time.delayedCall(400,()=>{_cdTxt.destroy();this._startDrip3(cfg);});}
    }});
  }

  _startDrip3(cfg){
    if(this._dripTimer) this._dripTimer.remove();
    const spawnOne=()=>{
      if(this._waveDone||this.bossOn||this.over||this.clear) return;
      const total=cfg.pool.reduce((s,p)=>s+p.w,0);
      let r=Math.random()*total; let pick=cfg.pool[0];
      for(const p of cfg.pool){r-=p.w;if(r<=0){pick=p;break;}}
      this._spawnOne3(pick);
    };
    spawnOne();
    this._dripTimer=this.time.addEvent({delay:cfg.dripMs,loop:true,callback:spawnOne});
  }

  _spawnOne3({t,hp,s}){
    const isPhantom=t==='phantom';
    const isShade  =t==='shade';
    const isWraith =t==='wraith';
    const tk=isShade?'enemy-03':isPhantom?'enemy-02':'enemy-01';
    const tint=isShade?0xcc44ff:isPhantom?0x8822cc:isWraith?0xff44aa:0x6633aa;

    // Entry direction — all four vectors; wraith always side-streaks
    const dirRoll=isShade?0:isWraith?(Math.random()>0.5?1:2):Math.floor(Math.random()*4);
    let ex,ey,vx,vy,pat;
    if(dirRoll===0){
      ex=Phaser.Math.Between(40,W-40);ey=-50;
      const ang=Phaser.Math.FloatBetween(-0.4,0.4);
      vx=Math.sin(ang)*s;vy=s;pat='top';
    } else if(dirRoll===1){
      ex=-50;ey=Phaser.Math.Between(80,H*0.65);
      vx=s*0.8;vy=s*0.4;pat='side';
    } else if(dirRoll===2){
      ex=W+50;ey=Phaser.Math.Between(80,H*0.65);
      vx=-s*0.8;vy=s*0.4;pat='side';
    } else {
      ex=Phaser.Math.Between(W/4,W*3/4);ey=Phaser.Math.Between(60,180);
      vx=Phaser.Math.FloatBetween(-s*0.5,s*0.5);vy=s*0.7;pat='centre';
    }

    const e=this.en.create(ex,ey,tk);
    if(!e) return;
    e.setScale(isShade?2.4:1.8).setDepth(5).setTint(tint);
    e.play(tk);
    e.body.setSize(32,32).setOffset(8,8);
    e.hp=hp; e.maxHp=hp; e.spd=s;
    e.type=t; e.pat=pat; e.sOff=Math.random()*6; e.sx=ex;
    e.vx=vx; e.vy=vy;
    e.body.setVelocity(vx,vy);
    e._revealed=false; e._revealT=0;
    e.stmr=Phaser.Math.Between(
      Math.round((isShade?2000:isPhantom?1400:2000)/this.diff.srm),
      Math.round((isShade?3500:isPhantom?2800:3800)/this.diff.srm));

    // Phantoms and shades start invisible; wraith is briefly visible (fast streak)
    if(isPhantom||isShade) e.setAlpha(0);
    else if(isWraith){ e.setAlpha(0.9); this.tweens.add({targets:e,alpha:0.15,duration:800,delay:400}); }
    else e.setAlpha(0.25);

    if(pat==='centre'){
      this.tweens.add({targets:e,alpha:isPhantom||isShade?0:0.25,duration:200});
    }
  }

  _onWaveKill3(){
    if(this._waveDone) return;
    this._waveKills=(this._waveKills||0)+1;
    this.uhud3();
    if(this._waveKills>=this._waveTarget){
      this._waveDone=true;
      if(this._dripTimer){this._dripTimer.remove();this._dripTimer=null;}
      this.time.delayedCall(1200,()=>this.adv3());
    }
  }

  adv3(){
    const energyBonus=20;
    this.energy=Math.min(this.energyMax,this.energy+energyBonus);
    // Restore 1 sonar charge on wave clear
    if(this.sonarCharges<5) this.sonarCharges++;
    this.pop(W/2,H/2-80,'⚡ WAVE CLEAR! +'+energyBonus+' NRG  +1 SONAR','#cc88ff',14);
    this.waveIdx++;
    if(this.waveIdx<3){this.uhud3();this.nextWave3();}
  }

  // ── VOID RIFT ─────────────────────────────────────────────────────────────────
  spawnRift(){
    if(this.over||this.clear) return;
    const x=Phaser.Math.Between(60,W-60);
    const y=Phaser.Math.Between(120,H-180);
    // Draw rift
    const g=this.add.graphics().setDepth(3);
    g.fillStyle(0x000000,1); g.fillCircle(x,y,28);
    g.lineStyle(3,0x6600aa,0.8); g.strokeCircle(x,y,28);
    g.lineStyle(1,0x4400aa,0.4); g.strokeCircle(x,y,44);
    g.fillStyle(0x220033,0.3); g.fillCircle(x,y,44);
    this.tweens.add({targets:g,angle:360,duration:4000,repeat:-1});
    // Pulsing
    const lbl=this.add.text(x,y-52,'◈ VOID RIFT',
      {fontSize:'10px',fontFamily:'Courier New',color:'#c888ff',stroke:'#000',strokeThickness:2})
      .setOrigin(.5).setDepth(4).setAlpha(0);
    this.tweens.add({targets:lbl,alpha:0.7,duration:400,yoyo:true,repeat:3,onComplete:()=>lbl.destroy()});
    // Store rift
    this.rifts.push({x,y,g,r:44});
    // Remove after 12s
    this.time.delayedCall(12000,()=>{
      g.destroy();
      this.rifts=this.rifts.filter(r=>r.g!==g);
    });
  }

  _applyRiftPull(dt){
    if(!this.player?.active||this._voidImmune) return;
    this.rifts.forEach(rift=>{
      const dx=rift.x-this.player.x;
      const dy=rift.y-this.player.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<rift.r*1.6&&dist>8){
        const pull=180*(1-dist/(rift.r*1.6));
        this.player.body.velocity.x+=dx/dist*pull*(dt/1000);
        this.player.body.velocity.y+=dy/dist*pull*(dt/1000);
        // Damage if too close
        if(dist<rift.r*0.7&&!this.inv){
          this.dmgP3(Math.round(8*this.diff.hpm*0.4));
        }
      }
    });
  }

  // ── BOSS: THE SOVEREIGN ───────────────────────────────────────────────────────
  spawnBoss3(){
    this.bossOn=true;
    this.bossMax=Math.round(800*this.diff.bhm);
    this.bossHp=this.bossMax;
    this.bossPhase=1;
    this.bossVisible=false;
    this.bossPulseT=0;
    this._bossRevealT=0;
    Sfx.play('warn');
    // EP3 boss fanfare — diminished chord
    this.time.delayedCall(400,()=>{try{const ac=new AudioContext();[174,207,246,311,415].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0,ac.currentTime+i*.09);g.gain.linearRampToValueAtTime(.11,ac.currentTime+i*.09+.05);g.gain.linearRampToValueAtTime(0,ac.currentTime+i*.09+.32);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*.09);o.stop(ac.currentTime+i*.09+.35);});}catch(e){}});

    this.boss=this.physics.add.sprite(W/2,-200,'boss')
      .setScale(2.2).setDepth(8).setTint(0x8822bb).setAlpha(0);
    // Boss fanfare chord
    (()=>{
      const ctx=Music._ctx&&Music._ctx();
      if(!ctx) return;
      [196,233,277,370].forEach((hz,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='square'; o.frequency.value=hz;
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.06);
        g.gain.linearRampToValueAtTime(0.08,ctx.currentTime+i*0.06+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.06+0.6);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime+i*0.06); o.stop(ctx.currentTime+i*0.06+0.6);
      });
    })();
    this.boss.play('boss');
    this.boss.body.setSize(140,90).setOffset(26,27);

    this.tweens.add({targets:this.boss,y:120,duration:2400,ease:'Back.easeOut',onComplete:()=>{
      this.bbc.setVisible(true);
      this.bbtx.setText('☽  THE SOVEREIGN  ☽');
      this.bossGrp=this.physics.add.group(); this.bossGrp.add(this.boss);
      this.physics.add.overlap(this.pb,this.bossGrp,this.onBHB3,null,this);
      Music.stop(); setTimeout(()=>Music.play('boss'),1200);
      this.dialogueQ=[
        ['FITZ','The Sovereign. Fully cloaked. Phase 1 — use Sonar to locate it.'],
        ['PILOT','I can\'t hit what I can\'t see.'],
        ['FITZ','Correct. That is the point. Pulse, then fire.'],
        ['FITZ','You have '+this.sonarCharges+' charges. Use them wisely.'],
      ];
      this.time.delayedCall(600,()=>this.showNextLine3());
    }});
  }

  onBHB3(bullet,boss){
    if(!bullet?.active||!boss?.active) return;
    // Can only damage the boss when revealed
    if(!this.bossVisible&&this._bossRevealT<=0){
      bullet.destroy();
      this.pop(bullet.x,bullet.y-20,'NO LOCK','#ff4444',12);
      return;
    }
    bullet.destroy();
    const dmg=Math.round(20*this._dmgMult*(this.dbl>0?2:1));
    const fx=this.add.sprite(bullet.x,bullet.y,'hit-fx').setScale(1.5).setDepth(12).setTint(0xcc88ff);
    fx.play('hit-fx'); fx.once('animationcomplete',()=>fx.destroy());
    Sfx.play('hit');
    this.bossHp=Math.max(0,this.bossHp-dmg);
    this._flashBoss();
    // Phase transitions
    const r=this.bossHp/this.bossMax;
    if(r<0.5&&this.bossPhase===1){
      this.bossPhase=2; this.cameras.main.shake(400,.012);
      this.dialogueQ=[
        ['FITZ','Phase 2 — The Sovereign is firing blind.'],
        ['PILOT','So am I.'],
        ['FITZ','Difference: you have Sonar.'],
      ];
      this.showNextLine3();
    }
    if(r<0.2&&this.bossPhase===2){
      this.bossPhase=3; this.cameras.main.shake(600,.018);
      this.dialogueQ=[
        ['FITZ','CRITICAL HULL. Phase 3 — everything fires at once.'],
        ['PILOT','Last charge. Making it count.'],
      ];
      this.showNextLine3();
    }
    this.uhud3();
    if(this.bossHp<=0) this.killBoss3();
  }

  _flashBoss(){
    this.tweens.add({targets:this.boss,alpha:this.boss.alpha>0.1?0.1:0.8,duration:60,
      yoyo:true,repeat:4,onComplete:()=>{
        if(this.boss?.active) this.boss.setAlpha(this._bossRevealT>0?0.85:0);
      }});
  }

  updBoss3(dt){
    if(!this.boss?.active) return;
    // Boss movement — drifts around screen even when invisible
    const spd=(48+(this.bossPhase*18))*this.diff.spm;
    if(!this._bMoveT) this._bMoveT=0;
    this._bMoveT+=dt;
    const bx=W/2+Math.sin(this._bMoveT/1800)*130;
    const by=110+Math.sin(this._bMoveT/1200)*45;
    this.boss.x=Phaser.Math.Linear(this.boss.x,bx,0.015);
    this.boss.y=Phaser.Math.Linear(this.boss.y,by,0.015);

    // Reveal timer
    if(this._bossRevealT>0){
      this._bossRevealT-=dt;
      this.bossVisible=true;
      this.boss.setAlpha(0.85);
      if(this._bossRevealT<=0){
        this.bossVisible=false;
        this.boss.setAlpha(0);
      }
    }

    // Shoot timer
    if(!this._bssT) this._bssT=Math.round(2000/this.diff.srm);
    this._bssT-=dt;
    if(this._bssT<=0){
      this._bossShoot3();
      this._bssT=Math.round((this.bossPhase===1?1800:this.bossPhase===2?1200:800)/this.diff.srm)
        +Phaser.Math.Between(-200,200);
    }
    // Boss shot reveals it briefly
    this.bbfg.width=Math.max(0,(W-60)*(this.bossHp/this.bossMax));
  }

  _bossShoot3(){
    if(!this.boss?.active) return;
    // Boss always reveals briefly when shooting
    this.boss.setAlpha(0.7);
    this.time.delayedCall(300,()=>{if(this.boss&&!this.bossVisible)this.boss.setAlpha(0);});
    const a=Phaser.Math.Angle.Between(this.boss.x,this.boss.y,this.player.x,this.player.y);
    const spreads=this.bossPhase===1?[0]:this.bossPhase===2?[-0.28,0,0.28]:[-0.45,-0.2,0,0.2,0.45];
    spreads.forEach(s=>{
      const b=this.eb.create(this.boss.x,this.boss.y+60,'boss-bolt');
      if(!b) return;
      b.play('boss-bolt'); b.setScale(2.8).setDepth(6).setTint(0xaa44ff);
      const spd=Math.round(118*this.diff.spm);
      b.setVelocity(Math.cos(a+s)*spd,Math.sin(a+s)*spd);
      b.setRotation(a+s+Math.PI/2);
      b.dmg=Math.round(16*this.diff.hpm*0.5);
      this.time.delayedCall(3200,()=>{if(b?.active)b.destroy();});
    });
    Sfx.play('shoot');
  }

      this.tweens.add({targets:this.boss,alpha:0.05,duration:60,yoyo:true,repeat:5,

  // ── COMBAT ────────────────────────────────────────────────────────────────────
  fire(){
    if(this.energy<2){
      if(!this._nrgWarnT||this.time.now-this._nrgWarnT>1200){
        this._nrgWarnT=this.time.now;
        this.pop(this.player.x,this.player.y-50,'NO ENERGY!','#ff3300',18);
        Sfx.play('hit');
      }
      return;
    }
    this.energy=Math.max(0,this.energy-2); this.uhud3();
    Sfx.play('shoot');
    const spd=Math.round(319*this.diff.spm*0.8+100);
    const b=this.pb.create(this.player.x,this.player.y-32,'pulse');
    if(!b) return;
    b.play('pulse'); b.setScale(1.5).setDepth(7).setTint(0xcc88ff);
    b.setVelocityY(-spd); b.dmg=Math.round(20*this._dmgMult);
    this.time.delayedCall(2000,()=>{if(b?.active)b.destroy();});
  }

  dmgP3(amt){
    if(this.inv||this.over||this.clear) return;
    this.hp-=amt;
    Sfx.play('hit'); this.cameras.main.shake(180,.006);
    this.uhud3();
    if(this.hp<=0) this.die3();
  }

  die3(){
    if(this.over) return;
    Sfx.play('die'); this.lives--; this.uhud3();
    const ex=this.add.sprite(this.player.x,this.player.y,'explosion-lg').setScale(2).setDepth(15);
    ex.play('explosion-lg'); ex.once('animationcomplete',()=>ex.destroy());
    this.player.setActive(false).setVisible(false);
    if(this.lives>0){
      this.dialogueQ=[['FITZ','Ship destroyed. Respawning…'],['PILOT','Still in the fight.']];
      this.showNextLine3();
      this.time.delayedCall(1600,()=>this.respawn3());
    } else {
      this.dialogueQ=[['FITZ','All systems offline. The Veil wins this round.'],
                      ['FITZ','I have archived your flight data. For science.']];
      this.showNextLine3();
      this.time.delayedCall(1400,()=>this.gameOver3());
    }
  }

  respawn3(){
    this.hp=this._maxHp||100; this.energy=Math.min(this.energyMax,this.energy+30);
    this.player.setPosition(W/2,H-100).setActive(true).setVisible(true);
    this.inv=true; this.invT=3000;
    this.tweens.add({targets:this.player,alpha:.25,duration:120,yoyo:true,repeat:12,
      onComplete:()=>{if(this.player)this.player.setAlpha(1);}});
    this.uhud3();
  }

  gameOver3(){
    this.over=true; Music.stop();
    [this._riftTimer,this._energyTimer,this._dripTimer].forEach(t=>{if(t)t.remove();});
    const hi=parseInt(localStorage.getItem('sf_hi_ep3')||'0');
    if(this.score>hi) localStorage.setItem('sf_hi_ep3',this.score);
    this.time.delayedCall(800,()=>this.scene.start('GameOver3',{
      score:this.score,lives:0,cleared:false,wave:this.waveIdx+1,pilot:this.pilot
    }));
  }

  pts3(base){
    const m=([1,2,4,8])[Math.min(this.combo,3)]*this._scoreMult;
    const e=Math.round(base*m);
    this.score+=e;
    while(this.score>=this.nextLife){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(W/2,H/2-60,'+LIFE!','#88ff88',28);}
      this.nextLife+=LIFE_EVERY;
    }
    this.pop(this.player.x+Phaser.Math.Between(-30,30),this.player.y-40,'+'+e,m>1?'#cc88ff':'#fff',13);
    this.uhud3();
  }
  ci(){this.combo=Math.min(this.combo+1,3);this.comboT=4000;this.uhud3();}
  pop(x,y,t,col,sz=14){
    const o=this.add.text(x,y,t,{fontSize:sz+'px',fontFamily:'Arial',fontStyle:'bold',
      color:col,stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(60);
    this.tweens.add({targets:o,y:y-50,alpha:0,duration:900,ease:'Quad.easeOut',onComplete:()=>o.destroy()});
  }

  drop3(x,y,force=false){
    if(!force&&Math.random()>.4) return;
    const ts=['energy','health','sonar','life'],ws=[40,30,20,10];
    let r=Math.random()*100,type='energy';
    for(let i=0;i<ts.length;i++){r-=ws[i];if(r<=0){type=ts[i];break;}}
    const p=this.pu.create(x,y,'gems');
    if(!p) return;
    p.play('gems'); p.setScale(2).setDepth(6); p.setVelocityY(80); p.ptype=type;
    p.setTint({energy:0xaa44ff,health:0xff4444,sonar:0xffffff,life:0x88ff88}[type]||0xffffff);
    this.time.delayedCall(8000,()=>{if(p?.active)p.destroy();});
  }

  applyPU3(type){
    Sfx.play('pu');
    const maxHp=this._maxHp||100;
    if(type==='energy'){this.energy=Math.min(this.energyMax,this.energy+40);this.pop(this.player.x,this.player.y-50,'+40 NRG','#aa44ff',14);}
    else if(type==='health'){this.hp=Math.min(maxHp,this.hp+40);this.pop(this.player.x,this.player.y-50,'+40 HP','#ff6666',14);}
    else if(type==='sonar'){
      if(this.sonarCharges<5){this.sonarCharges++;this.pop(this.player.x,this.player.y-50,'+1 SONAR','#cc88ff',16);}
      else{this.energy=Math.min(this.energyMax,this.energy+30);this.pop(this.player.x,this.player.y-50,'+30 NRG','#aa44ff',14);}
    }
    else if(type==='life'){
      if(this.lives<LIVES_MAX){this.lives++;Sfx.play('life');this.pop(this.player.x,this.player.y-50,'+1 LIFE!','#88ff88',18);}
      else{this.energy=this.energyMax;this.pop(this.player.x,this.player.y-50,'NRG FULL','#aa44ff',14);}
    }
    this.uhud3();
  }

  // ── COLLISION ─────────────────────────────────────────────────────────────────
  onBHE3(b,e){
    if(!b?.active||!e?.active) return;
    b.destroy();
    const fx=this.add.sprite(e.x,e.y,'hit-fx').setScale(1.5).setDepth(12).setTint(0xcc88ff);
    fx.play('hit-fx'); fx.once('animationcomplete',()=>fx.destroy());
    const dmg=Math.round(20*this._dmgMult*(this.dbl>0?2:1));
    e.hp-=dmg;
    if(e.hp<=0) this.killE3(e);
    else this.tweens.add({targets:e,alpha:e._revealed||e.type==='grunt'?0.6:0,duration:60,yoyo:true});
  }
  onPHB3(player,b){if(!b?.active||this.inv)return;b.destroy();this.dmgP3(b.dmg||14);}
  onPHE3(player,e){if(!e?.active||this.inv)return;this.killE3(e);this.dmgP3(Math.round(28*this.diff.hpm*0.5));}
  onPU3(player,p){if(!p?.active)return;const t=p.ptype;p.destroy();this.applyPU3(t);}

  killE3(e){
    if(!e?.active) return;
    const exTint=e.type==='wraith'?0xff44aa:0xaa44ff;
    const exSc=e.type==='shade'?3:e.type==='wraith'?1.4:2;
    const ex=this.add.sprite(e.x,e.y,'explosion-sm').setScale(exSc).setDepth(12).setTint(exTint);
    ex.play('explosion-sm'); ex.once('animationcomplete',()=>ex.destroy());
    if(e.type==='wraith') Sfx.play('hit'); else Sfx.play('boom');
    this.drop3(e.x,e.y,e.type==='shade');
    this.pts3({grunt:130,phantom:280,shade:600,wraith:180}[e.type]||130);
    this.ci();
    // Shade Carrier spawns 3 cloaked drones on death
    if(e.type==='shade'){
      this.dialogueQ=[['FITZ','Shade Carrier down — drone drop incoming!']];
      this.showNextLine3();
      for(let i=0;i<3;i++){
        this.time.delayedCall(i*300,()=>{
          this._spawnOne3({t:'phantom',hp:Math.round(18*this.diff.hpm),s:Math.round(110*this.diff.spm)});
          // Increment wave target to account for drones
          this._waveTarget++;
        });
      }
    }
    e.destroy();
    if(!this.bossOn) this._onWaveKill3();
  }

  // ── UPDATE LOOP ───────────────────────────────────────────────────────────────
  update(time,dt){
    if(this.over||this.clear) return;
    if(Phaser.Input.Keyboard.JustDown(this.esc)){this.scene.pause('Game3');this.scene.launch('Pause3');return;}

    this.bg3.tilePositionY-=.4; if(this.bg3b) this.bg3b.tilePositionY-=.18;

    // Ship controls
    const speedBase=220*this._speedMult;
    const mx=(this.cur.left.isDown||this.mov.left.isDown)?-1:(this.cur.right.isDown||this.mov.right.isDown)?1:0;
    const my=(this.cur.up.isDown||this.mov.up.isDown)?-1:(this.cur.down.isDown||this.mov.down.isDown)?1:0;
    if(this.player.active){
      this.player.setVelocity(mx*speedBase,my*speedBase);
      this.player.rotation=Phaser.Math.Linear(this.player.rotation,mx*.35,.15);
      this.shd.setPosition(this.player.x,this.player.y);
    }

    // Shoot
    this.shootT-=dt;
    if(this.spc.isDown&&this.shootT<=0&&this.player.active){this.fire();this.shootT=this.diff.psr;}

    // Sonar
    if(Phaser.Input.Keyboard.JustDown(this.sonarKey)) this.fireSonar();
    if(this.sonarCooldown>0) this.sonarCooldown-=dt;
    if(this.sonarActive){
      this.sonarT+=dt;
      this._drawSonarRing(Math.min(this.sonarT/800,1));
    }

    // Inv frames
    if(this.inv){this.invT-=dt;if(this.invT<=0){this.inv=false;if(this.player)this.player.setAlpha(1);}}
    if(this.combo>0){this.comboT-=dt;if(this.comboT<=0){this.combo=0;this.uhud3();}}
    if(this.dbl>0) this.dbl-=dt;

    // Void rift pull
    this._applyRiftPull(dt);

    // Ship light
    this._drawShipLight();

    // Enemy updates
    const eSpd=Math.round(118*this.diff.spm);
    this.en.getChildren().forEach(e=>{
      if(!e.active) return;

      // Reveal timer decay
      if(e._revealT>0){
        e._revealT-=dt;
        if(e._revealT<=0){
          e._revealed=false; e._revealT=0;
          if(e.type==='phantom'||e.type==='shade') e.setAlpha(0);
          else e.setAlpha(0.25);
        }
      }

      // Movement by pattern
      if(e.pat==='side'){
        const dy=this.player.y-e.y;
        e.body.setVelocity(e.vx, e.spd*0.35+dy*0.4);
      } else if(e.pat==='centre'){
        const dx=this.player.x-e.x;
        e.body.setVelocityX(Phaser.Math.Linear(e.body.velocity.x,dx*0.6,0.04));
        e.body.setVelocityY(e.spd*0.75);
      } else {
        if(e.pat==='sine') e.x=e.sx+Math.sin(time/500+e.sOff)*70;
        e.setVelocityY(e.spd);
      }

      if(e.y>H+70||e.x<-100||e.x>W+100){e.destroy();if(!this.bossOn)this._onWaveKill3();return;}

      // Shooting — phantom/shade shoot and BRIEFLY reveal themselves
      if(e.type==='phantom'||e.type==='shade'||e.type==='grunt'){
        e.stmr-=dt;
        if(e.stmr<=0){
          // Flash visible briefly when shooting
          e.setAlpha(0.7);
          this.time.delayedCall(220,()=>{if(e?.active&&!e._revealed)e.setAlpha(e.type==='grunt'?0.25:0);});
          const a=Phaser.Math.Angle.Between(e.x,e.y,this.player.x,this.player.y);
          const shots=e.type==='shade'?3:1;
          for(let s2=0;s2<shots;s2++){
            const spread=(s2-(shots-1)/2)*0.3;
            const b=this.eb.create(e.x,e.y+20,'pulse');
            if(b){
              b.play('pulse'); b.setScale(1.3).setDepth(6).setTint(0xcc44ff);
              b.setVelocity(Math.cos(a+spread)*eSpd,Math.sin(a+spread)*eSpd);
              b.dmg=Math.round((e.type==='shade'?22:14)*this.diff.hpm*0.6);
              this.time.delayedCall(3000,()=>{if(b?.active)b.destroy();});
            }
          }
          e.stmr=Phaser.Math.Between(
            Math.round((e.type==='shade'?2000:1600)/this.diff.srm),
            Math.round((e.type==='shade'?3500:2800)/this.diff.srm));
        }
      }
    });

    // Clean bullets
    [...this.eb.getChildren(),...this.pb.getChildren()].forEach(b=>{
      if(b.active&&(b.y>H+30||b.y<-30||b.x<-30||b.x>W+30))b.destroy();
    });

    if(this.bossOn&&this.boss) this.updBoss3(dt);
  }
}

class Ep3BossTransmissionScene extends Phaser.Scene {
  constructor(){super('Ep3BossTransmission');}
  init(data){this.gameData=data;}
  create(){
    Sfx.init(); this.engaged=false;
    this.add.rectangle(W/2,H/2,W,H,0x000000,1);
    this.bg=this.add.tileSprite(0,0,W,H,'bg-stars').setOrigin(0).setAlpha(.3).setTint(0x6600aa);
    // Scan lines
    const scan=this.add.graphics().setDepth(5);
    for(let y=0;y<H;y+=3){scan.fillStyle(0x000000,0.1);scan.fillRect(0,y,W,1);}
    this.add.rectangle(W/2,H/2-40,W-32,360,0x000000,0.97).setStrokeStyle(2,0x8833cc).setDepth(6);
    this.add.text(W/2,H/2-216,'▶  INCOMING TRANSMISSION  ◀',
      {fontSize:'13px',fontFamily:'Courier New',color:'#cc99ff',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(7);

    const staticTxt=this.add.text(W/2,H/2-80,'█▓▒░ SIGNAL LOCKED ░▒▓█',
      {fontSize:'14px',fontFamily:'Courier New',color:'#c0a8d8'}).setOrigin(.5).setDepth(7);
    this.tweens.add({targets:staticTxt,alpha:0.1,duration:80,yoyo:true,repeat:8,onComplete:()=>staticTxt.setText('')});

    this.time.delayedCall(900,()=>this._showSovereign());

    this.countdown=8;
    this.cntTxt=this.add.text(W/2+110,H-52,'ENGAGING IN  8',
      {fontSize:'13px',fontFamily:'Courier New',color:'#cc99ff',stroke:'#000',strokeThickness:2}).setOrigin(.5).setDepth(20);
    this.tweens.add({targets:this.cntTxt,alpha:0.2,duration:500,yoyo:true,repeat:-1});
    this.cntTimer=this.time.addEvent({delay:1000,callback:this._tick,callbackScope:this,repeat:7});
    makeBtn(this,W/2+80,H-24,'ENGAGE NOW ▶','#8833cc',()=>this._engage(),140,28);
    makeBtn(this,W/2-80,H-24,'◀ RETREAT','#331144',()=>{
      this.cntTimer.remove();
      this.scene.start('Game3',{wave:0,score:0,lives:3,hp:100,energy:100,nextLifeAt:LIFE_EVERY});
    },120,28);
    this.input.keyboard.once('keydown-SPACE',()=>this._engage());
    Music.stop();
    this._playStatic();
  }

  _playStatic(){
    const c=Music._ctx&&Music._ctx()||Sfx.ctx;
    if(!c) return;
    const buf=c.createBuffer(1,c.sampleRate*0.4,c.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.25;
    const src=c.createBufferSource();
    const filt=c.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=600; filt.Q.value=0.4;
    const g=c.createGain(); g.gain.value=0.35;
    src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start();
  }

  _showSovereign(){
    const pilot=this.registry.get('pilotName')||'PILOT';
    // Draw Sovereign portrait — angular, cold, barely visible
    const cvs=document.createElement('canvas'); cvs.width=110; cvs.height=130;
    const ctx=cvs.getContext('2d');
    ctx.fillStyle='#000000'; ctx.fillRect(0,0,110,130);
    // Void silhouette — angular helmet
    ctx.fillStyle='#110022'; ctx.beginPath();
    ctx.moveTo(55,4); ctx.lineTo(88,30); ctx.lineTo(88,90); ctx.lineTo(55,100); ctx.lineTo(22,90); ctx.lineTo(22,30);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#6600aa'; ctx.lineWidth=1.5; ctx.stroke();
    // Eye slits — thin purple lines
    ctx.fillStyle='#aa00ff'; ctx.fillRect(30,42,18,4); ctx.fillRect(62,42,18,4);
    const eg=ctx.createLinearGradient(30,42,48,46);
    eg.addColorStop(0,'rgba(170,0,255,0)'); eg.addColorStop(0.5,'rgba(170,0,255,0.9)'); eg.addColorStop(1,'rgba(170,0,255,0)');
    ctx.fillStyle=eg; ctx.fillRect(30,42,18,4); ctx.fillRect(62,42,18,4);
    // Void symbol on chest
    ctx.fillStyle='#6600aa'; ctx.font='22px Arial'; ctx.textAlign='center'; ctx.fillText('☽',55,82);
    // Scanlines
    ctx.fillStyle='rgba(0,0,0,0.2)'; for(let y=0;y<130;y+=2) ctx.fillRect(0,y,110,1);
    ctx.fillStyle='rgba(80,0,120,0.15)'; ctx.fillRect(0,0,110,130);
    const tKey='sovereign_cmd';
    if(!this.textures.exists(tKey)) this.textures.addCanvas(tKey,cvs);
    this.add.image(W/2-80,H/2-40,tKey).setScale(1.4).setDepth(8);

    const LINES=[
      `"${pilot}."`,
      `"You destroyed my Desert fleet."`,
      `"My Ice Reach commander."`,
      `"Now you come for me."`,
      `"I am The Sovereign."`,
      `"I am the Veil."`,
      `"— The Sovereign, Ketharan High Command"`,
    ];
    const sx=W/2+10, sy=H/2-188;
    LINES.forEach((line,i)=>{
      this.time.delayedCall(800+i*900,()=>{
        const obj=this.add.text(sx,sy+i*30,line,
          {fontSize:i===LINES.length-1?10:13,fontFamily:'Courier New',
           color:i===LINES.length-1?'#440066':'#8833cc',
           stroke:'#000',strokeThickness:2,wordWrap:{width:210}})
          .setDepth(9).setAlpha(0);
        this.tweens.add({targets:obj,alpha:1,duration:120});
        Sfx.play('type'); this._playStatic();
      });
    });
    this.time.delayedCall(7400,()=>{
      const pilot2=this.registry.get('pilotName')||'PILOT';
      const f=this.add.text(W/2,H/2+148,
        `FITZ: "Noted, ${pilot2}. I have recalibrated your Sonar for maximum range."`,
        {fontSize:'11px',fontFamily:'Courier New',color:'#cc88ff',
         stroke:'#000',strokeThickness:2,wordWrap:{width:W-48},align:'center'})
        .setOrigin(.5).setDepth(9).setAlpha(0);
      this.tweens.add({targets:f,alpha:1,duration:300});
    });
  }

  _tick(){
    this.countdown--;
    if(this.countdown<=0) this._engage();
    else{this.cntTxt.setText('ENGAGING IN  '+this.countdown);Sfx.play('warn');}
  }

  _engage(){
    if(this.engaged) return; this.engaged=true; this.cntTimer.remove();
    Sfx.play('select');
    this.cameras.main.shake(200,.01);
    this.time.delayedCall(300,()=>{
      this.cameras.main.fadeOut(500,0,0,10);
      this.cameras.main.once('camerafadeoutcomplete',()=>
        this.scene.start('Game3',{...this.gameData,spawnBossNow:true}));
    });
  }
  update(){this.bg.tilePositionY-=.5;}
}

    const fitzLine3=this.fs>20000?`"${this.pilot||'PILOT'}. You cleared the Veil. Recalculating survival models." — FITZ`:

      this.wr<=1?'"Wave 1. In the dark. Not in my logs as a success." — FITZ':
      `"The Veil is patient. Return when ready, ${this.pilot||'PILOT'}." — FITZ`;
    this.add.text(W/2,354,fitzLine3,{fontSize:'11px',fontFamily:'Courier New',
      color:'#c8b8dd',wordWrap:{width:W-40},align:'center'}).setOrigin(.5);
    const runs3=getRuns(3);
    if(runs3.length>1){
      this.add.text(W/2,372,'RECENT RUNS',{fontSize:'10px',fontFamily:'Courier New',color:'#553377',letterSpacing:2}).setOrigin(.5);
      runs3.slice(1,4).forEach((r,i)=>{
        this.add.text(W/2,388+i*14,
          r.pilot+' · '+r.diff+' · Wave '+r.wave+' · '+r.score.toLocaleString(),
          {fontSize:'10px',fontFamily:'Courier New',color:'#441155'}).setOrigin(.5);
      });
    }
    makeBtn(this,W/2-80,430,'PLAY AGAIN','#cc88ff',()=>this.scene.start('Ep3Prelude'),150,40);
    makeBtn(this,W/2+80,430,'MAIN MENU','#553377',()=>this.scene.start('Ep3MainMenu'),150,40);
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Ep3Prelude'));
    makeBtn(this,W/2,H-8,'📋 COPY SCORE','#441155',()=>{
      const txt=`STARFALL EP.III — ${this.pilot||'PILOT'} — ${this.fs.toLocaleString()} pts [${this.registry.get('difficulty')||'VETERAN'}] — Wave ${this.wr}`;
      navigator.clipboard?.writeText(txt).then(()=>this.pop(W/2,H-30,'Copied!','#cc88ff',13)).catch(()=>{});
    },160,24);
    this.pop=(x,y,t,col,sz)=>{const o=this.add.text(x,y,t,{fontSize:sz+'px',fontFamily:'Arial',color:col,stroke:'#000',strokeThickness:3}).setOrigin(.5).setDepth(80);this.tweens.add({targets:o,y:y-40,alpha:0,duration:900,onComplete:()=>o.destroy()});};
    this.add.text(W/2,H-16,'[ Copy Score ]',{fontSize:'10px',fontFamily:'Courier New',color:'#336688'}).setOrigin(.5);
    saveRun(3,this.pilot||'PILOT',this.fs,this.wr,this.registry.get('difficulty')||'VETERAN',this.cl);
    this.cameras.main.fadeIn(500,0,0,10);
  }
}

    this.add.text(W/2,222,'EPISODE III — THE VEIL',

    const demo=this.add.sprite(W/2,310,'ship').setScale(2.5).setTint(0xcc88ff);

    this.tweens.add({targets:demo,y:323,duration:1400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    const hi=parseInt(localStorage.getItem('sf_hi_ep3')||'0');
    this.add.text(W/2,378,'HIGH SCORE: '+hi.toLocaleString(),
      {fontSize:'14px',fontFamily:'Arial',fontStyle:'bold',color:'#cc88ff',stroke:'#000',strokeThickness:2}).setOrigin(.5);
    const btn=makeBtn(this,W/2,444,'▶  ENTER THE VEIL','#ffffff',()=>this.go(),230,52);
    this.tweens.add({targets:btn.bg,alpha:.7,duration:700,yoyo:true,repeat:-1});
    btn.txt.setStyle({fontSize:'17px',fontFamily:'Arial',fontStyle:'bold',color:'#cc88ff',stroke:'#000',strokeThickness:4});
    this.add.text(W/2,510,'WASD move  ·  SPACE shoot  ·  Q sonar pulse  ·  ESC pause',
      {fontSize:'11px',fontFamily:'Arial',color:'#bba8cc'}).setOrigin(.5);
    this.add.text(W/2,H-34,'In the Veil, you cannot shoot what you cannot see.',
      {fontSize:'11px',fontFamily:'Courier New',color:'#c8b8dd',fontStyle:'italic'}).setOrigin(.5);
    this.input.keyboard.once('keydown-ENTER',()=>this.go());
    this.input.keyboard.once('keydown-SPACE',()=>this.go());
    // Records button
    const recBtn=this.add.text(W-12,H-12,'[ RECORDS ]',
      {fontSize:'11px',fontFamily:'Courier New',color:'#446688'}).setOrigin(1,1).setInteractive({useHandCursor:true});
    recBtn.on('pointerover',()=>recBtn.setColor('#88ccff'));
    recBtn.on('pointerout',()=>recBtn.setColor('#446688'));
    recBtn.on('pointerdown',()=>{
      const runs=[...getRuns(1),...getRuns(2),...getRuns(3)]
        .sort((a,b)=>b.score-a.score).slice(0,5);
      if(!runs.length){this.pop&&this.pop(W/2,H/2,'No runs recorded yet','#88ccff',16);return;}
      const panel=this.add.container(W/2,H/2).setDepth(90);
      panel.add(this.add.rectangle(0,0,W-20,220,0x001122,0.97).setStrokeStyle(2,0x224488));
      panel.add(this.add.text(0,-96,'RECENT RECORDS',{fontSize:'14px',fontFamily:'Courier New',color:'#44eeff',fontStyle:'bold'}).setOrigin(.5));
      runs.forEach((r,i)=>{
        const ep='EP'+( r.pilot?'?':'?');
        const line=`${i+1}. ${r.pilot||'?'} — ${(r.score||0).toLocaleString()} pts — W${r.wave||'?'} — ${r.difficulty||'?'} ${r.cleared?'✓':''}`;
        panel.add(this.add.text(0,-68+i*32,line,{fontSize:'12px',fontFamily:'Courier New',color:'#aaddff'}).setOrigin(.5));
      });
      const close=this.add.text(0,90,'[ CLOSE ]',{fontSize:'12px',fontFamily:'Courier New',color:'#446688'}).setOrigin(.5).setInteractive({useHandCursor:true});
      close.on('pointerdown',()=>panel.destroy());
      panel.add(close);
    });
    if(Music.ctx) Music.play('menu');
    this.time.delayedCall(400,()=>{if(!Music.playing)Music.play('menu');});
  }
  go(){Music.stop();Sfx.play('select');this.cameras.main.fadeOut(400,0,0,10);
    this.cameras.main.once('camerafadeoutcomplete',()=>this.scene.start('Ep3Prelude'));}
  update(){this.bg1.tilePositionY-=.35;this.bg2.tilePositionY-=.8;this.bg3.tilePositionY-=1.4;}
}




// ── GAMEPAD API ───────────────────────────────────────────────────────────────
function getGamepadInput(){
  const gps=navigator.getGamepads?navigator.getGamepads():[];
  for(const gp of gps){
    if(!gp) continue;
    const ax=gp.axes[0]||0, ay=gp.axes[1]||0;
    const fire=gp.buttons[7]?.pressed||gp.buttons[0]?.pressed||false;
    const sonar=gp.buttons[4]?.pressed||false;
    return {mx:Math.abs(ax)>0.15?ax:0, my:Math.abs(ay)>0.15?ay:0, fire, sonar};
  }
  return null;
}


// ── EPISODE COMPLETION TRACKING ───────────────────────────────────────────────
function markEpisodeComplete(ep){ localStorage.setItem('sf_ep'+ep+'_complete','1'); }
function isEpisodeComplete(ep){ return localStorage.getItem('sf_ep'+ep+'_complete')==='1'; }

// ── RUN HISTORY HELPERS ───────────────────────────────────────────────────────
function saveRun(ep,pilot,score,wave,difficulty,cleared){
  const key='sf_runs_ep'+ep;
  let runs=[];try{runs=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){}
  runs.unshift({pilot,score,wave,difficulty,cleared,ts:Date.now()});
  localStorage.setItem(key,JSON.stringify(runs.slice(0,5)));
}
function shareScore(ep,pilot,score,wave,diff,btn){
  const txt='STARFALL EP'+ep+' — '+pilot+' — '+score.toLocaleString()+' pts — Wave '+wave+' — '+diff;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>{if(btn)btn.setText('✓ Copied!');}).catch(()=>{});}
}
function getRuns(ep){
  try{ return JSON.parse(localStorage.getItem('sf_runs_ep'+ep)||'[]'); }catch(e){return [];}
}
function shareScore(ep,pilot,score,wave,diff,btn){
  const txt='STARFALL EP'+ep+' — '+pilot+' — '+score.toLocaleString()+' pts — Wave '+wave+' — '+diff;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>{if(btn)btn.setText('✓ Copied!');});}
}
